{"id":"Rammus","nom":"Rammus","titre":"Tatou blindé","blurb":"Beaucoup l'idolâtrent, certains le méprisent, mais tous restent perplexes devant l'énigmatique Rammus. Protégé par une carapace cloutée, il inspire des théories de plus en plus variées sur ses origines : demi-dieu, oracle, simple bête transformée par la magie... Quelle que soit la vérité, Rammus n'est pas très bavard et ne s'arrête pour personne tandis qu'il parcourt le désert de Shurima.","tags":["Tank"],"info":{"attack":4,"defense":10,"magic":5,"difficulty":5},"partype":"Mana","passif":{"nom":"Carapace cloutée","description":"Rammus gagne des dégâts d'attaque bonus en fonction de son armure et de sa résistance magique."},"competences":[{"nom":"Démolisseur","description":"Rammus fonce comme une balle vers les ennemis, infligeant des dégâts et ralentissant les cibles touchées.","cd":"12/10.5/9/7.5/6","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Boule défensive","description":"Rammus prend une posture défensive. Son armure et sa résistance magique sont grandement augmentées et il renvoie des dégâts aux ennemis qui l'attaquent.","cd":"7","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Provocation frénétique","description":"Rammus provoque un champion ennemi ou un monstre, l'obligeant à s'acharner contre lui.","cd":"12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Frappe ascendante","description":"Rammus bondit dans les airs et retombe violemment à l'endroit ciblé, ce qui inflige des dégâts magiques et ralentit les ennemis. Si Frappe ascendante est lancée alors que Démolisseur est actif, les ennemis près du centre de la zone sont également projetés dans les airs.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"RekSai","nom":"Rek'Sai","titre":"Traqueuse du Néant","blurb":"Rek'Sai est une créature prédatrice – la plus imposante et la plus féroce de son espèce – qui se déplace sous terre pour surprendre ses proies. Sa faim insatiable a ravagé des régions entières de Shurima à l'époque où cet empire était encore florissant. Les marchands et les caravanes armées faisaient des détours de plusieurs kilomètres pour rester loin de ses terres. Dès lors que Rek'Sai vous a repéré, votre sort est scellé. Nul ne peut lui échapper ; elle est la mort qui surgit du sable.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":5,"magic":2,"difficulty":3},"partype":"Rage","passif":{"nom":"Fureur des Xer'Sai","description":"Rek'Sai génère de la Fureur avec ses attaques et quand elle frappe un ennemi avec une compétence de base. Quand elle est enfouie, elle consomme sa Fureur pour récupérer ses PV."},"competences":[{"nom":"Courroux de la reine/Sondeur explosif","description":"Les 3 prochaines attaques de base de Rek'Sai infligent des dégâts physiques bonus aux ennemis proches.<br><br>Enfouie, Rek'Sai tire un projectile chargé en énergie du Néant qui inflige des dégâts aux ennemis touchés, en plus de les révéler.","cd":"4/3.5/3/2.5/2","cout":"0","typeCout":"Pas de coût"},{"nom":"Enfouissement/Jaillissement","description":"Rek'Sai plonge sous terre, gagnant de nouvelles compétences et augmentant sa vitesse de déplacement. La portée de sa vision est réduite et elle ne peut plus lancer d'attaque de base.<br><br>Enfouie, Rek'Sai peut utiliser Jaillissement pour projeter en l'air et blesser les ennemis proches.","cd":"4","cout":"0","typeCout":"Pas de coût"},{"nom":"Morsure féroce/Tunnel","description":"Rek'Sai mord sa cible, infligeant des dégâts physiques, ou des dégâts bruts bonus si sa jauge de Fureur est pleine.<br><br>Enfouie, Rek'Sai crée un tunnel durable et réutilisable. Les ennemis peuvent le détruire en se tenant sur l'une des entrées.","cd":"6","cout":"0","typeCout":"Pas de coût"},{"nom":"Rush du Néant","description":"Rek'Sai marque passivement ses cibles en leur infligeant des dégâts. Elle peut activer cette compétence pour devenir brièvement impossible à cibler et bondir sur une cible marquée, infligeant d'importants dégâts selon les PV max de cette cible.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Rell","nom":"Rell","titre":"Cavalière de fer","blurb":"Changée en arme vivante par les expériences brutales de l'académie de la Rose noire, Rell est aujourd'hui déterminée à détruire Noxus. Son enfance a été particulièrement horrible ; on lui a fait subir des choses atroces afin de perfectionner ses capacités magiques de manipulation du métal... jusqu'à ce qu'elle réussisse à s'échapper en tuant beaucoup de ses ravisseurs au passage. Désormais considérée comme une criminelle, Rell s'attaque aux soldats noxiens tout en recherchant les survivants de son ancienne « académie ». Bien qu'elle défende les faibles, elle tuera sans pitié ses anciens tortionnaires.","tags":["Tank","Support"],"info":{"attack":0,"defense":0,"magic":0,"difficulty":0},"partype":"Mana","passif":{"nom":"Mise en pièces","description":"Les attaques et les compétences de Rell infligent des dégâts magiques bonus et volent de l'armure et de la résistance magique à l'impact."},"competences":[{"nom":"Frappe dislocatrice","description":"Rell inflige des dégâts magiques aux unités sur une ligne, brisant leurs boucliers et les étourdissant. ","cd":"11/10.5/10/9.5/9","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Ferromancie : Descendre en piqué","description":"À cheval : Rell descend de cheval et s'abat au sol dans son armure, projetant dans les airs les ennemis et gagnant un solide bouclier. À pied, elle gagne de l'armure, de la résistance magique, de la vitesse d'attaque et de la portée d'attaque, mais elle est ralentie.<br><br>À pied : Rell recrée son destrier, gagnant un bref bonus de vitesse et projetant dans les airs le prochain ennemi qu'elle attaque.<br><br>","cd":"10","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Joute endiablée","description":"Passive : Rell gagne de la vitesse de déplacement en dehors des combats.<br><br>Active : Rell et un allié gagnent de la vitesse de déplacement croissante. Ce bonus est doublé en direction des ennemis et quand Rell et son allié se dirigent l'un vers l'autre. La prochaine attaque de Rell provoquera une explosion, infligeant des dégâts magiques.<br>","cd":"14/13/12/11/10","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Tempête magnétique","description":"Rell explose en une fureur magnétique, attirant violemment les ennemis proches. Elle attire ensuite continuellement les ennemis proches pendant un bref instant, leur infligeant des dégâts magiques sur la durée.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Renata","nom":"Renata Glasc","titre":"Baronne de la chimie","blurb":"Renata Glasc s'extirpa des cendres de sa maison natale avec son nom et les recherches alchimiques de ses parents pour seules possessions. Au cours des décennies suivantes, elle devint la Baronne de la chimie la plus riche de Zaun et un génie des affaires capable de faire converger les intérêts de tous vers les siens. Travaillez avec elle et vous serez généreusement récompensé. Opposez-vous à elle et vous ne manquerez pas d'occasions de le regretter. Sachez seulement que tout le monde finit par se rallier à elle.","tags":["Support","Mage"],"info":{"attack":2,"defense":6,"magic":9,"difficulty":8},"partype":"Mana","passif":{"nom":"Pression","description":"Les attaques de Renata infligent des dégâts supplémentaires et marquent les ennemis. Les alliés de Renata peuvent infliger des dégâts supplémentaires aux ennemis marqués."},"competences":[{"nom":"Poignée de main","description":"Renata tire un projectile qui immobilise le premier ennemi touché. Elle peut réactiver cette compétence pour lancer cet ennemi dans une direction.","cd":"16","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Patronage","description":"Renata renforce un champion allié ; elle retarde sa mort et lui permet même de survivre s'il participe à l'élimination d'un champion.","cd":"28/27/26/25/24","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Programme de fidélité","description":"Renata tire deux projectiles techno-chimiques, octroyant un bouclier à ses alliés et infligeant des dégâts ainsi qu'un ralentissement aux ennemis touchés.","cd":"14/13/12/11/10","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Prise de contrôle hostile","description":"Renata envoie un nuage de produits chimiques, rendant fous furieux tous les ennemis touchés.","cd":"150/130/110","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Renekton","nom":"Renekton","titre":"Dévoreur des sables","blurb":"Originaire du désert brûlant de Shurima, Renekton est un Transfiguré terrifiant animé par la rage. Il était autrefois le guerrier le plus respecté de l'empire de Shurima, dont il avait mené les armées vers la victoire à maintes reprises. Cependant, après la chute de l'empire, Renekton fut enseveli sous les sables. Petit à petit, alors que le monde changeait, il sombra dans la démence. Désormais libre, son unique souhait est de retrouver et de tuer son frère Nasus qui, croit-il dans sa folie, est responsable des siècles qu'il a passés dans les ténèbres.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":5,"magic":2,"difficulty":3},"partype":"Fureur","passif":{"nom":"Règne de la colère","description":"Les attaques de Renekton génèrent de la Fureur, et encore plus quand il lui reste peu de PV. Cette Fureur peut renforcer ses compétences en leur conférant des effets supplémentaires."},"competences":[{"nom":"Destruction des faibles","description":"Renekton lance une attaque circulaire, infligeant des dégâts physiques modérés à tous les ennemis qui l'entourent et se soignant d'un montant égal à une petite portion des dégâts infligés. S'il a plus de 50 pts de Fureur, les dégâts et les soins augmentent.","cd":"7","cout":"0","typeCout":"Pas de coût"},{"nom":"Prédateur impitoyable","description":"Renekton frappe deux fois la cible en infligeant des dégâts physiques modérés et en l'étourdissant pendant 0.75 sec. Si Renekton a plus de 50 pts de Fureur, il frappe la cible trois fois, détruisant instantanément tout bouclier anti-dégâts se trouvant sur elle, lui infligeant de lourds dégâts physiques et l'étourdissant pendant 1.5 sec.","cd":"16/14/12/10/8","cout":"0","typeCout":"Pas de coût"},{"nom":"Tranche et coupe","description":"Renekton charge et inflige des dégâts à toutes les unités sur son chemin. S'il a plus de 50 pts de Fureur, Renekton inflige des dégâts supplémentaires et réduit l'armure des unités touchées.","cd":"16/14.5/13/11.5/10","cout":"0","typeCout":"Pas de coût"},{"nom":"Dominus","description":"Renekton prend sa Forme de tyran et profite de PV supplémentaires ; il inflige également des dégâts à tous les ennemis qui l'entourent. Tant qu'il est en Forme de tyran, Renekton gagne périodiquement de la Fureur.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Rengar","nom":"Rengar","titre":"Fier traqueur","blurb":"Rengar est un féroce Vastaya chasseur de trophées qui ne vit que pour le frisson de la traque et de l'élimination des proies les plus dangereuses. Il parcourt le monde à la recherche des bêtes les plus féroces, et surtout de Kha'Zix, la créature du Néant qui lui a fait perdre un œil. Rengar ne piste ses proies ni pour la nourriture ni pour la gloire, mais pour la beauté de la poursuite en elle-même.","tags":["Assassin","Fighter"],"info":{"attack":7,"defense":4,"magic":2,"difficulty":8},"partype":"Férocité","passif":{"nom":"Prédateur invisible","description":"Quand Rengar est dans les hautes herbes, son attaque de base le fait bondir sur un ennemi.<br><br>Rengar génère de la Férocité chaque fois qu'il lance une compétence. Au maximum de Férocité, sa prochaine compétence est renforcée.<br><br>Tuer des champions ennemis ajoute des trophées au <font color='#BBFFFF'>Collier de dents</font> de Rengar, ce qui augmente ses dégâts d'attaque."},"competences":[{"nom":"Esprit sauvage","description":"La prochaine attaque de Rengar poignarde brutalement sa cible pour lui infliger des dégâts bonus.<br><br>Férocité : inflige encore plus de dégâts et augmente la vitesse d'attaque de Rengar.","cd":"0.25","cout":"0","typeCout":"Génère 1 pt de Férocité"},{"nom":"Rugissement","description":"Rengar émet un rugissement qui inflige des dégâts aux ennemis et lui permet de récupérer des PV équivalents à une partie des dégâts qu'il a subis récemment.<br><br>Férocité : brise également les effets de contrôle de foule.","cd":"0.25","cout":"0","typeCout":"Génère 1 pt de Férocité"},{"nom":"Bolas","description":"Rengar lance des bolas, ralentissant la première cible touchée pendant un court instant.<br><br>Férocité : immobilise la cible.","cd":"0.25","cout":"0","typeCout":"Génère 1 pt de Férocité"},{"nom":"Chasseur-né","description":"Rengar fait appel à tous ses sens de prédateur. Il <font color='#cd90ee'>se camoufle</font> et révèle le champion ennemi le plus proche à une très longue distance. Pendant Chasseur-né, Rengar gagne de la vitesse de déplacement, peut bondir sur l'ennemi traqué sans avoir à être dans les hautes herbes et réduit l'armure de sa cible.","cd":"100/90/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Riven","nom":"Riven","titre":"Exilée brisée","blurb":"Autrefois soldat d'un régiment de Noxus, Riven est désormais expatriée dans un pays qu'elle avait elle-même tenté d'envahir. Elle s'est naguère élevée dans la hiérarchie grâce à sa force de conviction et à son efficacité brutale : sa récompense fut de commander ses propres troupes, armée d'une épée runique légendaire. Cependant, sur le front ionien, la foi de Riven en sa terre natale a vacillé avant de rompre. Ayant tranché tous ses liens avec l'empire, elle cherche désormais sa place dans un monde blessé, alors même que, d'après les rumeurs, Noxus a retrouvé sa vigueur d'antan…","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":5,"magic":1,"difficulty":8},"partype":"Aucune","passif":{"nom":"Lame runique","description":"Les compétences de Riven chargent sa lame, ce qui permet à ses attaques de base d'infliger des dégâts supplémentaires en consommant des charges."},"competences":[{"nom":"Ailes brisées","description":"Riven se déchaîne et lance une série de coups. Cette compétence peut être réactivée trois fois pendant une courte période et le troisième coup repousse les ennemis proches.","cd":"13","cout":"0","typeCout":"Pas de coût"},{"nom":"Décharge de ki","description":"Riven lance une décharge de ki, blessant et étourdissant les ennemis proches.","cd":"11/10/9/8/7","cout":"0","typeCout":"Pas de coût"},{"nom":"Bravoure","description":"Riven avance sur une courte distance et bloque des dégâts.","cd":"10/9/8/7/6","cout":"0","typeCout":"Pas de coût"},{"nom":"Lame de l'exilée","description":"Riven renforce son arme avec de l'énergie, augmentant ses dégâts d'attaque et sa portée. Pendant la durée de cet effet, Riven peut utiliser une fois Taillade du vent, une puissante attaque à distance.","cd":"120/90/60","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Rumble","nom":"Rumble","titre":"Menace mécanisée","blurb":"Rumble est un jeune inventeur soupe au lait. Ne disposant que de ses deux mains et d'une pile de ferraille, le yordle au tempérament de feu se fabriqua une colossale armure mécanique, dotée d'un arsenal de harpons électrifiés et de roquettes incendiaires. Si certains pouffent devant ses créations sorties tout droit d'une décharge, Rumble n'en a que faire : après tout, c'est lui qui est doté d'un lance-flammes.","tags":["Fighter","Mage"],"info":{"attack":3,"defense":6,"magic":8,"difficulty":10},"partype":"Vapeur","passif":{"nom":"Titan de bric-à-brac","description":"Chaque compétence lancée par Rumble augmente sa Vapeur. Quand Rumble atteint 50% de Vapeur, il entre dans la Zone rouge, ce qui confère des effets bonus à ses compétences de base. Quand il atteint 100% de Vapeur, il entre en Surchauffe, ce qui lui octroie de la vitesse d'attaque bonus et lui permet d'infliger des dégâts supplémentaires avec ses attaques de base, mais l'empêche d'utiliser ses compétences pendant quelques secondes."},"competences":[{"nom":"Lance-flammes","description":"Rumble enflamme les adversaires devant lui, infligeant des dégâts magiques dans une zone conique pendant 3 sec. Dans la Zone rouge, les dégâts augmentent.","cd":"10/9/8/7/6","cout":"0","typeCout":" pts de Vapeur"},{"nom":"Bouclier recyclé","description":"Rumble crée un bouclier qui le protège des dégâts et lui donne un bonus de rapidité. Dans la Zone rouge, les PV du bouclier et le bonus de vitesse sont augmentés.","cd":"6","cout":"0","typeCout":" pts de Vapeur"},{"nom":"Harpon électrique","description":"Rumble tire un harpon qui électrocute sa cible, lui infligeant des dégâts magiques et réduisant sa vitesse de déplacement et sa résistance magique. Rumble peut porter 2 harpons en même temps. Dans la Zone rouge, les dégâts et le pourcentage de ralentissement sont augmentés.","cd":"0.5","cout":"0","typeCout":" pts de Vapeur"},{"nom":"Éradication","description":"Rumble tire une bordée de roquettes, créant un mur de flammes qui blesse et ralentit les ennemis.","cd":"130/105/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Ryze","nom":"Ryze","titre":"Mage runique","blurb":"Largement considéré comme l'un des plus puissants sorciers de Runeterra, Ryze est un archimage endurci par les ans qui porte un fardeau incommensurable sur ses épaules. Armé d'une constitution à toute épreuve et d'un vaste arsenal de connaissances mystiques, il consacre sa vie à rassembler les Runes telluriques, les fragments de magie brute qui ont jadis servi à façonner le monde. Ryze doit récupérer ces reliques avant qu'elles ne tombent entre de mauvaises mains, car il sait quel genre d'horreurs elles pourraient déchaîner sur Runeterra.","tags":["Mage"],"info":{"attack":2,"defense":2,"magic":10,"difficulty":7},"partype":"Mana","passif":{"nom":"Maîtrise des arcanes","description":"<mainText>Les compétences de Ryze infligent des dégâts supplémentaires en fonction de son mana supplémentaire, et son mana max est augmenté d'un pourcentage en fonction de sa puissance.</mainText>"},"competences":[{"nom":"Court-circuit","description":"Passivement, les autres compétences de base de Ryze réinitialisent le délai de récupération de Court-circuit et chargent une rune. Lorsque Ryze lance Court-circuit avec deux runes chargées, il gagne un bref bonus en vitesse de déplacement.<br><br>À l'activation, Ryze tire une décharge de pure énergie en ligne droite, infligeant des dégâts au premier ennemi touché. Si la cible est marquée par Flux, Court-circuit inflige des dégâts supplémentaires et rebondit vers les ennemis proches marqués par Flux.","cd":"5","cout":"40/38/36/34/32","typeCout":" {{ abilityresourcename }}"},{"nom":"Prison runique","description":"Ryze piège une cible dans une prison de runes, lui infligeant des dégâts et ralentissant ses déplacements. Si la cible est marquée par Flux, elle est immobilisée au lieu d'être ralentie.","cd":"11/10.5/10/9.5/9","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Flux envoûtant","description":"Ryze projette un orbe de pure énergie magique qui blesse une cible et marque les ennemis proches de sa cible. Les compétences de Ryze ont des effets supplémentaires sur les ennemis marqués.","cd":"3.5/3.25/3/2.75/2.5","cout":"35/45/55/65/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Portail transdimensionnel","description":"Passivement, Court-circuit inflige des dégâts supplémentaires aux cibles marquées par Flux.<br><br>À l'incantation, Ryze ouvre un portail menant à un endroit proche. Quelques secondes plus tard, tous les alliés près du portail sont transportés à l'endroit ciblé.","cd":"180/160/140","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Samira","nom":"Samira","titre":"Rose du désert","blurb":"Toujours en quête de sensations fortes, Samira regarde la mort dans les yeux avec une confiance inébranlable. Après la destruction qui a frappé son foyer shurimien lorsqu'elle était enfant, Samira a trouvé sa véritable vocation à Noxus, où elle s'est forgé une réputation de tête brûlée extrêmement classe qui accepte les missions les plus dangereuses. Munie de deux pistolets à poudre noire et d'une épée personnalisée, Samira s'épanouit lorsque sa vie est en danger et élimine spectaculairement tous ceux qui se mettent en travers de sa route.","tags":["Marksman","Assassin"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":6},"partype":"Mana","passif":{"nom":"Élan téméraire","description":"Samira fait des combos en enchaînant des attaques ou compétences différentes de la précédente. En mêlée, les attaques de Samira infligent des dégâts magiques supplémentaires. Les attaques de Samira contre les ennemis affectés par des effets <status>immobilisants</status> la font se ruer à portée d'attaque. Si l'ennemi est <status>projeté dans les airs</status>, elle le maintient brièvement <status>dans les airs</status>."},"competences":[{"nom":"Panache","description":"Samira tire une balle ou donne un coup d'épée, infligeant des dégâts. Si cette compétence est lancée pendant Charge sauvage, Samira frappe tous les ennemis sur son chemin à la fin de la ruée.","cd":"6/5/4/3/2","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Tourbillon de lame","description":"Samira donne un coup d'épée tourbillonnant, ce qui blesse les ennemis et détruit les projectiles ennemis.","cd":"30/28/26/24/22","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge sauvage","description":"Samira se rue à travers un ennemi (bâtiments inclus), tailladant les ennemis qu'elle traverse et gagnant de la vitesse d'attaque. Tuer un champion ennemi réinitialise le délai de récupération de cette compétence.","cd":"20/18/16/14/12","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Gâchette infernale","description":"Samira tire une pluie de balles sur tous les ennemis qui l'entourent.","cd":"5","cout":"0","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Sejuani","nom":"Sejuani","titre":"Fureur du nord","blurb":"Sejuani est l'impitoyable chef de guerre sublimée de la Griffe hivernale, l'une des tribus les plus redoutées de Freljord. La survie de son peuple est une lutte constante et désespérée contre les éléments. Pour résister aux rigueurs de l'hiver, il doit lancer des assauts contre les Noxiens, les Demaciens et les Avarosans. Sejuani mène elle-même la charge des plus dangereux de ces assauts en chevauchant son sanglier drüvask, Bristle, et en agitant son fléau de glace pure pour congeler et réduire en miettes ses ennemis.","tags":["Tank"],"info":{"attack":5,"defense":7,"magic":6,"difficulty":4},"partype":"Mana","passif":{"nom":"Fureur du nord","description":"En dehors des combats, Sejuani gagne Armure de glace, qui augmente son armure et sa résistance magique et l'immunise contre les ralentissements. Armure de glace persiste un court instant après que Sejuani a subi des dégâts.  Sejuani peut blesser un ennemi étourdi pour le fracasser, infligeant d'énormes dégâts magiques."},"competences":[{"nom":"Assaut arctique","description":"Sejuani charge droit devant elle, projetant les ennemis dans les airs. La charge s'arrête si elle touche un champion ennemi.","cd":"18/16.5/15/13.5/12","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Colère de l'hiver","description":"Sejuani donne deux coups de masse, infligeant des dégâts, ralentissant les ennemis et appliquant des effets Givre.","cd":"9/8/7/6/5","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Permafrost","description":"Sejuani gèle et étourdit un champion ennemi qui porte le nombre max d'effets Givre.","cd":"1.5","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Prison de glace","description":"Sejuani projette des bolas qui gèlent et étourdissent le premier champion touché, en plus de créer une tempête de glace qui ralentit les autres ennemis.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Senna","nom":"Senna","titre":"Rédemptrice","blurb":"Condamnée à être poursuivie par la Brume noire dès l'enfance, Senna rejoignit l'ordre sacré des Sentinelles de la lumière. Elle combattit avec ferveur, mais elle fut tuée et son âme fut emprisonnée dans une lanterne par l'odieux spectre Thresh. Ne perdant pas espoir, Senna apprit à manier la brume dans sa prison. Quand elle revint à la vie, elle était à jamais changée. Manipulant désormais ténèbres et lumière, Senna désire détruire la Brume noire en la retournant contre elle-même. Chaque rayon de son arme en pierre-relique libère les âmes damnées de la brume.","tags":["Support","Marksman"],"info":{"attack":7,"defense":2,"magic":6,"difficulty":7},"partype":"Mana","passif":{"nom":"Absolution","description":"Lorsque des unités meurent près de Senna, leurs âmes sont parfois prises au piège dans la Brume noire. Senna peut attaquer ces âmes pour les libérer et absorber la Brume qui les retenait. La Brume renforce son canon en pierre-relique en augmentant ses dégâts d'attaque, sa portée d'attaque et ses chances de coup critique. <br><br>Les attaques du canon en pierre-relique de Senna tirent plus lentement, infligent des dégâts supplémentaires et lui confèrent brièvement une partie de la vitesse de déplacement de sa cible."},"competences":[{"nom":"Ombre perforante","description":"Le canon en pierre-relique de Senna tire un rayon de lumière et d'ombre à travers sa cible. Ce rayon soigne les alliés et blesse les ennemis.","cd":"15","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Dernière étreinte","description":"Senna projette une vague de Brume noire. Si elle touche un ennemi, la Brume s'accroche à lui. La cible ainsi que tous les ennemis proches sont immobilisés après un court délai.","cd":"11","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Malédiction de la Brume noire","description":"Senna relâche la Brume accumulée dans son arme pour créer une tempête autour d'elle, ce qui la transforme en spectre. Les alliés qui entrent dans cette zone sont camouflés et prennent l'apparence d'un spectre. Les spectres ne peuvent pas être identifiés, ne peuvent pas être sélectionnés et profitent d'un bonus en vitesse de déplacement.","cd":"26/24.5/23/21.5/20","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Ténèbres aveuglantes","description":"Senna invoque les pierres-reliques de Sentinelles déchues, ouvrant son canon en pierre-relique pour former un éventail sacré d'ombre et de lumière. Elle tire alors un rayon à portée illimitée qui octroie un bouclier aux alliés touchés et inflige des dégâts aux ennemis pris dans son centre.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Seraphine","nom":"Séraphine","titre":"Chanteuse rêveuse","blurb":"Née à Piltover de parents zauniens, Séraphine peut entendre les âmes des autres. Le monde chante pour elle et elle chante pour le monde. Alors que ces sons l'accablaient dans sa jeunesse, elle s'en inspire aujourd'hui et transforme le chaos en symphonie. Elle chante pour les cités sœurs, afin de rappeler à leurs citoyens qu'ils ne sont pas seuls, qu'ils sont plus forts ensemble et que, pour elle, leur potentiel est infini.","tags":["Support","Mage"],"info":{"attack":0,"defense":0,"magic":0,"difficulty":0},"partype":"Mana","passif":{"nom":"Présence sur scène","description":"Toutes les trois compétences de base, Séraphine lance deux fois la compétence de base choisie. De plus, lancer des compétences près d'alliés permet à sa prochaine attaque de base d'avoir une plus grande portée et d'infliger des dégâts magiques supplémentaires."},"competences":[{"nom":"Note aiguë","description":"Séraphine inflige des dégâts dans une zone.","cd":"8/7.5/7/6.5/6","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Son ambiophonique","description":"Séraphine octroie un effet de hâte et un bouclier aux alliés proches. Si elle dispose déjà d'un bouclier, elle soigne également les alliés proches.","cd":"22","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Battement","description":"Séraphine inflige des dégâts aux ennemis placés sur une ligne et restreint leurs déplacements.","cd":"11/10.5/10/9.5/9","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Bis","description":"Séraphine inflige des dégâts et charme les ennemis touchés. La portée est étendue à chaque champion allié ou ennemi touché.","cd":"160/140/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Sett","nom":"Sett","titre":"Patron","blurb":"Sett s'est imposé en tant que chef du monde criminel florissant d'Ionia après la guerre contre Noxus. Bien qu'il ait fait ses débuts de manière modeste dans les arènes de combat de Navori, il s'est rapidement fait une réputation pour sa force sauvage et sa capacité à encaisser tous les coups sans broncher. Après s'être battu pour se faire une place parmi les combattants locaux, Sett s'est hissé au sommet à la force de ses poings pour finalement prendre le contrôle des arènes dans lesquelles il se battait autrefois.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":5,"magic":1,"difficulty":2},"partype":"Agressivité","passif":{"nom":"Roi de l'arène","description":"Lors de ses attaques de base, Sett alterne son direct du gauche et son direct du droit. Le direct du droit est un peu plus puissant et rapide. De plus, Sett déteste perdre, ce qui augmente la régénération de ses PV selon ses PV manquants."},"competences":[{"nom":"Rogne","description":"Les deux prochaines attaques de Sett infligent des dégâts supplémentaires en fonction des PV max de la cible. De plus, Sett augmente sa vitesse de déplacement quand il se dirige vers des champions ennemis.","cd":"9/8/7/6/5","cout":"0","typeCout":"Pas de coût"},{"nom":"Coup cathartique","description":"Passivement, Sett stocke une partie des dégâts qu'il subit sous forme d'agressivité. À l'activation, Sett dépense toute l'agressivité stockée pour gagner un bouclier et donner un coup de poing à effet de zone qui inflige des dégâts bruts au centre et des dégâts physiques sur les côtés.","cd":"18/16.5/15/13.5/12","cout":"0","typeCout":"Pas de coût"},{"nom":"Casse-tête","description":"Sett attire les ennemis venant de deux directions opposées pour leur infliger des dégâts et les étourdir. S'il n'y avait des ennemis que dans une direction, ces ennemis sont ralentis au lieu d'être étourdis.","cd":"16/14.5/13/11.5/10","cout":"0","typeCout":"Pas de coût"},{"nom":"Le Clou du spectacle","description":"Sett saisit un champion ennemi et l'emporte dans les airs avant de l'écraser au sol, infligeant des dégâts et ralentissant tous les ennemis près de son point d'atterrissage.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Shaco","nom":"Shaco","titre":"Bouffon des ténèbres","blurb":"Fabriqué il y a longtemps pour servir de jouet à un prince qui se sentait seul, Shaco est une marionnette enchantée qui se repaît désormais de meurtres et de chaos. Corrompu par la magie noire et la perte de sa chère mission, le pantin autrefois gentil ne se réjouit plus que du malheur des âmes qu'il tourmente. Il utilise ses jouets et ses mauvais tours pour répandre la mort et le sang, ce qui le fait follement rire. Tous ceux qui, la nuit venue, entendent un odieux ricanement savent qu'ils sont la prochaine cible du Bouffon des ténèbres.","tags":["Assassin"],"info":{"attack":8,"defense":4,"magic":6,"difficulty":9},"partype":"Mana","passif":{"nom":"Traîtrise","description":"Les attaques de base et la compétence Poison double de Shaco infligent des dégâts supplémentaires lorsqu'elles frappent dans le dos d'un ennemi."},"competences":[{"nom":"Tromperie","description":"Shaco devient invisible et se téléporte vers la position ciblée.<br><br>Sa première attaque en étant invisible est renforcée : elle inflige des dégâts supplémentaires et, si Shaco frappe dans le dos d'un ennemi, un coup critique.","cd":"13/12.5/12/11.5/11","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Boîte surprise","description":"Shaco pose une boîte cachée. Quand elle est déclenchée, elle effraie puis attaque les ennemis proches.","cd":"15","cout":"70/65/60/55/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Poison double","description":"Passivement, Shaco empoisonne les cibles qu'il touche, réduisant leur vitesse de déplacement. Shaco peut lancer son arme pour infliger des dégâts et empoisonner sa cible. Le poignard lancé inflige des dégâts supplémentaires si la cible a moins de 30% de ses PV.","cd":"8","cout":"75","typeCout":" {{ abilityresourcename }}"},{"nom":"Hallucination","description":"Shaco crée un double de lui-même à ses côtés qui peut attaquer les ennemis proches (inflige des dégâts réduits aux tourelles). En mourant, il explose, faisant apparaître trois mini-boîtes surprises et blessant les ennemis à portée.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Shen","nom":"Shen","titre":"Œil du crépuscule","blurb":"Shen, l'Œil du crépuscule, est le chef d'un groupe secret de guerriers ioniens connu sous le nom de Kinkou. Désireux d'échapper aux méfaits des émotions, des préjugés et de l'ego, il porte un regard désintéressé sur les choses en arpentant le chemin invisible entre le royaume des esprits et le monde physique. Ayant pour mission d'assurer leur équilibre, Shen emploie ses lames d'acier et son énergie arcanique contre ceux qui voudraient le menacer.","tags":["Tank"],"info":{"attack":3,"defense":9,"magic":3,"difficulty":4},"partype":"Énergie","passif":{"nom":"Barrière de ki","description":"Après avoir lancé une compétence, Shen gagne un bouclier. Affecter d'autres champions réduit le délai de récupération de cet effet."},"competences":[{"nom":"Assaut crépusculaire","description":"Shen rappelle sa lame spirituelle pour attaquer avec elle, infligeant des dégâts basés sur les PV max de sa cible. Les attaques sont grandement renforcées si la lame touche un champion ennemi. Tous les ennemis touchés par la lame sont ralentis quand ils s'éloignent de Shen.","cd":"8/7.25/6.5/5.75/5","cout":"140/130/120/110/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Refuge spirituel","description":"Les attaques qui ciblent Shen ou ses alliés sont bloquées quand ils sont près de la lame spirituelle.","cd":"16/14.5/13/11.5/10","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Rush des ombres","description":"Shen fonce dans une direction en provoquant les ennemis sur son passage.","cd":"18/16/14/12/10","cout":"150","typeCout":" {{ abilityresourcename }}"},{"nom":"Soutien indéfectible","description":"Shen offre un bouclier absorbant les dégâts à un champion allié, puis se téléporte jusqu'à lui.","cd":"200/180/160","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Shyvana","nom":"Shyvana","titre":"Demi-dragon","blurb":"Shyvana est une redoutable guerrière demi-dragon. Bien qu'elle prenne souvent une apparence humanoïde, elle règne également sur les cieux en tant que dragon, réduisant ses ennemis en cendres grâce à son souffle ardent. Depuis qu'elle a sauvé la vie du prince héritier Jarvan IV, Shyvana sert au sein de sa garde royale, et s'efforce de se faire accepter malgré la méfiance des Demaciens.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":6,"magic":3,"difficulty":4},"partype":"Fureur","passif":{"nom":"Armure d'écailles","description":"Les éliminations de champions ennemis, de grands sbires et de grands monstres confèrent à Shyvana des effets Armure d'écailles, améliorant ses résistances."},"competences":[{"nom":"Frappe enflammée","description":"La prochaine attaque de Shyvana frappe à la fois la cible et la zone environnante. Cette compétence peut être réactivée. Lorsque Shyvana est en forme de dragon, la compétence bénéficie d'une réactivation supplémentaire, infligeant d'énormes dégâts à une cible unique.","cd":"10/9/8/7/6","cout":"0","typeCout":"Pas de coût"},{"nom":"Égide de feu","description":"Shyvana gagne un bouclier, de la vitesse de déplacement et, après un court délai, la zone autour d'elle explose.  Lorsqu'elle est en forme de dragon, l'explosion lui octroie des soins si elle touche un champion ennemi.","cd":"13/12.25/11.5/10.75/10","cout":"0","typeCout":"Pas de coût"},{"nom":"Éruption","description":"Shyvana lance une boule de feu qui explose en touchant un grand ennemi et le ralentit. En forme de dragon, la boule de feu traverse et explose au contact des grands ennemis, laissant derrière elle une traînée de feu.","cd":"12/11/10/9/8","cout":"0","typeCout":"Pas de coût"},{"nom":"Vol du dragon","description":"Shyvana se transforme en dragon et bondit en avant, faisant fuir les ennemis sur son passage. Sous forme de dragon, elle devient plus grande et ses compétences de base sont renforcées.","cd":"0","cout":"0","typeCout":"Nécessite 100 de fureur."}]},

{"id":"Singed","nom":"Singed","titre":"Chimiste fou","blurb":"Singed est un alchimiste brillant à la moralité douteuse dont les expériences retourneraient l'estomac du plus cruel des criminels. Vendant son savoir-faire au plus offrant, il n'a que faire de la façon dont ses concoctions nocives sont utilisées. Il considère que le chaos qui s'ensuit est une expérience en soi. Son invention la plus notoire est le « shimmer », qui a permis aux barons de la chimie de faire de Zaun leur terrain de jeu personnel. Mais poussé par la folie, Singed travaille toujours sur quelque chose de nouveau, chaque tentative toujours plus dépravée que la précédente...","tags":["Tank","Mage"],"info":{"attack":4,"defense":8,"magic":7,"difficulty":5},"partype":"Mana","passif":{"nom":"Sillage toxique","description":"Singed bénéficie de l'aspiration des champions proches, gagnant un bref bonus en vitesse de déplacement quand il les dépasse."},"competences":[{"nom":"Piste empoisonnée","description":"Singed laisse une piste empoisonnée derrière lui, infligeant des dégâts aux ennemis sur la route.","cd":"0","cout":"13","typeCout":" pts de mana par sec"},{"nom":"Attrape-mouche","description":"Lance au sol une fiole contenant un puissant adhésif qui ralentit et rend inertes tous les ennemis passant dans la zone d'effet.","cd":"17/16/15/14/13","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Projection","description":"Blesse l'ennemi et le projette derrière Singed. Si la cible projetée par Singed atterrit dans Attrape-mouche, elle est aussi immobilisée.","cd":"10/9.5/9/8.5/8","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Potion de démence","description":"Singed voit plusieurs de ses statistiques largement améliorées grâce à des produits chimiques, et Piste empoisonnée se met à appliquer un effet Hémorragie.","cd":"100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Sion","nom":"Sion","titre":"Colosse mort-vivant","blurb":"Guerrier sanguinaire d'une époque révolue, Sion était célébré comme un héros à Noxus, pour avoir étouffé un roi de Demacia de ses mains nues. Il était l'objet d'une telle dévotion qu'on lui refusa le repos éternel, en le ramenant à la vie pour continuer à servir son empire. Il massacre sans distinction alliés comme ennemis sur son chemin, prouvant à cette occasion qu'il n'a plus rien d'humain. Son armure rivetée à même la chair, Sion charge sans relâche au combat, luttant entre deux coups de sa puissante hache pour tenter de se remémorer qui il était.","tags":["Tank","Fighter"],"info":{"attack":5,"defense":9,"magic":3,"difficulty":5},"partype":"Mana","passif":{"nom":"Gloire posthume","description":"Après avoir été tué, Sion revient temporairement à la vie, mais ses PV diminuent rapidement. Ses attaques deviennent très rapides, soignent Sion et infligent des dégâts supplémentaires en fonction des PV max de la cible."},"competences":[{"nom":"Fracas meurtrier","description":"Sion charge un coup puissant qui s'abattra dans une zone devant lui, infligeant des dégâts aux ennemis quand il relâche l'attaque. S'il charge assez longtemps, il projettera en l'air et étourdira les ennemis touchés.","cd":"10/9/8/7/6","cout":"45","typeCout":" {{ abilityresourcename }}"},{"nom":"Feu intérieur","description":"Sion s'entoure d'un bouclier et peut réactiver la compétence au bout de 3 sec pour infliger des dégâts magiques aux ennemis proches. Quand Sion tue des ennemis, ses PV max sont passivement augmentés.","cd":"15/14/13/12/11","cout":"75/80/85/90/95","typeCout":" {{ abilityresourcename }}"},{"nom":"Cri du tueur","description":"Sion envoie une courte onde de choc qui blesse et ralentit le premier ennemi touché tout en réduisant son armure. Si l'onde de choc atteint un sbire ou un monstre, celui-ci est projeté vers l'arrière : tous les ennemis qu'il touche subissent des dégâts, sont ralentis et perdent de l'armure.","cd":"12/11/10/9/8","cout":"35/40/45/50/55","typeCout":" {{ abilityresourcename }}"},{"nom":"Assaut inarrêtable","description":"Sion charge dans une direction, accélérant peu à peu. Il peut légèrement changer de trajectoire en déplaçant le curseur de la souris. Quand il percute un ennemi, il lui inflige des dégâts et le projette en l'air en fonction de la distance parcourue par sa charge.","cd":"140/100/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Sivir","nom":"Sivir","titre":"Mercenaire du désert","blurb":"Sivir est une célèbre chasseuse de trésors et capitaine de mercenaires œuvrant dans le désert de Shurima. Armée de sa légendaire lame en croix, elle a triomphé d'innombrables batailles pour les clients prêts à honorer ses tarifs exorbitants. Connue pour sa détermination et son ambition démesurée, elle tire sa fierté des nombreux trésors qu'elle a déterrés dans les tombes les plus périlleuses de Shurima… et revendus au prix fort. Mais le jour où des forces ancestrales se sont éveillées au plus profond de Shurima, Sivir s'est retrouvée tiraillée entre deux destins conflictuels.","tags":["Marksman"],"info":{"attack":9,"defense":3,"magic":1,"difficulty":4},"partype":"Mana","passif":{"nom":"Mille-pattes","description":"Sivir gagne un bref bonus en vitesse de déplacement quand elle attaque un champion ennemi."},"competences":[{"nom":"Lame boomerang","description":"Sivir lance sa lame comme un boomerang, infligeant des dégâts à l'aller comme au retour.","cd":"10/9.5/9/8.5/8","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Ricochet","description":"Les prochaines attaques de base de Sivir gagneront de la vitesse d'attaque bonus et rebondiront sur des cibles proches. Les rebonds infligent des dégâts réduits.","cd":"12","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Bouclier magique","description":"Sivir crée une barrière magique capable de bloquer une compétence ennemie. Elle récupère des PV et gagne un bref bonus en vitesse de déplacement si une compétence est bloquée.","cd":"24/22.5/21/19.5/18","cout":"0","typeCout":" {{ abilityresourcename }}"},{"nom":"En chasse","description":"Sivir mène ses alliés au combat, augmentant temporairement leur vitesse de déplacement. De plus, les attaques de Sivir réduisent les délais de récupération de ses compétences.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Skarner","nom":"Skarner","titre":"Souverain originel","blurb":"L'antique Brackern Skarner est vénéré à Ixtal comme l'un des membres fondateurs de la caste dirigeante, les Yun Tal. Il protège farouchement sa nation du reste du monde en écoutant les vibrations de la terre pour détecter de potentielles menaces depuis son antre sous Ixaocan. Alors que de plus en plus de membres des Yun Tal commencent à remettre en question leur isolement, Skarner se montre chaque jour un peu plus paranoïaque et prêt à tout pour assurer la sécurité d'Ixtal et de ses habitants, quel qu'en soit le prix.","tags":["Tank","Fighter"],"info":{"attack":7,"defense":8,"magic":5,"difficulty":5},"partype":"Mana","passif":{"nom":"Échos des vibrations","description":"Les attaques de Skarner, Terre brisée, Soulèvement et Empalement appliquent Tectonique. Au maximum d'effets Tectonique cumulés, les ennemis subissent des dégâts magiques selon leurs PV max sur la durée."},"competences":[{"nom":"Terre brisée/Soulèvement","description":"Skarner arrache du sol un rocher qui renforce ses attaques et peut être lancé comme un puissant projectile.","cd":"8/6.75/5.5/4.25/3","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Bastion sismique","description":"Skarner gagne un bouclier et provoque un séisme dont l'onde de choc blesse et ralentit les ennemis.","cd":"10/9/8/7/6","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Impact d'Ixtal","description":"Skarner charge vers l'avant en traversant les obstacles. S'il percute un champion ou un grand monstre, il l'écrase contre le prochain mur rencontré pour lui infliger des dégâts et l'étourdir.","cd":"22/21/20/19/18","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Empalement","description":"Skarner frappe avec ses queues devant lui pour neutraliser des champions ennemis. Il peut ensuite se déplacer librement en traînant les ennemis ainsi neutralisés.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Smolder","nom":"Smolder","titre":"Dragonnet flamboyant","blurb":"Caché dans les falaises escarpées de la frontière noxienne et attentivement surveillé par sa mère, un jeune dragon apprend ce que signifie être l'héritier de la lignée impériale des dragons camavoriens. Joueur et impatient de grandir, Smolder est prêt à tout pour développer ses nouvelles compétences. Même s'il n'est encore qu'un dragonnet, ses compétences sont déjà impressionnantes : il met aisément le feu à tout ce qui peut brûler.","tags":["Marksman","Mage"],"info":{"attack":8,"defense":2,"magic":5,"difficulty":6},"partype":"Mana","passif":{"nom":"Dragon en herbe","description":"Toucher des champions avec une compétence et éliminer des ennemis avec Boule de feu draconique octroie à Smolder un effet de Dragon en herbe. Les effets ainsi cumulés augmentent les dégâts des compétences de base de Smolder."},"competences":[{"nom":"Boule de feu draconique","description":"Smolder crache du feu sur un ennemi. Au fil des effets cumulés, cette compétence devient plus puissante.","cd":"5.5/5/4.5/4/3.5","cout":"25","typeCout":" {{ abilityresourcename }}"},{"nom":"Atchoum !","description":"Smolder laisse échapper un adorable éternuement enflammé qui explose s'il touche des champions ennemis.","cd":"14/13/12/11/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Flap, flap, flap !","description":"Smolder s'envole, ignorant les obstacles et bombardant l'ennemi qui a le moins de PV.","cd":"24/22/20/18/16","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"MAMAAAN !","description":"Smolder fait appel à sa mère pour qu'elle crache du feu depuis les airs, infligeant des dégâts supplémentaires et ralentissant les ennemis au centre de son feu.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Sona","nom":"Sona","titre":"Virtuose de la harpe","blurb":"Sona est la plus grande virtuose de l'etwahl de Demacia, ne s'exprimant que par ses accords vibrants et gracieux. Ses manières distinguées lui valent d'être appréciée par l'aristocratie, bien que beaucoup soupçonnent ses mélodies envoûtantes de s'apparenter à de la magie, tabou à Demacia. Inaudible pour des étrangers, mais comprise par ses compagnons les plus proches, Sona se sert de ses harmonies pour soigner ses alliés blessés, mais également pour frapper ses ennemis par surprise.","tags":["Support","Mage"],"info":{"attack":5,"defense":2,"magic":8,"difficulty":4},"partype":"Mana","passif":{"nom":"Accord de puissance","description":"<passive>Accelerando</passive> : les compétences de base de Sona octroient une accélération de compétence (hors ultime) lorsqu'elles sont correctement utilisées, jusqu'à un maximum. Au-delà de celui-ci, bien utiliser une compétence réduit le délai de récupération de l'ultime de Sona.<br><br><passive>Accord de puissance</passive> : après avoir lancé quelques compétences, la prochaine attaque de Sona inflige des dégâts magiques bonus et applique un effet supplémentaire selon la dernière compétence de base lancée."},"competences":[{"nom":"Hymne à la bravoure","description":"Sona joue l'Hymne à la bravoure, dont les ondes sonores infligent des dégâts magiques à deux ennemis proches (priorité aux champions et aux monstres). Sona reçoit un halo temporaire qui confère aux alliés touchés par la zone un bonus aux dégâts de leur prochaine attaque contre un ennemi.","cd":"8","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Aria de persévérance","description":"Sona joue l'Aria de persévérance. Sa mélodie protectrice la soigne, ainsi qu'un allié blessé proche. Sona reçoit un halo temporaire qui confère aux alliés touchés par la zone un bouclier temporaire.","cd":"10","cout":"80/85/90/95/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Mélodie de vélocité","description":"Sona joue la Mélodie de vélocité, ce qui confère aux alliés proches un bonus en vitesse de déplacement. Sona reçoit un halo temporaire qui permet aux champions alliés touchés par la zone d'augmenter leur vitesse de déplacement.","cd":"14","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Crescendo","description":"Sona joue son accord ultime, étourdissant les champions ennemis, les forçant à danser et leur infligeant des dégâts magiques.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Soraka","nom":"Soraka","titre":"Enfant des étoiles","blurb":"Voyageuse originaire de dimensions célestes d'au-delà du Mont Targon, Soraka a abandonné son immortalité pour protéger les mortels de leurs instincts violents. Elle cherche à pousser tous ceux qu'elle rencontre à embrasser les vertus de la compassion et de la pitié, allant jusqu'à soigner même ceux qui lui veulent du mal. Et, malgré toutes les souffrances dont Soraka a été témoin dans ce monde, elle croit encore que le peuple de Runeterra n'a pas atteint son plein potentiel.","tags":["Support","Mage"],"info":{"attack":2,"defense":5,"magic":7,"difficulty":3},"partype":"Mana","passif":{"nom":"Salut","description":"Soraka court plus vite en direction des alliés affaiblis à proximité."},"competences":[{"nom":"Appel de l'étoile","description":"Une étoile s'abat à l'endroit ciblé, infligeant des dégâts magiques et ralentissant les ennemis. Si un champion ennemi est touché par Appel de l'étoile, Soraka récupère des PV.","cd":"8/7/6/5/4","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Infusion astrale","description":"Soraka sacrifie une partie de ses PV pour soigner un autre champion allié.","cd":"6/5/4/3/2","cout":"40/45/50/55/60","typeCout":"% des PV max, {{ cost }} pts de mana"},{"nom":"Équinoxe","description":"Crée une zone qui réduit au silence tous les ennemis s'y trouvant. Quand la zone disparaît, tous les ennemis qui s'y trouvent encore sont immobilisés.","cd":"20/19/18/17/16","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Souhait","description":"Soraka remplit ses alliés d'espoir, ce qui rend immédiatement des PV à tous les champions alliés et à elle-même.","cd":"150/135/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Swain","nom":"Swain","titre":"Grand général noxien","blurb":"Jericho Swain est le chef visionnaire de Noxus, une nation expansionniste qui ne respecte que la force. Bien que déchu et blessé pendant les guerres ioniennes, il a pris le contrôle de l'empire avec une féroce détermination… Et une nouvelle main, démoniaque, a remplacé celle qu'il a perdue au combat. Désormais, Swain dirige ses armées sur la ligne de front, face à des ténèbres qu'il est le seul à percevoir à l'horizon, dans le vol des corbeaux attirés par les cadavres qui l'entourent. Dans un tourbillon de sacrifices et de regrets, le plus grand secret entre tous, c'est que le véritable ennemi est à l'intérieur.","tags":["Mage","Support"],"info":{"attack":2,"defense":6,"magic":9,"difficulty":8},"partype":"Mana","passif":{"nom":"Nuée de corbeaux","description":"Les corbeaux de Swain collectent des <i>fragments d'âme</i> qui lui rendent des PV et augmentent définitivement ses PV max."},"competences":[{"nom":"Poigne mortifère","description":"Swain tire plusieurs projectiles surnaturels qui traversent les ennemis. Les dégâts que subissent les ennemis augmentent avec le nombre de projectiles qui les touchent.","cd":"7/6/5/4/3","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Œil de l'empire","description":"Swain ouvre un œil démoniaque qui blesse et ralentit les ennemis. Les champions touchés sont révélés et octroient un Fragment d'âme à Swain.","cd":"22/21/20/19/18","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Capture","description":"Swain tire une vague d'énergie démoniaque. Celle-ci revient ensuite vers lui et immobilise les ennemis touchés. Swain peut ensuite choisir d'attirer vers lui tous les champions immobilisés. Cette compétence a un délai de récupération plus court pendant Incarnation démoniaque.","cd":"12/11.5/11/10.5/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Incarnation démoniaque","description":"Swain se transforme en démon et draine les PV des champions ennemis, sbires ennemis et monstres neutres proches. Swain peut lancer Éruption démoniaque pour provoquer une explosion de feu spirituel qui décime et ralentit les ennemis proches. Cette forme perdure tant que Swain draine les PV de champions ennemis.","cd":"120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Sylas","nom":"Sylas","titre":"Révolutionnaire déchaîné","blurb":"Élevé dans l'un des quartiers les plus pauvres de Demacia, Sylas de Liebourg est devenu le symbole du côté obscur de la Grande cité. Enfant, sa capacité à déceler la sorcellerie cachée attira l'attention des tristement célèbres traqueurs de mages, qui finirent par l'emprisonner pour avoir retourné ses pouvoirs contre eux. Désormais libéré de ses chaînes, Sylas est un révolutionnaire convaincu, employant la magie de ceux qui l'entourent pour ravager le royaume qu'il a autrefois servi… Et son groupe de mages exilés semble grandir chaque jour un peu plus.","tags":["Mage","Assassin"],"info":{"attack":3,"defense":4,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Volée de pétricite","description":"Après avoir lancé une compétence, Sylas stocke une charge de Volée de pétricite. Les attaques de base de Sylas dépensent une charge pour donner un coup de chaînes énergisé autour de lui, infligeant des dégâts magiques supplémentaires aux ennemis touchés. Tant que Sylas possède une charge de Volée de pétricite, sa vitesse d'attaque est augmentée. "},"competences":[{"nom":"Croix du forçat","description":"Sylas donne un coup en croisant ses chaînes, infligeant des dégâts magiques à l'endroit ciblé et ralentissant les ennemis. <br><br>Après un délai, une explosion d'énergie magique se produit à l'intersection des chaînes, infligeant des dégâts.","cd":"10/9/8/7/6","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Régicide","description":"Sylas se jette sur un ennemi pour infliger des dégâts et, contre des champions, récupérer des PV.","cd":"12/10.5/9/7.5/6","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Évasion / Enlèvement","description":"Sylas se rue dans une direction. Sylas peut réactiver cette compétence pour lancer ses chaînes et se rapprocher de l'ennemi touché.","cd":"13/12/11/10/9","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Détournement","description":"Sylas vole la compétence ultime de l'ennemi et peut la lancer librement.","cd":"80/55/30","cout":"75","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Syndra","nom":"Syndra","titre":"Souveraine obscure","blurb":"Syndra est une effrayante magicienne originaire d'Ionia, aux pouvoirs impressionnants. Enfant, elle perturba les anciens de son village avec sa magie sauvage et incontrôlée. Elle fut confiée à un maître dans l'espoir qu'elle apprendrait à se contrôler, mais elle finit par découvrir que son prétendu mentor limitait ses capacités. Créant des sphères d'énergie noire avec ses sentiments de douleur et de trahison, Syndra jura de détruire quiconque tenterait de la contrôler.","tags":["Mage"],"info":{"attack":2,"defense":3,"magic":9,"difficulty":8},"partype":"Mana","passif":{"nom":"Transcendance","description":"Syndra collecte des éclats de courroux quand elle gagne des niveaux et quand elle blesse des ennemis, ce qui améliore ses compétences.<br><br><font color='#FF9900'>Sphère noire</font> : Syndra peut stocker une charge supplémentaire.<br><font color='#FF9900'>Force de la volonté</font> : dégâts bruts supplémentaires.<br><font color='#FF9900'>Dispersion des faibles</font> : largeur augmentée et ralentit toutes les cibles.<br><font color='#FF9900'>Déchaînement de puissance</font> : exécute les cibles dont les PV sont bas."},"competences":[{"nom":"Sphère noire","description":"Syndra invoque une sphère noire, infligeant des dégâts magiques. La sphère dure quelques secondes et peut être manipulée grâce aux autres compétences de Syndra.","cd":"7","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Force de la volonté","description":"Syndra saisit et lance une sphère noire ou un sbire ennemi, infligeant des dégâts magiques et réduisant la vitesse de déplacement des ennemis.","cd":"12/11/10/9/8","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Dispersion des faibles","description":"Syndra repousse les ennemis et les sphères noires, infligeant des dégâts magiques. Les ennemis frappés par les sphères noires sont étourdis.","cd":"15","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Déchaînement de puissance","description":"Syndra bombarde un champion ennemi avec toutes ses sphères noires.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"TahmKench","nom":"Tahm Kench","titre":"Roi des rivières","blurb":"Au fil du temps, on lui a donné de nombreux noms. Le démon Tahm Kench voyage dans les cours d'eau de Runeterra, nourrissant son insatiable appétit de la misère des autres. Bien qu'il puisse sembler particulièrement charmant et fier, il rôde dans le monde tel un vagabond à la recherche d'une proie sans méfiance. Sa langue extensible peut étourdir un guerrier en armure à plusieurs mètres de distance, avant de l'attirer dans son estomac gargouillant vers un abysse dont il n'a que peu de chances de revenir.","tags":["Tank","Support"],"info":{"attack":3,"defense":9,"magic":6,"difficulty":5},"partype":"Mana","passif":{"nom":"Goût acquis","description":"Tahm Kench met tout son poids dans ses attaques, permettant à ses PV totaux d'augmenter ses dégâts. Blesser des champions ennemis leur applique des effets <spellName>Goût acquis</spellName>. À 3 effets cumulés, Tahm Kench peut utiliser <spellName>Dévoration</spellName> sur un champion ennemi."},"competences":[{"nom":"Coup de langue","description":"Tahm Kench donne un coup de fouet avec sa langue, blessant et ralentissant la première unité touchée et récupérant des PV s'il touche un champion ennemi.<br><br>Cette compétence applique un effet <spellName>Goût acquis</spellName> sur les champions ennemis. Si le champion portait déjà 3 effets <spellName>Goût acquis</spellName>, il est étourdi et les effets sont consommés.","cd":"7/6.5/6/5.5/5","cout":"50/46/42/38/34","typeCout":" {{ abilityresourcename }}"},{"nom":"Plongée abyssale","description":"Tahm Kench plonge, puis réapparaît à l'endroit ciblé, blessant et projetant dans les airs tous les ennemis dans la zone.","cd":"21/20/19/18/17","cout":"60/75/90/105/120","typeCout":" {{ abilityresourcename }}"},{"nom":"Peau épaisse","description":"<passive>Passive :</passive> Tahm Kench stocke un pourcentage des dégâts qu'il subit. En dehors des combats, il récupère des PV équivalents à une partie des dégâts stockés.<br><br><active>Active :</active> Tahm Kench convertit tous les dégâts stockés en bouclier temporaire.","cd":"3","cout":"0","typeCout":" {{ abilityresourcename }}"},{"nom":"Dévoration","description":"Tahm Kench dévore un champion pendant quelques secondes, lui infligeant des dégâts magiques s'il s'agit d'un ennemi ou lui octroyant un bouclier s'il s'agit d'un allié.","cd":"0","cout":"100","typeCout":" pts de mana"}]},

{"id":"Taliyah","nom":"Taliyah","titre":"Tisseuse de pierres","blurb":"Taliyah est une mage issue des tribus nomades de Shurima, déchirée entre l'émerveillement de la jeunesse et les responsabilités des adultes. Elle a déjà traversé pratiquement tout Valoran pour découvrir la véritable nature de ses pouvoirs toujours plus puissants, avant d'être récemment retournée dans sa tribu pour la protéger. Certains se méprennent sur sa compassion et paient leur erreur au prix fort : sous son attitude joviale, Taliyah dissimule une volonté de fer capable de déplacer les montagnes et un esprit assez féroce pour faire trembler la terre.","tags":["Mage","Support"],"info":{"attack":1,"defense":7,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Surf tellurique","description":"Taliyah augmente sa vitesse de déplacement lorsqu'elle est près des murs."},"competences":[{"nom":"Rafale filée","description":"Taliyah lance une rafale de pierres dans une direction ciblée tout en se déplaçant librement. Cela crée un sol ouvragé sous ses pieds. Si Taliyah lance Rafale filée en se trouvant sur un sol ouvragé, elle consomme ce sol et lance un rocher plus puissant qui ralentit les ennemis.","cd":"7/6/5/4/3","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Poussée sismique","description":"Taliyah provoque l'éruption d'une zone du sol, ce qui projette les ennemis dans la direction de son choix.","cd":"14/12.5/11/9.5/8","cout":"40/30/20/10/0","typeCout":" {{ abilityresourcename }}"},{"nom":"Défilage tellurique","description":"Taliyah crée un champ de mines ralentissant. Si des ennemis effectuent une ruée ou sont projetés par-dessus, les mines explosent et les étourdissent.","cd":"14","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Mur de la tisseuse","description":"Taliyah crée un très long mur et surfe ensuite dessus.","cd":"180/150/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Talon","nom":"Talon","titre":"Lame des ténèbres","blurb":"Talon est la dague cachée dans l'ombre, un assassin impitoyable, capable de frapper sans prévenir et de fuir avant que l'alerte ne soit donnée. Il a acquis une dangereuse réputation dans les brutales rues de Noxus, où il a été contraint de se battre, de tuer et de voler pour survivre. Adopté par la tristement célèbre famille Du Couteau, il use maintenant de ses talents au service de l'empire, assassinant les chefs, capitaines et héros ennemis... mais aussi tout Noxien qui aurait attiré l'ire de ses maîtres.","tags":["Assassin"],"info":{"attack":9,"defense":3,"magic":1,"difficulty":7},"partype":"Mana","passif":{"nom":"Saignée fatale","description":"Les compétences de Talon blessent les champions et les grands monstres (cumulable 3 fois). Quand Talon lance une attaque de base sur un champion portant 3 effets Blessure, ce champion se met à saigner et subit d'importants dégâts sur la durée."},"competences":[{"nom":"Diplomatie noxienne","description":"Talon poignarde l'unité ciblée. S'il est en mêlée, cette attaque inflige des dégâts critiques. S'il est à distance, Talon saute sur la cible avant de la poignarder. Talon regagne des PV et le délai de récupération est réduit si la compétence tue la cible.","cd":"8/7.5/7/6.5/6","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Ratissage","description":"Talon projette une volée de lames qui reviennent ensuite vers lui, infligeant des dégâts physiques à chaque fois qu'elles transpercent un ennemi. En revenant, les lames infligent des dégâts supplémentaires et ralentissent les unités touchées.","cd":"9/8.5/8/7.5/7","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Voie de l'assassin","description":"Talon saute par-dessus n'importe quel terrain ou bâtiment, jusqu'à une distance maximale. Cette compétence a un court délai de récupération, mais le terrain franchi a un long délai de récupération.","cd":"0","cout":"0","typeCout":"Pas de coût"},{"nom":"Assaut ténébreux","description":"Talon projette des lames autour de lui et devient invisible, augmentant sa vitesse de déplacement. Quand Talon redevient visible, les lames reviennent vers lui. Chaque fois que les lames se déplacent, Assaut ténébreux inflige des dégâts physiques aux ennemis touchés par au moins une lame.","cd":"100/80/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Taric","nom":"Taric","titre":"Bouclier de Valoran","blurb":"Taric est la Manifestation du Protecteur, doté d'un incroyable pouvoir en tant que gardien de la vie, de l'amour et de la beauté sur Runeterra. Couvert d'opprobre pour avoir abandonné son devoir et exilé de sa terre natale de Demacia, Taric a entrepris l'ascension du Mont Targon en quête de rédemption et s'est découvert une mission supérieure au sein des étoiles. Imprégné de la force antique de Targon, le Bouclier de Valoran monte désormais constamment la garde contre la corruption insidieuse du Néant.","tags":["Support","Tank"],"info":{"attack":4,"defense":8,"magic":5,"difficulty":3},"partype":"Mana","passif":{"nom":"Plastronneur","description":"Lancer des compétences renforce les 2 prochaines attaques de base de Taric, leur permettant d'infliger des dégâts magiques supplémentaires, de réduire les délais de récupération de ses compétences et de s'enchaîner rapidement."},"competences":[{"nom":"Bénédiction stellaire","description":"Rend des PV aux champions alliés proches en fonction du nombre de charges stockées. Les attaques renforcées par Plastronneur octroient une charge de Bénédiction stellaire.","cd":"3","cout":"60","typeCout":" pts de mana, toutes les charges"},{"nom":"Bastion","description":"Augmente passivement l'armure de Taric et de tout champion allié affecté par Bastion.<br><br>À l'activation, offre un bouclier à un allié et ce dernier bénéficie de l'effet Bastion aussi longtemps qu'il reste près de Taric. Les compétences de Taric se lancent également depuis l'allié affecté par Bastion.","cd":"15","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Éblouissement","description":"Taric prépare un rayon de lumière stellaire qui, après un bref délai, inflige des dégâts magiques et étourdit les ennemis.","cd":"16/15/14/13/12","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Lumière cosmique","description":"Après un délai, nimbe les champions alliés proches d'énergie cosmique, les rendant invulnérables pendant un court instant.","cd":"180/150/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Teemo","nom":"Teemo","titre":"Éclaireur de Bandle","blurb":"N'ayant pas peur de braver les obstacles les plus dangereux, Teemo explore le monde avec un enthousiasme débordant et une bonne humeur contagieuse. Yordle au sens moral inflexible, il suit fièrement les préceptes du Code des éclaireurs de Bandle, parfois avec tant d'empressement qu'il en oublie les conséquences néfastes de ses actions. Pour certains, l'existence même des éclaireurs est à remettre en cause. Mais ce qu'il ne faut surtout pas remettre en cause, ce sont les convictions de Teemo !","tags":["Marksman","Mage"],"info":{"attack":5,"defense":3,"magic":7,"difficulty":6},"partype":"Mana","passif":{"nom":"Guérilla","description":"Si Teemo reste immobile et sans agir pendant un court instant, il devient invisible indéfiniment. Dans les herbes hautes, Teemo peut activer et maintenir son invisibilité tout en se déplaçant. Quand il quitte son invisibilité, Teemo profite de l'Effet de surprise, augmentant sa vitesse d'attaque pendant quelques secondes."},"competences":[{"nom":"Fléchette aveuglante","description":"Un puissant venin obscurcit la vue de l'ennemi, infligeant des dégâts à la cible et l'aveuglant pendant la durée de l'effet.","cd":"7","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Vélocité","description":"La vitesse de déplacement de Teemo est passivement augmentée jusqu'à ce qu'il soit frappé par un champion ennemi ou une tourelle ennemie. Teemo peut sprinter pour gagner un bonus temporaire en vitesse de déplacement qui n'est pas annulé si Teemo est touché.","cd":"14","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Tir toxique","description":"Toutes les attaques de Teemo empoisonnent la cible, infligeant des dégâts %i:OnHit% <OnHit>à l'impact</OnHit> puis chaque seconde pendant 4 sec.","cd":"0","cout":"0","typeCout":"Compétence passive"},{"nom":"Piège nocif","description":"Teemo se sert d'un des champignons stockés dans son sac à dos pour lancer un piège explosif. Si un ennemi marche sur le piège, un nuage empoisonné s'en échappe, ralentit les ennemis et leur inflige des dégâts sur la durée. Les champignons lancés sur d'autres champignons rebondissent et ont ainsi une plus grande portée.","cd":"0.25","cout":"75/55/35","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Thresh","nom":"Thresh","titre":"Garde aux chaînes","blurb":"Sadique mais rusé, Thresh est un ambitieux spectre des Îles obscures. Autrefois le gardien d'innombrables secrets des arcanes, il fut terrassé par un pouvoir plus grand que la vie ou la mort, et il s'alimente maintenant des souffrances et des tourments qu'il inflige à d'autres avec une inventivité cruelle. Les souffrances de ses victimes ne se limitent pas à leur enveloppe mortelle, car Thresh fait agoniser leurs âmes, les emprisonnant pour l'éternité dans sa lanterne impie.","tags":["Support","Tank"],"info":{"attack":5,"defense":6,"magic":6,"difficulty":7},"partype":"Mana","passif":{"nom":"Damnation","description":"Thresh peut collecter les âmes des ennemis qui meurent près de lui, augmentant définitivement son armure et sa puissance."},"competences":[{"nom":"Peine capitale","description":"Thresh ligote un ennemi dans ses chaînes et l'attire vers lui. Activer cette compétence une deuxième fois attire Thresh vers l'ennemi.","cd":"19/16.5/14/11.5/9","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Lien des ténèbres","description":"Thresh lance une lanterne qui protège les champions alliés proches contre les dégâts. Les alliés peuvent cliquer sur la lanterne pour se ruer vers Thresh.","cd":"21/20/19/18/17","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Fauchage","description":"Les attaques de Thresh se chargent, infligeant davantage de dégâts s'il attend plus entre les attaques. À l'activation, Thresh effectue un fauchage avec sa chaîne, envoyant tous les ennemis touchés dans la direction du coup.","cd":"13/12.25/11.5/10.75/10","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"La cage","description":"Une prison dont les murs ralentissent et blessent les ennemis qui les brisent.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Tristana","nom":"Tristana","titre":"Canonnière yordle","blurb":"Si bon nombre d'autres yordles utilisent leur énergie débordante pour explorer, découvrir, inventer ou plus simplement jouer de mauvais tours, Tristana a toujours puisé son inspiration dans les récits des grands guerriers. Elle avait beaucoup entendu parler de Runeterra, de ses factions et de ses guerres, et elle pensait que les yordles aussi avaient l'étoffe des légendes. Dès son arrivée dans ce monde, elle s'équipa de son fidèle canon Boomer pour se jeter au combat avec un courage et un optimisme sans bornes.","tags":["Marksman","Assassin"],"info":{"attack":9,"defense":3,"magic":5,"difficulty":4},"partype":"Mana","passif":{"nom":"Tir de précision","description":"Augmente la portée d'attaque de Tristana quand elle gagne un niveau."},"competences":[{"nom":"Tir rapide","description":"Tristana tire plus rapidement avec son arme ; sa vitesse d'attaque est augmentée temporairement.","cd":"20/19/18/17/16","cout":"15/20/25/30/35","typeCout":" {{ abilityresourcename }}"},{"nom":"Saut roquette","description":"Tristana pointe son arme vers le sol et tire pour se propulser jusqu'à une destination éloignée, infligeant des dégâts aux unités proches et les ralentissant pendant un court instant à l'atterrissage.","cd":"22/20/18/16/14","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge explosive","description":"Lorsque Tristana élimine une unité, ses projectiles explosent et infligent des dégâts aux ennemis proches. Peut être activé pour placer sur une cible ennemie une bombe qui explose après un court moment, infligeant des dégâts aux unités proches.","cd":"16/15.5/15/14.5/14","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Tir à impact","description":"Tristana charge un énorme boulet de canon dans son arme et tire sur une unité ennemie, ce qui inflige des dégâts magiques et repousse la cible. Si la cible porte une Charge explosive, le rayon de déflagration de la charge est doublé.","cd":"100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Trundle","nom":"Trundle","titre":"Roi des trolls","blurb":"Trundle est un troll massif, sournois et malicieux. Il n'y a rien qu'il ne puisse soumettre à sa volonté avec son gourdin, pas même Freljord. Extrêmement territorial, Trundle traque tous ceux qui sont assez fous pour pénétrer sur ses terres. Ensuite, armé de son imposante massue en glace pure, il fait trembler ses ennemis avant de leur planter des éclats de glace dans le corps et de se moquer d'eux tandis que la toundra absorbe leur sang.","tags":["Fighter","Tank"],"info":{"attack":7,"defense":6,"magic":2,"difficulty":5},"partype":"Mana","passif":{"nom":"Tribut du roi","description":"Quand une unité ennemie meurt près de Trundle, il récupère un pourcentage des PV max de celle-ci."},"competences":[{"nom":"Morsure","description":"Trundle mord un ennemi, lui infligeant des dégâts, le ralentissant un court instant et drainant ses dégâts d'attaque.","cd":"3.5","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Royaume gelé","description":"Trundle s'approprie la zone cible, augmentant sa vitesse d'attaque, sa vitesse de déplacement et les soins qu'il reçoit de toutes les sources.","cd":"18/17/16/15/14","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Montagne de glace","description":"Trundle crée une montagne de glace sur la zone cible, ce qui bloque le passage et ralentit les unités ennemies proches.","cd":"21/19.5/18/16.5/15","cout":"75","typeCout":" {{ abilityresourcename }}"},{"nom":"Soumission","description":"Trundle vole immédiatement un pourcentage des PV, de l'armure et de la résistance magique de sa cible. Ensuite, le nombre de PV, de points d'armure et de résistance magique volés double en 4 sec.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Tryndamere","nom":"Tryndamere","titre":"Roi barbare","blurb":"Poussé par une rage infinie, Tryndamere traverse Freljord et parfait sa maîtrise du combat en défiant les plus grands guerriers du nord, pour se préparer aux jours sombres qui s'annoncent. Longtemps dominé par sa haine, il cherchait à se venger de l'annihilation de son clan, mais il a depuis rencontré Ashe et trouvé un nouveau foyer auprès des Avarosans. Sa force est pratiquement surhumaine et son courage légendaire, et cela lui a permis de remporter avec ses nouveaux alliés d'innombrables victoires plus qu'improbables.","tags":["Fighter","Assassin"],"info":{"attack":10,"defense":5,"magic":2,"difficulty":5},"partype":"Fureur","passif":{"nom":"Vague de violence","description":"Tryndamere gagne de la Fureur à chaque attaque, coup critique et coup de grâce qu'il inflige. La Fureur augmente passivement ses chances de coup critique et elle peut être utilisée par sa compétence Soif de sang."},"competences":[{"nom":"Soif de sang","description":"Tryndamere s'épanouit lors des combats, ce qui accroît ses dégâts d'attaque au fur et à mesure qu'il subit des blessures. Il peut lancer Soif de sang pour consommer sa Fureur et se soigner.","cd":"12","cout":"0","typeCout":"Pas de coût"},{"nom":"Moquerie","description":"Tryndamere lance un hurlement, réduisant les dégâts d'attaque des champions proches. De plus, les ennemis ayant le dos tourné voient leur vitesse de déplacement être réduite.","cd":"14","cout":"0","typeCout":"Pas de coût"},{"nom":"Balafre","description":"Tryndamere lance un coup de taille vers une unité ciblée, infligeant des dégâts aux ennemis sur son chemin.","cd":"12/11/10/9/8","cout":"0","typeCout":"Pas de coût"},{"nom":"Rage inépuisable","description":"La soif de combattre de Tryndamere devient si puissante qu'il ne peut pas mourir, quelles que soient les blessures qu'il subit.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"TwistedFate","nom":"Twisted Fate","titre":"Maître des cartes","blurb":"Twisted Fate est un virtuose des cartes à la réputation ambiguë qui a parcouru le monde entier pour l'éblouir de son charme et de ses talents, s'attirant l'admiration et la haine des riches comme des pigeons. Il prend rarement les choses au sérieux, salue chaque nouveau jour avec un sourire moqueur et insouciant. Twisted a toujours un atout dans sa manche, au propre comme au figuré.","tags":["Mage","Marksman"],"info":{"attack":6,"defense":2,"magic":6,"difficulty":9},"partype":"Mana","passif":{"nom":"Dé pipé","description":"Quand il tue une unité, Twisted Fate lance son dé « porte-bonheur » et reçoit entre 1 et 6 PO supplémentaires."},"competences":[{"nom":"Atouts","description":"Twisted Fate tire trois cartes qui infligent des dégâts à toutes les unités qu'elles transpercent.","cd":"6/5.75/5.5/5.25/5","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Bonne pioche","description":"Twisted Fate choisit une carte dans son paquet et l'utilise pour l'attaque suivante, gagnant des effets supplémentaires.","cd":"6","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Paquet","description":"Twisted Fate inflige des dégâts supplémentaires toutes les 4 attaques. En outre, sa vitesse d'attaque est augmentée.","cd":"0","cout":"0","typeCout":"Compétence passive"},{"nom":"Destinée","description":"Twisted Fate prédit le destin de ses ennemis, révélant les champions ennemis et permettant d'utiliser Portail, ce qui téléporte Twisted Fate à un endroit de la carte en 1.5 sec.","cd":"170/140/110","cout":"100","typeCout":" {{ abilityresourcename }}"}]},
