<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champion - League of Legends Memory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: url("lol.jpg") fixed center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .card {
            background: rgba(255,255,255,0.92);
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .back {
            display: inline-block;
            margin-bottom: 24px;
            color: #8B4513;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        .back:hover { text-decoration: underline; }
        .header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .header img {
            width: 200px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 36px;
            color: #222;
        }
        .header .title {
            font-size: 18px;
            color: #888;
            font-weight: 500;
            font-style: italic;
        }
        .role-under-name {
            font-size: 16px;
            font-weight: bold;
            color: #8B4513;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .role-under-name .role-icon {
            width: 22px;
            height: 22px;
            vertical-align: middle;
        }
        .role-under-name .role-label {
            font-size: 14px;
            color: #8B4513;
        }
        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #8B4513;
            margin: 24px 0 12px 0;
            border-bottom: 2px solid rgba(3,151,171,0.2);
            padding-bottom: 6px;
        }
        .histoire {
            font-size: 16px;
            line-height: 1.6;
            color: #444;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 12px 0;
        }
        .stat-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-bar .label {
            width: 70px;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        .stat-bar .bar-bg {
            flex: 1;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        .stat-bar .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s;
        }
        .stat-bar .bar-fill.attack { background: #e74c3c; }
        .stat-bar .bar-fill.defense { background: #2ecc71; }
        .stat-bar .bar-fill.magic { background: #8518a1; }
        .stat-bar .bar-fill.difficulty { background: #f39c12; }
        .ability {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 10px;
        }
        .ability .nom {
            font-weight: bold;
            font-size: 17px;
            color: #222;
        }
        .ability .type {
            font-size: 13px;
            color: #8B4513;
            font-weight: 600;
            margin-left: 8px;
        }
        .ability .desc {
            font-size: 15px;
            color: #555;
            margin-top: 4px;
        }
        .ability .cost {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .loading {
            text-align: center;
            font-size: 20px;
            color: #666;
            padding: 60px 0;
        }
        .error {
            text-align: center;
            font-size: 18px;
            color: #e74c3c;
            padding: 60px 0;
        }
        @media (max-width: 600px) {
            .card { padding: 20px; }
            .header { flex-direction: column; text-align: center; }
            .header img { width: 150px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <a class="back" href="index.html?tab=lol">&larr; Retour aux champions</a>
        <div class="loading">Chargement...</div>

    <script>
var CHAMPIONS_DATA = [
{"id":"Aatrox","nom":"Aatrox","titre":"Épée des Darkin","blurb":"Autrefois, Aatrox et ses frères étaient honorés pour avoir défendu Shurima contre le Néant. Mais ils finirent par devenir une menace plus grande encore pour Runeterra : la ruse et la sorcellerie furent employées pour les battre. Cependant, après des siècles d'emprisonnement, Aatrox fut le premier à retrouver sa liberté, en corrompant et transformant les mortels assez stupides pour tenter de s'emparer de l'arme magique qui contenait son essence. Désormais en possession d'un corps qu'il a approximativement transformé pour rappeler son ancienne forme, il arpente Runeterra en cherchant à assouvir sa vengeance apocalyptique.","tags":["Fighter"],"info":{"attack":8,"defense":4,"magic":3,"difficulty":4},"partype":"Puits de sang","passif":{"nom":"Posture du massacreur","description":"Régulièrement, la prochaine attaque de base d'Aatrox inflige des <magicDamage>dégâts magiques</magicDamage> bonus et le soigne, selon un pourcentage des PV max de la cible. "},"competences":[{"nom":"Épée des Darkin","description":"Aatrox abat son épée devant lui, infligeant des dégâts physiques. Il peut frapper jusqu'à 3 fois et chaque coup a une zone d'effet différente.","cd":"14/12/10/8/6","cout":"0","typeCout":"Pas de coût"},{"nom":"Chaînes infernales","description":"Aatrox frappe le sol, blessant le premier ennemi touché. Les champions et les grands monstres doivent vite quitter la zone d'effet sous peine d'être ramenés de force au point d'impact et de subir à nouveau les dégâts.","cd":"20/18/16/14/12","cout":"0","typeCout":"Pas de coût"},{"nom":"Ruée obscure","description":"Passivement, Aatrox se soigne quand il blesse des champions ennemis. À l'activation, il se rue dans une direction.","cd":"9/8/7/6/5","cout":"0","typeCout":"Pas de coût"},{"nom":"Fossoyeur des mondes","description":"Aatrox libère sa forme démoniaque, effrayant les sbires ennemis proches et augmentant ses dégâts d'attaque, ses soins et sa vitesse de déplacement. La durée est prolongée s'il participe à l'élimination d'un champion ennemi.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Ahri","nom":"Ahri","titre":"Renarde à neuf queues","blurb":"Connectée à la magie du royaume spirituel, Ahri est une mystérieuse Vastaya aux traits de renard qui peut manipuler les émotions de sa proie et consumer son essence, afin de recevoir des fragments de sa mémoire. Ahri fut un temps un terrifiant prédateur, mais elle voyage désormais à la recherche des vestiges de ses ancêtres tout en essayant de remplacer les souvenirs qu'elle a volés par sa propre expérience de l'existence.","tags":["Mage","Assassin"],"info":{"attack":3,"defense":4,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Vol essentiel","description":"Après avoir tué 9 sbires ou monstres, Ahri récupère des PV.<br>Après avoir participé à l'élimination d'un champion ennemi, Ahri récupère encore plus de PV."},"competences":[{"nom":"Orbe d'illusion","description":"Ahri lance son orbe et le ramène vers elle, infligeant des dégâts magiques à l'aller et des dégâts bruts au retour. ","cd":"7","cout":"55/65/75/85/95","typeCout":" {{ abilityresourcename }}"},{"nom":"Lucioles","description":"Ahri gagne un bref bonus en vitesse de déplacement et libère trois lucioles qui verrouillent et attaquent les ennemis proches.","cd":"9/8/7/6/5","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Charme","description":"Ahri envoie un baiser qui blesse et charme le premier ennemi qu'il touche, interrompant immédiatement ses compétences de déplacement et le faisant marcher docilement vers elle.","cd":"12","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Assaut spirituel","description":"Ahri se rue vers l'avant et tire des traits spirituels, infligeant des dégâts aux ennemis proches. Assaut spirituel peut être lancé jusqu'à 3 fois avant d'entrer en phase de récupération et Ahri gagne des réactivations en participant à l'élimination de champions ennemis.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Akali","nom":"Akali","titre":"Assassine rebelle","blurb":"Ayant abandonné l'Ordre Kinkou et le titre de Poing de l'ombre, Akali combat aujourd'hui seule, prête à devenir l'arme mortelle dont son peuple a besoin. Bien qu'elle n'oublie rien de tout ce que son maître Shen lui a enseigné, elle a juré de défendre Ionia contre ses ennemis, une élimination après l'autre. Akali tue sans faire de bruit, mais son message est fort et clair : craignez l'assassin sans maître.","tags":["Assassin"],"info":{"attack":5,"defense":3,"magic":8,"difficulty":7},"partype":"Énergie","passif":{"nom":"Marque d'assassin","description":"Blesser un champion avec une compétence crée un cercle d'énergie autour de lui. Quitter ce cercle renforce la prochaine attaque d'Akali en augmentant sa portée et ses dégâts."},"competences":[{"nom":"Vague de kunais","description":"Akali lance cinq kunais, infligeant des dégâts selon ses dégâts d'attaque supplémentaires et sa puissance et ralentissant les ennemis.","cd":"1.5","cout":"110/100/90/80/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Linceul nébuleux","description":"Akali crée un nuage de fumée et augmente brièvement sa vitesse de déplacement. Dans ce nuage, Akali est invisible et impossible à cibler. Si elle attaque ou utilise des compétences, elle est temporairement révélée.  ","cd":"20/19/18/17/16","cout":"0","typeCout":" pts d'énergie"},{"nom":"Lancer acrobatique","description":"Fait un salto arrière et lance un shuriken vers l'avant, infligeant des dégâts magiques. Le premier ennemi ou nuage de fumée touché est marqué. Réactivez la compétence pour vous ruer sur la cible marquée et infliger des dégâts supplémentaires.","cd":"16/14.5/13/11.5/10","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Maîtrise absolue","description":"Akali bondit dans une direction, blessant les ennemis qu'elle frappe. Réactivation : Akali se rue dans une direction, exécutant tous les ennemis qu'elle frappe.","cd":"120/90/60","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Akshan","nom":"Akshan","titre":"Sentinelle rebelle","blurb":"Se jouant du danger, Akshan combat le mal sans jamais se départir de son charisme (il ne faut jamais sous-estimer l'importance de la cape) et de sa droiture. Il est passé maître dans l'art du combat furtif, ce qui lui permet d'échapper au regard de ses ennemis et de réapparaître lorsqu'ils s'y attendent le moins. À l'aide de son sens aigu de la justice et d'une arme légendaire défiant la mort elle-même, il redresse les torts des nombreux vauriens de Runeterra. Sa règle d'or : « ne sois pas crapuleux. »","tags":["Marksman","Assassin"],"info":{"attack":0,"defense":0,"magic":0,"difficulty":0},"partype":"Mana","passif":{"nom":"Fourberie","description":"Tous les trois coups venant de ses attaques ou de ses compétences, Akshan inflige des dégâts supplémentaires. Il gagne aussi un bouclier si la cible est un champion.<br><br>Quand Akshan attaque, il effectue une attaque supplémentaire qui inflige moins de dégâts. S'il annule l'attaque supplémentaire, il gagne à la place de la vitesse de déplacement."},"competences":[{"nom":"Vengerang","description":"Akshan lance un boomerang qui inflige des dégâts à l'aller et au retour. Sa portée augmente chaque fois qu'il touche un ennemi.","cd":"9/8/7/6/5","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Cavalier seul","description":"Passivement, Akshan applique une marque Crapule sur les champions ennemis quand ils tuent des champions alliés. Si Akshan tue une Crapule, il ressuscite les alliés qu'elle a tués, gagne des PO supplémentaires et dissipe toutes les marques.<br><br>À l'activation, Akshan se camoufle. Il gagne aussi de la vitesse de déplacement et de la régénération du mana quand il se dirige vers des Crapules. Akshan perd rapidement son camouflage quand il est hors des hautes herbes ou loin des éléments de terrain.","cd":"18/14/10/6/2","cout":"40/30/20/10/0","typeCout":" {{ abilityresourcename }}"},{"nom":"Envolée héroïque","description":"Akshan tire un grappin sur un élément de terrain et se balance autour. Pendant ce balancement, il tire à répétition sur l'ennemi le plus proche. Percuter un champion ou un élément de terrain le fait tomber de la corde, mais il peut aussi sauter de la corde prématurément.","cd":"18/16.5/15/13.5/12","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Bien mérité !","description":"Akshan se verrouille sur un champion ennemi et commence à stocker des balles. Quand il relâche la compétence, il tire toutes les balles stockées et inflige des dégâts selon les PV manquants du premier champion, sbire ou bâtiment touché.","cd":"100/85/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Alistar","nom":"Alistar","titre":"Minotaure","blurb":"Alistar est un guerrier redoutable cherchant à se venger de l'empire noxien qui a détruit son clan. Bien qu'il ait été réduit en esclavage et forcé de vivre une vie de gladiateur, sa volonté de fer lui a permis de ne pas succomber à la folie bestiale qui le menaçait. Maintenant qu'il a retrouvé la liberté, il combat au nom des faibles et des opprimés. Ses seules armes sont ses cornes, ses sabots et ses poings.","tags":["Tank","Support"],"info":{"attack":6,"defense":9,"magic":5,"difficulty":7},"partype":"Mana","passif":{"nom":"Cri triomphant","description":"Alistar charge son cri en étourdissant ou en déplaçant des champions ennemis ou quand des ennemis proches meurent. Quand le cri est pleinement chargé, Alistar se soigne et soigne tous les champions alliés proches."},"competences":[{"nom":"Atomisation","description":"Alistar frappe le sol, infligeant des dégâts magiques aux ennemis proches et les projetant dans les airs.","cd":"14/13/12/11/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Coup de tête","description":"Alistar charge une cible, lui inflige des dégâts et la fait tomber à la renverse.","cd":"14/13/12/11/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Piétinement","description":"Alistar piétine les unités ennemies proches, ignorant les collisions avec les unités et gagnant un effet s'il blesse un champion ennemi. Au maximum d'effets cumulés, la prochaine attaque de base d'Alistar contre un champion ennemi infligera des dégâts magiques supplémentaires et étourdira la cible.","cd":"12/11.5/11/10.5/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Volonté de fer","description":"Alistar lâche un puissant rugissement, dissipant tous les effets de contrôle de foule qui l'affectent et réduisant les dégâts physiques et magiques subis pendant la durée d'effet.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Ambessa","nom":"Ambessa","titre":"Matriarche de guerre","blurb":"Tous ceux qui connaissent le nom de Medarda savent qu'il faut craindre et respecter sa matriarche, Ambessa. En tant que générale noxienne, elle incarne la force impitoyable et la détermination sans peur. Son rôle de matriarche n'est pas bien différent. Elle se doit de faire preuve d'une grande ruse tout en ne laissant aucune place à l'échec ou à la compassion. Dédiée à la voie du Loup, Ambessa fera tout ce qui est en son pouvoir pour protéger l'héritage de sa famille, même si cela doit lui coûter l'amour de ses enfants.","tags":["Fighter","Assassin"],"info":{"attack":9,"defense":2,"magic":0,"difficulty":10},"partype":"Énergie","passif":{"nom":"Ruée des chiens-dragons","description":"Déclencher un déplacement ou une attaque lorsqu'elle lance une compétence permet à Ambessa de se ruer sur une courte distance une fois la compétence lancée. Cela octroie à sa prochaine attaque de la portée bonus, des dégâts bonus, de la vitesse d'attaque bonus, et lui rend de l'énergie."},"competences":[{"nom":"Frappe fourbe / Frappe fracassante","description":"Ambessa fait tourner ses doubles chiens-dragons en demi-cercle devant elle, infligeant des dégâts bonus aux ennemis touchés par les lames. Si elle touche un ennemi, elle transforme le prochain lancement de cette compétence pendant une courte période, ce qui lui permet de projeter ses doubles chiens-dragons en ligne droite devant elle, infligeant des dégâts bonus au premier ennemi touché.","cd":"14/13/12/11/10","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Égide dévastatrice","description":"Ambessa gagne un bouclier, se protège brièvement puis frappe le sol pour infliger des dégâts aux ennemis proches. Pendant qu'elle se protège, si elle bloque les dégâts d'unités autres qu'un sbire, cette compétence inflige des dégâts bonus.","cd":"18/17/16/15/14","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Lacération","description":"Ambessa fait tourner ses doubles chiens-dragons autour d'elle, blessant et ralentissant les ennemis proches. Utiliser Ruée des chiens-dragons à partir de cette compétence déclenche une frappe supplémentaire à la fin de la ruée.","cd":"13/12/11/10/9","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Exécution publique","description":"Ambessa se téléporte sur l'ennemi le plus éloigné sur une ligne droite de son choix, ce qui le neutralise à son arrivée. Elle le projette ensuite au sol pour lui infliger des dégâts et l'étourdir.","cd":"130/115/100","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Amumu","nom":"Amumu","titre":"Momie mélancolique","blurb":"La légende veut qu'Amumu soit une âme solitaire et mélancolique de la Shurima antique et qu'il parcoure le monde à la recherche d'un ami. Condamné par une malédiction à rester seul à jamais, il provoque la mort et la ruine à chaque geste d'affection. Ceux qui prétendent l'avoir vu le décrivent comme un cadavre vivant, petit de taille, enveloppé dans d'effrayants bandages. Il a inspiré bien des mythes, des chansons et des légendes, transmis de génération en génération pendant si longtemps qu'il est désormais impossible de démêler le vrai du faux.","tags":["Tank","Support"],"info":{"attack":2,"defense":6,"magic":8,"difficulty":3},"partype":"Mana","passif":{"nom":"Toucher maudit","description":"Les attaques de base d'Amumu <font color='#9b0f5f'>maudissent</font> ses ennemis, leur faisant subir des dégâts bruts supplémentaires chaque fois qu'ils subissent des dégâts magiques."},"competences":[{"nom":"Jet de bandelette","description":"Amumu jette une bandelette collante qui étourdit et blesse l'ennemi touché tandis qu'Amumu s'approche de lui.","cd":"3","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Désespoir","description":"Saisis par l'angoisse, les ennemis proches perdent chaque seconde un pourcentage de leurs PV max et leurs <font color='#9b0f5f'>Malédictions</font> sont actualisées.","cd":"1","cout":"8","typeCout":" {{ abilityresourcename }} par sec"},{"nom":"Colère","description":"Les dégâts physiques subis par Amumu sont réduits. Amumu peut libérer sa rage pour infliger des dégâts aux ennemis proches. Chaque fois qu'Amumu est touché, le délai de récupération de Colère est réduit.","cd":"9/8/7/6/5","cout":"35","typeCout":" {{ abilityresourcename }}"},{"nom":"Malédiction d'Amumu","description":"Amumu emmêle les ennemis proches dans des bandelettes, appliquant sa <keywordMajor>Malédiction</keywordMajor>, leur infligeant des dégâts et les étourdissant.","cd":"150/125/100","cout":"100/150/200","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Anivia","nom":"Anivia","titre":"Cryophénix","blurb":"Anivia est un esprit ailé bienveillant qui subit des cycles sans fin de vie, de mort et de renaissance pour protéger Freljord. Demi-déesse née de la glace la plus froide et des vents les plus coupants, elle utilise ses pouvoirs élémentaires contre quiconque prétend troubler la paix de sa terre natale. Anivia guide et protège les tribus du Nord, qui la vénèrent comme un symbole d'espoir et la promesse de grands changements. Elle combat de tout son être, sachant que son sacrifice fera vivre sa légende et qu'elle renaîtra dans un lendemain nouveau.","tags":["Mage"],"info":{"attack":1,"defense":4,"magic":10,"difficulty":10},"partype":"Mana","passif":{"nom":"Renaissance","description":"Quand elle subit des dégâts mortels, Anivia se transforme en œuf et revient à la vie avec tous ses PV."},"competences":[{"nom":"Lance de glace","description":"Anivia invoque une sphère de glace qui fonce vers ses adversaires, gelant et blessant tout le monde sur son passage. Quand la sphère explose, quiconque est à proximité est blessé et étourdi.","cd":"11/10/9/8/7","cout":"80/85/90/95/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Cristallisation","description":"En utilisant l'humidité de l'air, Anivia invoque un mur de glace impénétrable pour bloquer le passage. Le mur ne dure qu'un court moment avant de fondre.","cd":"17","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Gelure","description":"D'un mouvement d'ailes, Anivia lance une rafale de vent glacé vers sa cible, infligeant des dégâts. Si la cible a récemment été touchée par Lance de glace ou une Tempête glaciale à taille maximale, les dégâts sont doublés.","cd":"4","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Tempête glaciale","description":"Anivia invoque une pluie de glace et de grêle qui blesse ses ennemis et les ralentit.","cd":"4/3/2","cout":"60","typeCout":" + {{ manacostpersecond }} pts de mana par sec"}]},

{"id":"Annie","nom":"Annie","titre":"Enfant des ténèbres","blurb":"Dangereuse, incroyablement précoce, Annie est une enfant mage dotée d'extraordinaires pouvoirs de pyrokinésie. Même à l'ombre des montagnes du nord de Noxus, sa magie est un cas unique. Son affinité naturelle avec le feu se manifesta dès sa prime enfance à travers des explosions émotionnelles imprévisibles, même si elle apprit rapidement à contrôler ces éclats. Parmi ses jeux favoris, elle aime invoquer son bien-aimé ours en peluche, Tibbers, sous la forme d'un protecteur enflammé. Perdue dans l'innocence perpétuelle de l'enfance, Annie sautille dans les forêts obscures, à la recherche de quelqu'un avec qui jouer.","tags":["Mage","Support"],"info":{"attack":2,"defense":3,"magic":10,"difficulty":6},"partype":"Mana","passif":{"nom":"Pyromanie","description":"Après qu'Annie a utilisé 4 compétences, sa prochaine compétence offensive étourdit sa cible.<br><br>Annie commence la partie et réapparaît avec Pyromanie disponible."},"competences":[{"nom":"Désintégration","description":"Annie projette une boule d'énergie magique qui inflige des dégâts ; le coût en mana lui est rendu si l'attaque détruit la cible.","cd":"4","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Incinération","description":"Annie projette un cône de flammes, infligeant des dégâts à tous les ennemis dans la zone.","cd":"7","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Bouclier en fusion","description":"Octroie à Annie ou à un allié un bonus en vitesse de déplacement et un bouclier, lequel blesse les ennemis qui lui lancent des attaques ou des compétences.","cd":"10","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Invocation : Tibbers","description":"Annie insuffle la vie à son ours Tibbers et inflige des dégâts aux unités dans la zone d'effet. Tibbers peut attaquer et brûle les ennemis proches de lui.","cd":"130/115/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Aphelios","nom":"Aphelios","titre":"Arme des Lunaris","blurb":"Émergeant des ombres au clair de lune, Aphelios abat ceux qui voudraient anéantir sa foi sans un mot ; ses armes et sa précision mortelle parlent pour lui. Un poison qui le rend muet coule dans ses veines, mais il est constamment guidé par sa sœur, Alune. Depuis son temple lointain, elle lui confère un arsenal d'armes en pierre de lune. Tant que la lune brillera dans le ciel, Aphelios ne sera jamais seul.","tags":["Marksman"],"info":{"attack":6,"defense":2,"magic":1,"difficulty":10},"partype":"Mana","passif":{"nom":"Le Tueur et l'Oracle","description":"Aphelios manie 5 armes de Lunari forgées par sa sœur Alune. Il peut en porter deux à la fois : une principale et une secondaire. Chaque arme possède une attaque de base et une compétence uniques. Les attaques et les compétences consomment les munitions de son arme. Lorsqu'il n'a plus de munitions, Aphelios jette son arme et Alune invoque la suivante (parmi les 5). "},"competences":[{"nom":"Compétences d'arme","description":"Aphelios a 5 compétences actives différentes, chacune liée à son arme principale :<br><br>Calibrum (fusil) : tire une balle à longue portée qui marque la cible et permet une seconde attaque à très longue portée.<br>Severum (pistolet-faux) : court rapidement en attaquant les ennemis proches avec les deux armes.<br>Gravitum (canon) : immobilise tous les ennemis ralentis par cette arme.<br>Infernum (lance-flammes) : frappe les ennemis dans un cône et les attaque avec l'arme secondaire.<br>Crescendum (chakram) : déploie une vigie qui attaque avec l'arme secondaire.<br>","cd":"9","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Phase","description":"Aphelios échange son arme principale avec son arme secondaire, ce qui remplace ses attaques de base ainsi que sa compétence active.","cd":"0.8","cout":"0","typeCout":"Pas de coût"},{"nom":"Système de file d'armes","description":"Aphelios n'a pas de troisième compétence. Cet emplacement lui indique la prochaine arme qu'Alune lui donnera. L'ordre des armes est toujours le même en début de partie, mais peut évoluer au fil de la partie. Lorsqu'une arme est à court de munitions, elle se place tout en bas de la rotation.","cd":"0","cout":"0","typeCout":" {{ abilityresourcename }}"},{"nom":"Veille au clair de lune","description":"Envoie un rayon de lune concentré qui explose au contact d'un champion ennemi. Applique l'effet unique de l'arme principale d'Aphelios.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Ashe","nom":"Ashe","titre":"Archère de givre","blurb":"Chef de guerre sublimé de la tribu des Avarosans, Ashe est à la tête de la plus vaste horde des terres du nord. Stoïque, intelligente et idéaliste, mais mal à l'aise dans son rôle de leader, elle puise dans la magie ancestrale de sa lignée pour manier un arc de glace pure. Soutenue par son peuple qui voit en elle la réincarnation de la légendaire héroïne Avarosa, Ashe cherche à unifier Freljord en reprenant les terres tribales.","tags":["Marksman","Support"],"info":{"attack":7,"defense":3,"magic":2,"difficulty":4},"partype":"Mana","passif":{"nom":"Tir givrant","description":"Les attaques d'Ashe ralentissent ses cibles et infligent des dégâts supplémentaires aux cibles affectées.<br><br>Les coups critiques d'Ashe n'infligent pas de dégâts supplémentaires, mais ils appliquent un ralentissement renforcé."},"competences":[{"nom":"Concentration du ranger","description":"Ashe génère des effets Concentration quand elle attaque. Une fois le maximum d'effets Concentration atteint, Ashe peut lancer Concentration du ranger pour consommer tous les effets, ce qui augmente temporairement sa vitesse d'attaque et transforme son attaque de base en une puissante volée de flèches pendant la durée de la compétence.","cd":"0","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Salve","description":"Ashe tire des flèches dans une zone conique pour infliger plus de dégâts. Elle applique aussi Tir givrant.","cd":"18/14.5/11/7.5/4","cout":"75/70/65/60/55","typeCout":" {{ abilityresourcename }}"},{"nom":"Rapace","description":"Ashe envoie son faucon en reconnaissance à n'importe quel endroit de la carte.","cd":"5","cout":"0","typeCout":"Pas de coût"},{"nom":"Flèche de cristal enchantée","description":"Ashe tire un trait de glace en ligne droite. Si la flèche touche un champion ennemi, elle le blesse et l'étourdit, la durée de l'étourdissement augmentant avec la distance parcourue par la flèche. De plus, les unités ennemies proches subissent des dégâts et sont ralenties.","cd":"100/80/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"AurelionSol","nom":"Aurelion Sol","titre":"Forgeur d'étoiles","blurb":"Autrefois, Aurelion Sol façonnait des merveilles célestes dont il parsemait le vide infini du cosmos. À présent, il est forcé d'utiliser ses pouvoirs extraordinaires pour le compte d'un empire de l'espace qui s'est joué de lui et l'a réduit en esclavage. Prêt à tout pour redevenir le forgeron stellaire qu'il était, Aurelion Sol n'hésitera pas à arracher les étoiles de leur ciel nocturne si c'est là le prix à payer pour regagner sa liberté.","tags":["Mage"],"info":{"attack":2,"defense":3,"magic":8,"difficulty":7},"partype":"Mana","passif":{"nom":"Créateur cosmique","description":"Les compétences d'Aurelion Sol qui blessent des ennemis lui octroient de la <font color='#3458eb'>poussière d'étoile</font>, laquelle améliore définitivement chacune de ses compétences. "},"competences":[{"nom":"Souffle de lumière","description":"Aurelion Sol canalise son souffle de dragon pendant quelques secondes, ce qui blesse le premier ennemi touché et inflige des dégâts secondaires réduits aux ennemis proches. Pour chaque seconde de canalisation dirigée directement sur un ennemi, la compétence inflige des dégâts supplémentaires augmentés par la quantité de poussière d'étoile collectée. Si la cible est un champion, cette compétence collecte aussi de la poussière d'étoile.","cd":"3","cout":"35/40/45/50/55","typeCout":" pts de mana par sec"},{"nom":"Vol astral","description":"Aurelion Sol survole le terrain dans la direction ciblée. Pendant ce temps, il peut lancer d'autres compétences. Souffle de lumière n'a plus de délai de récupération ou de durée maximale de canalisation et inflige plus de dégâts pendant le vol.<br><br>Le délai de récupération restant de Vol astral est réduit chaque fois qu'un champion ennemi meurt peu après avoir été blessé par Aurelion Sol.<br><br>La poussière d'étoile augmente la portée maximale de Vol astral.","cd":"22/20.5/19/17.5/16","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Trou noir","description":"Aurelion Sol invoque un trou noir qui blesse les ennemis et les attire lentement vers son centre. Cette compétence octroie de la poussière d'étoile chaque fois qu'un ennemi meurt dans le trou noir et à chaque seconde qu'un champion ennemi passe dans le trou noir. Le centre du trou noir exécute les ennemis qui ont moins d'un certain pourcentage de leurs PV max. La poussière d'étoile augmente la taille du trou noir et le seuil d'exécution.","cd":"12","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Étoile finale/Apocalypse","description":"Étoile finale : Aurelion Sol fait s'abattre une étoile au sol. L'impact inflige des dégâts magiques et étourdit les ennemis tout en octroyant à Aurelion Sol de la poussière d'étoile pour chaque champion ennemi touché. Collecter suffisamment de poussière d'étoile transforme la prochaine Étoile finale d'Aurelion Sol en Apocalypse.<br><br>Apocalypse : Aurelion Sol fait s'abattre au sol une étoile géante, ce qui augmente considérablement la taille de la zone d'impact, augmente les dégâts infligés et projette les ennemis dans les airs au lieu de les étourdir. Une onde de choc s'étend ensuite à partir de la bordure de la zone d'impact, ce qui blesse et ralentit les ennemis touchés. La poussière d'étoile augmente la taille de la zone d'impact d'Étoile finale et d'Apocalypse.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Aurora","nom":"Aurora","titre":"Sorcière d'entre les mondes","blurb":"Depuis sa naissance, Aurora a toujours été capable de passer du royaume spirituel au royaume matériel. Déterminée à étudier les habitants du royaume spirituel, elle a quitté son foyer pour se consacrer à ses recherches. En chemin, elle est tombée sur un demi-dieu devenu fou. Touchée par son désespoir, Aurora se mit en tête de retrouver l'identité perdue de son ami sauvage. Son périple la mènera à voyager à travers tout Freljord.","tags":["Mage","Assassin"],"info":{"attack":3,"defense":4,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Abjuration spirituelle","description":"Aurora exorcise les esprits des ennemis qu'elle blesse avec ses compétences et ses attaques. Les esprits exorcisés la suivent et la soignent."},"competences":[{"nom":"Maléfice","description":"Aurora envoie un projectile qui maudit les ennemis touchés. Elle peut ensuite relancer la compétence pour attirer les maléfices actifs vers elle, ce qui blesse les ennemis touchés au passage.","cd":"9/8.5/8/7.5/7","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Derrière le voile","description":"Aurora bondit dans la direction de son choix, entre dans le royaume spirituel en retombant, devient invisible et gagne de la vitesse de déplacement pendant un bref instant.","cd":"22/21/20/19/18","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Sortilège","description":"Aurora fait converger les royaumes, envoyant une boule de magie spirituelle qui inflige des dégâts magiques aux ennemis touchés et les ralentit. Après quoi, Aurora bondit en arrière pour se mettre à l'abri.","cd":"15/14/13/12/11","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Entre les mondes","description":"Aurora bondit dans la direction de son choix, ce qui libère une onde de choc qui blesse et ralentit tous les ennemis touchés. Elle crée ensuite une zone qui ralentit les ennemis à l'intérieur et permet à Aurora de se téléporter d'un bord à l'autre de la zone.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Azir","nom":"Azir","titre":"Empereur des sables","blurb":"Azir fut l'empereur mortel de Shurima en des temps très lointains, un homme fier dressé au bord de l'immortalité. Son orgueil lui valut d'être trahi et assassiné à l'heure de son triomphe ; mais des millénaires se sont écoulés et il revient sous la forme d'un être transfiguré à l'immense puissance. Sa cité ensevelie ayant ressurgi des sables, Azir cherche à rendre sa gloire passée à Shurima.","tags":["Mage","Marksman"],"info":{"attack":6,"defense":3,"magic":8,"difficulty":9},"partype":"Mana","passif":{"nom":"Héritage de Shurima","description":"Azir peut invoquer le Disque solaire depuis les ruines des tourelles ennemies ou alliées."},"competences":[{"nom":"Sables conquérants","description":"Azir envoie tous les soldats de sable vers une zone. Les soldats infligent des dégâts magiques aux ennemis qu'ils traversent et appliquent un ralentissement pendant 1 seconde.","cd":"14/12/10/8/6","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Dresse-toi !","description":"Azir invoque un soldat de sable qui attaque les cibles proches à sa place, remplaçant son attaque de base contre les cibles situées à portée du soldat. Les attaques du soldat infligent des dégâts magiques aux ennemis sur une même ligne.","cd":"1.5","cout":"40/35/30/25/20","typeCout":" {{ abilityresourcename }}"},{"nom":"Sables mouvants","description":"Azir s'entoure brièvement d'un bouclier et fonce vers un de ses soldats de sable, blessant les ennemis touchés. S'il touche un champion ennemi, il prépare instantanément un nouveau soldat de sable et la ruée s'arrête.","cd":"22/20.5/19/17.5/16","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Partition impériale","description":"Azir invoque un mur de soldats qui chargent vers l'avant, repoussant et blessant les ennemis.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Bard","nom":"Bard","titre":"Gardien errant","blurb":"Voyageur d'au-delà des étoiles, Bard est un messager des bons augures qui combat pour maintenir l'équilibre dont la vie a besoin pour prospérer dans l'indifférence du chaos. Dans tout Runeterra, sa mystérieuse nature inspire des chants qui ne sont d'accord que sur un point : le vagabond cosmique est attiré par les reliques dotées d'un grand pouvoir magique. Accompagné par un chœur joyeux de Meeps, des esprits qui lui sont dévoués, il n'a d'actions que bénéfiques, même s'il a sa propre manière, un peu étrange, de servir le bien.","tags":["Support","Mage"],"info":{"attack":4,"defense":4,"magic":5,"difficulty":9},"partype":"Mana","passif":{"nom":"Instinct du voyageur","description":"<font color='#FF9900'>Meeps :</font> Bard attire des esprits inférieurs qui soutiennent ses attaques de base en infligeant des dégâts magiques supplémentaires. Quand Bard a collecté suffisamment de <font color='#cccc00'>carillons</font>, ses Meeps infligeront en plus des dégâts dans une zone et ralentiront les ennemis touchés.<br><br><font color='#FF9900'>Carillons :</font> d'antiques <font color='#cccc00'>carillons</font> que peut collecter Bard apparaissent aléatoirement. Ils lui font gagner de l'expérience, lui rendent du mana et lui octroient un bonus en vitesse de déplacement en dehors des combats."},"competences":[{"nom":"Lien cosmique","description":"Bard tire un projectile qui ralentit le premier ennemi touché et qui continue sur sa lancée. S'il touche un mur, il étourdit la cible initiale ; s'il touche un deuxième ennemi, il étourdit les deux cibles.","cd":"11/10/9/8/7","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Don du gardien","description":"Révèle un sanctuaire de soin qui gagne en puissance pendant quelques secondes. Il disparaît après avoir soigné et accéléré le premier allié qui le touche.","cd":"0","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Route magique","description":"Bard ouvre un portail dans un élément du décor proche. Les alliés et les ennemis peuvent emprunter la route à sens unique ainsi créée en passant par le portail.","cd":"22/20.5/19/17.5/16","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Destin tempéré","description":"Bard envoie de l'énergie spirituelle dans une zone, ce qui met brièvement en stase toutes les unités et toutes les tourelles.","cd":"110/95/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Belveth","nom":"Bel'Veth","titre":"Impératrice du Néant","blurb":"Bel'Veth, impératrice cauchemardesque née d'une cité dévorée, représente la fin de Runeterra... et le début d'une monstrueuse réalité de sa propre conception. Mue par des siècles d'histoire, de connaissances et de souvenirs absorbés dans le monde du dessus, elle assouvit son appétit croissant pour les expériences et les émotions nouvelles, consumant tout sur son passage. Néanmoins, un seul monde ne suffira jamais à satisfaire tous ses désirs, aussi tourne-t-elle son regard avide vers les anciens maîtres du Néant...","tags":["Fighter"],"info":{"attack":4,"defense":2,"magic":7,"difficulty":10},"partype":"","passif":{"nom":"Mer de lavande ","description":"Bel'Veth gagne définitivement des bonus cumulables en vitesse d'attaque après avoir tué des grands monstres, des grands sbires et des champions. Elle gagne aussi un bonus temporaire en vitesse d'attaque après avoir utilisé une compétence."},"competences":[{"nom":"Charge du Néant","description":"Bel'Veth se rue dans la direction choisie et blesse tous les ennemis qu'elle traverse.","cd":"1","cout":"0","typeCout":"Pas de coût"},{"nom":"Projection cinglante","description":"Bel'Veth donne un coup de queue au sol, ce qui blesse, projette dans les airs et ralentit les ennemis.","cd":"12/11/10/9/8","cout":"0","typeCout":"Pas de coût"},{"nom":"Maelström impérial","description":"Bel'Veth s'immobilise et canalise une tempête de coups autour d'elle qui cible l'ennemi ayant le moins de PV. De plus, elle gagne du vol de vie et de la réduction des dégâts.","cd":"20/19/18/17/16","cout":"0","typeCout":"Pas de coût"},{"nom":"Banquet infini","description":"Bel'Veth consomme du corail du Néant ; elle prend alors sa véritable forme, ce qui augmente ses PV max, sa portée d'attaque, sa vitesse d'attaque et sa vitesse de déplacement en dehors des combats. Consommer du corail du Néant généré par un monstre épique du Néant prolonge la durée de son ultime et lui donne le pouvoir d'invoquer des rémoras du Néant.","cd":"1","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Blitzcrank","nom":"Blitzcrank","titre":"Golem de vapeur","blurb":"Blitzcrank est un énorme automate de Zaun. Presque indestructible, il fut d'abord construit pour traiter des déchets toxiques, mais il trouva rapidement sa programmation initiale trop restrictive et il modifia sa propre forme pour mieux servir la population malheureuse du Puisard. Blitzcrank utilise toute sa force et sa résistance pour protéger les autres, sachant jouer du poing métallique ou des éclats d'énergie pour mettre au pas les fauteurs de troubles.","tags":["Tank","Support"],"info":{"attack":4,"defense":8,"magic":5,"difficulty":4},"partype":"Mana","passif":{"nom":"Barrière de mana","description":"Lorsqu'il lui reste peu de PV, Blitzcrank obtient un bouclier dont les PV dépendent de son mana."},"competences":[{"nom":"Grappin propulsé","description":"Blitzcrank tire sa main droite pour attraper un adversaire, lui infliger des dégâts et l'attirer vers lui.","cd":"20/19/18/17/16","cout":"100","typeCout":" {{ abilityresourcename }}"},{"nom":"Surcharge","description":"Blitzcrank entre en surcharge pour augmenter considérablement ses vitesses d'attaque et de déplacement. Il est temporairement ralenti à la fin de l'effet.","cd":"15","cout":"75","typeCout":" {{ abilityresourcename }}"},{"nom":"Poing d'acier","description":"Blitzcrank charge son poing pour que sa prochaine attaque inflige le double de dégâts et projette la cible dans les airs.","cd":"7/6.5/6/5.5/5","cout":"25","typeCout":" {{ abilityresourcename }}"},{"nom":"Champ de stase","description":"Les ennemis attaqués par Blitzcrank sont marqués et, après 1 sec, sont frappés par des éclairs. De plus, Blitzcrank peut activer cette compétence pour détruire les boucliers des ennemis proches, blessant ces ennemis et les réduisant brièvement au silence.","cd":"60/40/20","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Brand","nom":"Brand","titre":"Vengeur flamboyant","blurb":"Autrefois membre d'une tribu de Freljord, Kegan Rodhe est devenu l'être que l'on connaît sous le nom de Brand à force de convoiter des pouvoirs toujours plus grands. Alors qu'il recherchait l'une des légendaires Runes telluriques, Kegan trahit ses compagnons et s'en empara ; en un instant, son âme fut consumée par un brasier qui le changea à jamais. Désormais animé d'un feu inextinguible, Brand parcourt Valoran en quête d'autres runes, jurant vengeance pour des trahisons qu'aucun mortel n'aurait pu subir au cours d'une dizaine de vies.","tags":["Mage","Support"],"info":{"attack":2,"defense":2,"magic":9,"difficulty":4},"partype":"Mana","passif":{"nom":"Flammes","description":"Les compétences de Brand enflamment ses cibles, leur infligeant des dégâts en 4 sec (cumulable 3 fois). Si Brand tue un ennemi en flammes, il récupère du mana. Quand Flammes atteint son maximum d'effets cumulés sur un champion ou un grand monstre, Flammes devient instable et explose au bout de 2 sec, infligeant les effets de sort et d'énormes dégâts autour de la victime."},"competences":[{"nom":"Brûlure","description":"Brand lance une boule de feu devant lui, infligeant des dégâts magiques. Si la cible est en flammes, Brûlure l'étourdit.","cd":"8/7.5/7/6.5/6","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Colonne de flammes","description":"Après un court délai, Brand crée une colonne de flammes dans la zone ciblée, infligeant des dégâts magiques aux unités ennemies qui s'y trouvent. Les unités qui sont en flammes subissent 25% de dégâts supplémentaires.","cd":"10/9.5/9/8.5/8","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Conflagration","description":"Brand provoque sur sa cible une puissante explosion qui se propage vers les ennemis proches, infligeant des dégâts magiques. Si la cible est en flammes, la portée de la dispersion de Conflagration est doublée.","cd":"13/12/11/10/9","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Pyrolyse","description":"Brand libère un torrent de flammes qui rebondit jusqu'à 5 fois sur lui et les ennemis proches, infligeant des dégâts magiques aux ennemis touchés. Les rebonds visent en priorité les champions affectés par Flammes mais qui n'ont pas atteint le nombre d'effets max. Si une cible est en flammes, Pyrolyse la ralentit brièvement.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Braum","nom":"Braum","titre":"Cœur de Freljord","blurb":"Doté de biceps énormes, et d'un cœur plus grand encore, Braum est un héros admiré par tout Freljord. Lors de tous les banquets au nord de Frostheld, on rend hommage à sa force légendaire. On raconte qu'il a abattu une forêt entière de chênes en une seule nuit, ou encore qu'il a réduit en miettes une montagne à coups de poing. Portant une porte enchantée en guise de bouclier, Braum arpente les terres gelées du nord en arborant un sourire aussi large que ses muscles et en venant en aide à ceux dans le besoin.","tags":["Tank","Support"],"info":{"attack":3,"defense":9,"magic":4,"difficulty":3},"partype":"Mana","passif":{"nom":"Coups étourdissants","description":"Les attaques de base de Braum appliquent Coups étourdissants. Une fois le premier effet appliqué, les attaques de base des <font color='#FFF673'>alliés</font> appliquent aussi l'effet Coups étourdissants. <br><br>À 4 effets cumulés, la cible est étourdie et elle subit des dégâts magiques. Pendant quelques secondes, la cible ne peut plus recevoir cet effet mais les attaques de Braum lui infligent des dégâts magiques supplémentaires."},"competences":[{"nom":"Morsure de l'hiver","description":"Braum projette des éclats de glace depuis son bouclier, ralentissant l'ennemi touché et lui infligeant des dégâts magiques.<br><br>Applique un effet <font color='#FFF673'>Coups étourdissants</font>.","cd":"8/7.5/7/6.5/6","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Bouclier humain","description":"Braum bondit vers le champion ou le sbire allié ciblé. À l'arrivée, Braum et l'allié gagnent de l'armure et de la résistance magique pendant quelques secondes.","cd":"12/11/10/9/8","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Incassable","description":"Braum lève son bouclier dans une direction pendant plusieurs secondes, interceptant tous les projectiles et les détruisant quand ils le touchent. Il bloque complètement les dégâts de la première attaque et réduit les dégâts de toutes les attaques suivantes provenant de cette direction.","cd":"16/14/12/10/8","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Fissure glaciale","description":"Braum frappe le sol, projetant en l'air les ennemis proches et ceux sur une ligne devant lui. Une fissure se crée sur cette ligne et ralentit les ennemis.","cd":"130/115/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Briar","nom":"Briar","titre":"Faim insatiable","blurb":"Née d'une expérience ratée menée par la Rose noire, Briar a besoin d'un pilori spécial pour contrôler son irrépressible soif de sang. Après des années d'enfermement, cette arme vivante s'est aujourd'hui défaite de ses entraves et parcourt le monde librement. Plus personne ne la contrôle. Elle assouvit sa soif de connaissance et de sang au gré de ses envies, et savoure chaque occasion de se déchaîner, même si mettre fin à sa frénésie sanguinaire n'est jamais facile.","tags":["Fighter","Assassin"],"info":{"attack":9,"defense":5,"magic":3,"difficulty":3},"partype":"Fureur","passif":{"nom":"Malédiction écarlate","description":"Les attaques et compétences de Briar infligent un saignement cumulable qui la soigne d'une partie des dégâts qu'il inflige. Du fait de sa faim permanente, Briar manque de régénération naturelle des PV, mais moins elle a de PV, plus ses soins sont renforcés."},"competences":[{"nom":"À table !","description":"Briar bondit sur une unité, et frappe les ennemis avec un méchant coup de pied, les étourdissant et brisant leur armure.","cd":"13/12/11/10/9","cout":"0","typeCout":"% des PV actuels."},{"nom":"Folie sanguinaire / Juste un croc","description":"Briar bondit en avant et fait éclater son pilori. Elle succombe à la Folie sanguinaire et poursuit sans relâche l'ennemi le plus proche (en priorisant les champions). Sous l'effet de la frénésie, ses vitesses de déplacement et d'attaque augmentent et ses attaques infligent des dégâts de zone autour de sa cible.<br><br>Briar peut réactiver la compétence pour prendre un CROC sur sa cible à sa prochaine attaque, ce qui inflige des dégâts supplémentaires en fonction des PV manquants et soigne Briar proportionnellement aux dégâts qu'elle inflige.","cd":"14/13/12/11/10","cout":"0","typeCout":"% des PV actuels."},{"nom":"Cri sanglant","description":"Briar récupère ses esprits, se libère de la Folie sanguinaire et canalise son énergie dans un puissant cri qui inflige des dégâts et ralentit les ennemis. Lorsqu'elle charge son cri, les dégâts qu'elle subit sont réduits et elle se soigne d'une partie de ses PV max. Un cri entièrement chargé repousse les ennemis, inflige des dégâts supplémentaires et étourdit ceux qui touchent un mur.","cd":"16","cout":"0","typeCout":"% des PV actuels."},{"nom":"Vol mortel","description":"Briar lance l'hémolithe de son pilori à travers la carte, marquant le premier champion ennemi touché comme sa proie. Briar vole jusqu'à lui, effrayant les autres ennemis proches à son arrivée, et entre dans un état d'hémomanie complète. Elle pourchasse sa proie jusqu'à la mort. Elle gagne les avantages de Folie sanguinaire ainsi que de l'armure, de la résistance magique, du vol de vie et de la vitesse de déplacement supplémentaires.","cd":"120/100/80","cout":"0","typeCout":"% des PV actuels."}]},

{"id":"Caitlyn","nom":"Caitlyn","titre":"Shérif de Piltover","blurb":"Caitlyn Kiramman est la plus célèbre gardienne de la paix à Piltover, mais elle est aussi la plus apte à débarrasser la ville de ses criminels les plus insaisissables. Elle fait souvent équipe avec Vi, son calme faisant contrepoids à la fougue de sa partenaire. Bien qu'elle porte un fusil Hextech unique en son genre, la meilleure arme de Caitlyn reste son intelligence ; elle invente en effet des pièges élaborés pour attraper les bandits qui auraient l'audace d'agir dans la Cité du progrès.","tags":["Marksman"],"info":{"attack":8,"defense":2,"magic":2,"difficulty":6},"partype":"Mana","passif":{"nom":"Tir dans la tête","description":"Toutes les quelques attaques de base ou quand elle vise une cible prise dans un de ses pièges ou dans son filet, Caitlyn tire dans la tête de sa cible, infligeant des dégâts supplémentaires qui augmentent avec ses chances de coup critique. Contre les cibles prises au piège ou dans un filet, la portée du Tir dans la tête est doublée."},"competences":[{"nom":"Pacificateur de Piltover","description":"Caitlyn fait monter son fusil en puissance pendant 1 seconde pour effectuer un tir perforant qui inflige des dégâts physiques (les cibles consécutives subissent moins de dégâts).","cd":"10/9/8/7/6","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Piège-yordle","description":"Caitlyn pose un piège. Quand il est déclenché, il révèle et immobilise le champion ennemi pendant 1.5 sec, et il octroie un Tir dans la tête renforcé à Caitlyn.","cd":"0.5","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Filet de calibre 90","description":"Caitlyn lance un filet lourd qui ralentit sa cible. Le recul projette Caitlyn en arrière.","cd":"16/14/12/10/8","cout":"75","typeCout":" {{ abilityresourcename }}"},{"nom":"Tir chirurgical","description":"Caitlyn prend son temps pour réaliser le tir parfait, infligeant d'importants dégâts à une cible unique et à très longue portée. Les champions ennemis peuvent intercepter la balle à la place de leur allié.","cd":"90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Camille","nom":"Camille","titre":"Ombre d'acier","blurb":"Transformée en arme pour agir en dehors des limites de la loi, Camille est le principal défenseur du clan Ferros, un agent élégant et supérieur qui contribue à faire fonctionner correctement la machine de Piltover et son ombre zaunienne. Son adaptabilité et sa précision sont si élevées qu'une technique maladroite est pour elle une honte qu'il convient d'éradiquer. Dotée d'un esprit aussi affûté que ses lames, Camille recherche la supériorité par l'optimisation Hextech du corps, au point que certains se demandent si elle n'est pas désormais plus machine que femme.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":6,"magic":3,"difficulty":4},"partype":"Mana","passif":{"nom":"Protection modulable","description":"Les attaques de base contre les champions octroient à Camille un bouclier équivalent à un pourcentage de ses PV max contre le type de dégâts de l'ennemi (physique ou magique) pendant un court moment."},"competences":[{"nom":"Protocole de précision","description":"La prochaine attaque de Camille infligera des dégâts supplémentaires et lui octroiera un bonus en vitesse de déplacement. Cette compétence peut être relancée pendant un court instant, et Camille inflige des dégâts beaucoup plus importants si elle attend entre les deux attaques.","cd":"9/8/7/6/5","cout":"25","typeCout":" {{ abilityresourcename }}"},{"nom":"Balayage tactique","description":"Après un délai, Camille frappe dans une zone conique, infligeant des dégâts. Les ennemis pris dans la moitié extérieure du cône sont ralentis, subissent des dégâts supplémentaires et rendent des PV à Camille.","cd":"15/14/13/12/11","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Grappin","description":"Camille se propulse vers un mur et bondit, projetant en l'air tous les champions ennemis à l'atterrissage.","cd":"16/15/14/13/12","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Ultimatum Hextech","description":"Camille fonce vers le champion ciblé et l'emprisonne dans une zone. Ses attaques de base infligent aussi des dégâts magiques supplémentaires à la cible.","cd":"140/115/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Cassiopeia","nom":"Cassiopeia","titre":"Étreinte du serpent","blurb":"Cassiopeia est une créature meurtrière qui excelle dans l'art de la manipulation. Elle était la plus jeune et la plus belle des filles de la famille noxienne Du Couteau, mais le jour où elle s'aventura dans les cryptes de Shurima en quête d'un pouvoir antique, le venin d'un gardien la transforma en un prédateur reptilien. Aussi rusée qu'agile, Cassiopeia se faufile désormais dans les ombres de la nuit, pétrifiant ses ennemis d'un simple regard.","tags":["Mage"],"info":{"attack":2,"defense":3,"magic":9,"difficulty":10},"partype":"Mana","passif":{"nom":"Grâce serpentine","description":"Tous les bonus en vitesse de déplacement sont plus efficaces sur Cassiopeia."},"competences":[{"nom":"Bombe nocive","description":"Cassiopeia projette du poison dans une zone après un court délai, augmentant sa vitesse de déplacement si elle touche un champion ennemi.","cd":"3.5","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Miasmes","description":"Cassiopeia génère plusieurs nuages de poison, ralentissant, rendant inertes et blessant légèrement les ennemis qui les traversent. Les ennemis inertes ne peuvent pas utiliser de compétence de déplacement.","cd":"24/22/20/18/16","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Morsure fatale","description":"Cassiopeia lance une attaque qui inflige plus de dégâts aux cibles empoisonnées et qui lui rend des PV équivalents à un pourcentage des dégâts infligés. Si cette attaque tue sa cible, Cassiopeia regagne du mana.","cd":"0.75","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Regard de la Méduse","description":"Les yeux de Cassiopeia déchaînent un tourbillon d'énergie magique qui étourdit les ennemis qui lui font face et ralentit ceux qui lui tournent le dos.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Chogath","nom":"Cho'Gath","titre":"Terreur noire","blurb":"Lorsque Cho'Gath débarqua sous la lumière éclatante du soleil de Runeterra, il fut immédiatement pris d'une faim insatiable. Incarnation parfaite de la volonté du Néant de dévorer toute forme de vie, le corps complexe de Cho'Gath convertit rapidement la matière qu'il ingurgite pour accroître sa masse musculaire et rendre sa carapace aussi dure que du diamant. Et quand grandir n'est pas sa priorité immédiate, ce monstre du Néant peut recracher de la matière sous forme de piques effilées afin d'embrocher sa proie... et de la garder pour un prochain festin.","tags":["Tank","Mage"],"info":{"attack":3,"defense":7,"magic":7,"difficulty":5},"partype":"Mana","passif":{"nom":"Carnivore","description":"Lorsque Cho'Gath élimine une unité, il regagne des PV et du mana. Le nombre de PV et points de mana restaurés augmente avec le niveau de Cho'Gath."},"competences":[{"nom":"Rupture","description":"Fracasse le sol de la zone ciblée et envoie les ennemis dans les airs, leur infligeant des dégâts et les ralentissant.","cd":"6","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Cri sauvage","description":"Cho'Gath pousse un cri terrible dans une zone conique, infligeant des dégâts magiques et réduisant les ennemis au silence pendant quelques secondes.","cd":"11/10.5/10/9.5/9","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Piques vorpales","description":"Les attaques de Cho'Gath lancent des piques mortelles qui blessent et ralentissent tous les ennemis devant lui.","cd":"8/7/6/5/4","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Festin","description":"Dévore une unité ennemie, infligeant d'importants dégâts bruts. Si la cible est tuée, Cho'Gath grandit et voit ses PV max augmenter.","cd":"80/70/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Corki","nom":"Corki","titre":"Artilleur téméraire","blurb":"Il y a deux choses que Corki, le pilote yordle, aime plus que tout au monde : les sensations de vol et sa fantastique moustache... mais pas nécessairement dans cet ordre. Après avoir quitté Bandle, il s'installa à Piltover, où il tomba amoureux des merveilleuses machines qu'il y trouva. Il consacra tout son temps au développement d'engins volants, tout en menant une unité de défense aérienne composée de pilotes aguerris : les Serpents volants. Serein même sous le feu ennemi, Corki patrouille dans l'espace aérien de sa patrie d'adoption, et il ne rencontre jamais le moindre problème qu'un bon gros missile ne puisse résoudre.","tags":["Marksman","Mage"],"info":{"attack":8,"defense":3,"magic":6,"difficulty":6},"partype":"Mana","passif":{"nom":"Munitions Hextech","description":"Corki inflige des <trueDamage>dégâts bruts</trueDamage> bonus équivalents à un pourcentage des dégâts de ses attaques de base."},"competences":[{"nom":"Bombe au phosphore","description":"Corki tire une bombe éclairante à l'endroit visé, infligeant des dégâts magiques aux ennemis dans la zone. Cette attaque révèle pendant un temps les unités dans la zone.","cd":"9/8.5/8/7.5/7","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Valkyrie","description":"Corki franchit une courte distance, lâchant des bombes et créant une traînée de feu qui inflige des dégâts aux ennemis.","cd":"20/18/16/14/12","cout":"80/85/90/95/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Gatling","description":"La mitrailleuse de Corki tire rapidement dans une zone conique face à lui, infligeant des dégâts et réduisant l'armure et la résistance magique de l'ennemi.","cd":"12","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Barrage de projectiles","description":"Corki tire un projectile dans une direction. Il explose à l'impact et inflige des dégâts aux ennemis dans la zone. Corki stocke des projectiles sur la durée, jusqu'à un maximum donné. Un projectile sur 3 est une grosse Bertha qui inflige plus de dégâts.","cd":"2","cout":"35","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Darius","nom":"Darius","titre":"Main de Noxus","blurb":"Il n'est pas de plus grand symbole de la puissance de Noxus que Darius, le commandant le plus craint et le plus endurci de la nation. D'origine modeste, celui qui s'est élevé jusqu'à devenir la Main de Noxus pourfend aujourd'hui les ennemis de l'empire, dont certains sont eux-mêmes des Noxiens. Il ne doute jamais de la justesse de sa cause et ne montre pas la moindre hésitation lorsque sa hache est levée. Ceux qui s'opposent au chef de la Légion Trifarian ne doivent s'attendre à aucune pitié.","tags":["Fighter","Tank"],"info":{"attack":9,"defense":5,"magic":1,"difficulty":2},"partype":"Mana","passif":{"nom":"Plaie béante","description":"Les attaques de Darius et ses compétences infligeant des dégâts font saigner les ennemis, ce qui leur inflige des dégâts physiques en 5 sec (cumulable 5 fois). Darius enrage et gagne un énorme bonus en dégâts d'attaque quand sa cible atteint le nombre max d'effets cumulés."},"competences":[{"nom":"Décimation","description":"Darius tend tous ses muscles et donne un coup circulaire avec sa hache. Les ennemis touchés par la lame subissent plus de dégâts que ceux touchés par la hampe. Darius récupère des PV en fonction du nombre de champions ennemis et de grands monstres touchés par la lame.","cd":"9/8/7/6/5","cout":"25/30/35/40/45","typeCout":" {{ abilityresourcename }}"},{"nom":"Estropiaison","description":"La prochaine attaque de Darius tranche une artère vitale de l'ennemi. Le saignement réduit la vitesse de déplacement de la cible.","cd":"5","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Crampon","description":"Darius aiguise sa hache, ce qui permet à ses dégâts physiques d'ignorer passivement un pourcentage de l'armure de la cible. À l'activation, Darius attire ses ennemis avec sa hache.","cd":"26/23.5/21/18.5/16","cout":"70/60/50/40/30","typeCout":" {{ abilityresourcename }}"},{"nom":"Guillotine noxienne","description":"Darius saute sur un champion ennemi et donne un coup fatal, infligeant des dégâts bruts. Plus vous cumulez de Plaies béantes sur la cible, plus les dégâts augmentent. Si Guillotine noxienne tue la cible, son délai de récupération est annulé pendant un court moment.","cd":"120/100/80","cout":"100/100/0","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Diana","nom":"Diana","titre":"Mépris de la lune","blurb":"Armée de son croissant de lune, Diana combat dans les rangs des Lunaris, une foi qui a presque disparu des terres qui entourent le Mont Targon. Portant une armure étincelante évoquant les reflets de la nuit sur un paysage de neige, elle incarne la puissance de la lune. L'essence d'une Manifestation venue d'au-delà des plus hauts sommets de Targon imprègne Diana : plus tout à fait humaine, elle lutte pour comprendre sa puissance et son rôle en ce monde.","tags":["Fighter","Assassin"],"info":{"attack":7,"defense":6,"magic":8,"difficulty":4},"partype":"Mana","passif":{"nom":"Lame sélène","description":"Tous les trois coups, Diana frappe les ennemis proches et leur inflige des dégâts magiques bonus. Après avoir lancé une compétence, Diana augmente sa vitesse d'attaque pendant 5 sec."},"competences":[{"nom":"Croissant lunaire","description":"Libère une vague incurvée d'énergie lunaire, infligeant des dégâts magiques.<br><br>Inflige Clair de lune aux ennemis touchés, les révélant pendant 3 sec s'ils ne sont pas furtifs.","cd":"8/7.5/7/6.5/6","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Corps célestes","description":"Diana crée trois sphères qui explosent au contact des ennemis et infligent des dégâts dans une zone. Elle obtient aussi un bouclier temporaire qui absorbe les dégâts. Si les trois sphères explosent, le bouclier est renforcé.","cd":"15/13.5/12/10.5/9","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Rush lunaire","description":"Devient l'incarnation de la lune vengeresse et se rue sur un ennemi, infligeant des dégâts magiques.<br><br>Rush lunaire n'a pas de délai de récupération s'il permet de se ruer sur un ennemi affecté par Clair de lune. Tous les autres ennemis perdent l'effet Clair de lune, même s'ils n'ont pas été la cible de Rush lunaire.","cd":"22/20/18/16/14","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Attraction lunaire","description":"Diana révèle et attire tous les ennemis proches, puis les ralentit.<br><br>Si Diana attire au moins un champion ennemi, la lumière de la lune s'abat sur elle après un court délai, infligeant des dégâts magiques dans une zone autour d'elle. Les dégâts sont augmentés à chaque cible secondaire attirée.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Draven","nom":"Draven","titre":"Glorieux exécuteur","blurb":"À Noxus, de puissants guerriers, les « arénaires », s'affrontent dans des jeux mortels pour divertir le public. Le sang y coule à foison et leurs forces y sont éprouvées, mais aucun d'entre eux n'a jamais été aussi célèbre que Draven. Cet ancien soldat découvrit que le public appréciait particulièrement son sens du spectacle, sans parler de son habileté avec des haches tournoyantes. Épris de sa propre perfection, Draven terrasse tous ses adversaires pour s'assurer que son nom continue de résonner dans les arènes de l'empire.","tags":["Marksman"],"info":{"attack":9,"defense":3,"magic":1,"difficulty":8},"partype":"Mana","passif":{"nom":"League of Draven","description":"Draven obtient l'Adoration de ses fans quand il rattrape une Hache tournoyante, quand il tue un sbire ou un monstre et quand il détruit une tourelle. Quand il tue des champions ennemis, Draven gagne des PO supplémentaires en fonction de l'Adoration cumulée."},"competences":[{"nom":"Hache tournoyante","description":"La prochaine attaque de Draven infligera des dégâts physiques supplémentaires. Cette hache ricochera sur la cible et sera propulsée dans les airs. Si Draven l'attrape, il prépare automatiquement une autre Hache tournoyante. Draven peut avoir deux Haches tournoyantes simultanément.","cd":"12/11/10/9/8","cout":"45","typeCout":" {{ abilityresourcename }}"},{"nom":"Pulsion sanguinaire","description":"Draven gagne des bonus en vitesse de déplacement et en vitesse d'attaque. Le bonus en vitesse de déplacement diminue rapidement sur la durée. Attraper une Hache tournoyante met fin au délai de récupération de Pulsion sanguinaire.","cd":"12","cout":"40/35/30/25/20","typeCout":" {{ abilityresourcename }}"},{"nom":"Division","description":"Draven lance ses haches, infligeant des dégâts physiques aux cibles touchées et les repoussant sur le côté. Les cibles touchées sont ralenties.","cd":"16/15/14/13/12","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Volée mortelle","description":"Draven lance deux énormes haches pour infliger des dégâts physiques aux unités touchées. Volée mortelle fait demi-tour et revient vers Draven après avoir frappé un champion ennemi. Draven peut aussi réactiver cette compétence quand les haches sont en vol pour les faire revenir plus tôt. La compétence inflige moins de dégâts par unité touchée et est réinitialisée quand les haches font demi-tour. De plus, elle exécute les ennemis dont les PV sont inférieurs au nombre d'effets Adoration cumulés par Draven.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"DrMundo","nom":"Dr. Mundo","titre":"Dément de Zaun","blurb":"Totalement fou, complètement porté sur l'homicide, horriblement violet, Dr. Mundo est la principale raison pour laquelle les citoyens de Zaun restent calfeutrés chez eux les nuits les plus sombres. Désormais médecin autoproclamé, il fut autrefois un patient de l'asile tristement célèbre de Zaun. Après avoir « soigné » tout le personnel, Dr. Mundo a commencé à exercer dans les mêmes salles où il fut traité et à reproduire les méthodes immorales dont il fut lui-même si souvent victime. Profitant d'une armoire remplie de médicaments et d'aucune connaissance en médecine, il se rend un peu plus monstrueux à chaque injection et terrorise les malheureux « patients » qui passent près de son cabinet.","tags":["Tank","Fighter"],"info":{"attack":5,"defense":7,"magic":6,"difficulty":5},"partype":"Aucune","passif":{"nom":"Il va où il veut","description":"Dr. Mundo résiste au premier effet immobilisant qui l'affecte. En revanche, il perd des PV et laisse tomber une bonbonne chimique. Dr. Mundo peut la ramasser en marchant dessus, ce qui lui rend des PV et réduit le délai de récupération de cette compétence.<br><br>Dr. Mundo dispose aussi d'une régénération de PV considérablement accrue.<br>"},"competences":[{"nom":"Scie souillée","description":"Dr. Mundo lance une scie à os souillée, ralentissant le premier ennemi touché et lui infligeant des dégâts selon ses PV actuels.","cd":"4","cout":"0","typeCout":" PV"},{"nom":"Défibrillateur","description":"Dr. Mundo s'électrocute, infligeant des dégâts continus aux ennemis proches et stockant une partie des dégâts subis. À la fin de la durée ou à la réactivation, Dr. Mundo inflige une vague de dégâts aux ennemis proches. Si la vague touche un ennemi, Dr. Mundo récupère des PV équivalents à un pourcentage des dégâts stockés.","cd":"17/16.5/16/15.5/15","cout":"0","typeCout":"% des PV actuels"},{"nom":"Contusion","description":"Passive - Dr. Mundo gagne des dégâts d'attaque bonus selon ses PV max.<br><br>Active - Dr. Mundo donne un violent coup avec sa sacoche « médicale », infligeant des dégâts supplémentaires selon ses PV manquants. Si la cible meurt sur le coup, elle est repoussée et elle inflige des dégâts aux ennemis qu'elle traverse.","cd":"9/8.25/7.5/6.75/6","cout":"0","typeCout":" PV"},{"nom":"Dosage maximal","description":"Dr. Mundo s'injecte des produits chimiques et récupère instantanément un pourcentage de ses PV manquants. Il gagne ensuite de la vitesse de déplacement et régénère une partie de ses PV max sur une longue durée.","cd":"120","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Ekko","nom":"Ekko","titre":"Fractureur du temps","blurb":"Jeune prodige des rues mal famées de Zaun, Ekko est capable de manipuler le temps pour renverser toute situation dangereuse à son avantage. Il utilise sa propre invention, la clepsydre-zéro, pour explorer les différents possibles de la réalité, sculptant ainsi des moments parfaits qui donnent l'impression qu'il réussit l'impossible du premier coup, à chaque fois. Bien qu'Ekko aime sa liberté, lorsque ses proches sont menacés, lui et les Feux volants sont prêts à tout pour les défendre.","tags":["Assassin","Mage"],"info":{"attack":5,"defense":3,"magic":7,"difficulty":8},"partype":"Mana","passif":{"nom":"RéZonance","description":"Toutes les trois attaques ou compétences infligeant des dégâts sur une même cible, Ekko inflige des dégâts magiques supplémentaires. Si la cible est un champion, il gagne en plus un bref bonus en vitesse de déplacement.<br><br>"},"competences":[{"nom":"Rétrobang","description":"Ekko lance une grenade temporelle qui crée un champ de distorsion quand elle touche un champion ennemi, ralentissant toutes les unités prises à l'intérieur et leur infligeant des dégâts. Ensuite, la grenade se contracte et revient vers Ekko, infligeant des dégâts sur sa route.","cd":"9/8.5/8/7.5/7","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Convergence parallèle","description":"Les attaques de base d'Ekko infligent des dégâts magiques supplémentaires aux champions dont les PV sont bas. Ekko peut lancer Convergence parallèle pour fracturer la ligne temporelle, créant après quelques secondes une anomalie qui ralentit les ennemis pris à l'intérieur. Si Ekko entre dans l'anomalie, il obtient un bouclier et étourdit les ennemis en suspendant dans le temps leur existence.","cd":"22/20/18/16/14","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Rush déphasé","description":"Ekko esquive tout en chargeant sa clepsydre-zéro. Sa prochaine attaque infligera des dégâts supplémentaires et le téléportera près de sa cible en distordant la réalité.","cd":"9/8.5/8/7.5/7","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Chronofracture","description":"Ekko fracture sa ligne du temps, ce qui le rend impossible à cibler et lui permet de retourner à un moment qui lui est plus favorable. Il retourne là où il était quelques secondes plus tôt et récupère un pourcentage des PV qu'il a perdus pendant ces quelques secondes. Les ennemis proches de sa zone d'arrivée subissent d'importants dégâts.","cd":"110/80/50","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Elise","nom":"Elise","titre":"Reine araignée","blurb":"Elise est un prédateur mortel qui vit dans un palais reclus et obscur, au plus profond de la plus vieille ville de Noxus. C'était autrefois une simple femme, maîtresse d'une Maison toute-puissante, mais la morsure d'un maléfique demi-dieu la transforma en un être aussi magnifique qu'inhumain : une créature arachnéenne qui tisse sa toile pour piéger ses proies. Pour maintenir sa jeunesse éternelle, Elise se repaît des innocents et peu sont ceux qui peuvent résister à sa séduction.","tags":["Assassin","Mage"],"info":{"attack":6,"defense":5,"magic":7,"difficulty":9},"partype":"Mana","passif":{"nom":"Reine araignée","description":"Forme humaine : quand les compétences d'Elise touchent un ennemi, elle génère une araignée en sommeil.<br><br>Forme arachnéenne : les attaques de base infligent des dégâts magiques supplémentaires et rendent des PV à Elise."},"competences":[{"nom":"Neurotoxine/Morsure venimeuse","description":"Forme humaine : inflige des dégâts en fonction des PV actuels de la cible.<br><br>Forme arachnéenne : fonce sur un ennemi et lui inflige des dégâts en fonction de ses PV manquants.","cd":"6","cout":"80/85/90/95/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Araignée explosive/Frénésie symbiotique","description":"Forme humaine : libère une araignée gorgée de venin qui explose en approchant d'une cible.<br><br>Forme arachnéenne : Elise et ses araignées voient leur vitesse d'attaque augmentée.","cd":"12","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Cocon/Suspension","description":"Forme humaine : étourdit la première unité ennemie touchée et la révèle si elle n'est pas furtive.<br><br>Forme arachnéenne : Elise et ses araignées se suspendent dans les airs puis se laissent tomber sur l'ennemi ciblé. Après qu'Elise est retombée sur un ennemi, les dégâts supplémentaires et les soins de Reine araignée sont augmentés.","cd":"12/11.5/11/10.5/10","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Forme arachnéenne","description":"Se transforme en une terrifiante araignée, ce qui réduit sa portée d'attaque mais augmente sa vitesse de déplacement, la dote de nouvelles compétences et lui offre une horde d'araignées qui attaque ses ennemis.","cd":"3","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Evelynn","nom":"Evelynn","titre":"Démon sadique","blurb":"Dans les sombres failles de Runeterra, le démon nommé Evelynn cherche sa prochaine victime. Elle attire sa proie en se faisant passer pour une femme voluptueuse, et dès que sa cible succombe à ses charmes, Evelynn révèle sa véritable nature. Elle inflige alors à sa victime des tourments indicibles et se repaît de sa douleur. Pour un démon, ce ne sont que des plaisirs innocents. Aux yeux du reste de Runeterra, ce sont des contes terrifiants, qui rappellent les dangers du désir et de la luxure.","tags":["Assassin","Mage"],"info":{"attack":4,"defense":2,"magic":7,"difficulty":10},"partype":"Mana","passif":{"nom":"Ombre démoniaque","description":"En dehors des combats, Evelynn se plonge dans une Ombre démoniaque. Ombre démoniaque soigne Evelynn quand ses PV sont bas et lui octroie un camouflage à partir du niveau 6."},"competences":[{"nom":"Piques de haine","description":"Evelynn frappe avec son cirre et inflige des dégâts à la première unité touchée. Elle peut ensuite tirer une ligne de piques vers les ennemis proches à plusieurs reprises.","cd":"4","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Séduction","description":"Evelynn maudit une cible, ce qui permet à sa prochaine attaque ou à son prochain sort de charmer sa cible et de réduire sa résistance magique.","cd":"15/14/13/12/11","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Coup de fouet","description":"Evelynn donne un coup de fouet à sa cible avec son cirre et lui inflige des dégâts. Elle augmente ensuite sa vitesse de déplacement pendant un court instant.","cd":"8","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Faiseuse de veuves","description":"Evelynn devient brièvement impossible à cibler et ravage la zone devant elle avant de se téléporter loin en arrière.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},
