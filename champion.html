{"id":"Twitch","nom":"Twitch","titre":"Semeur de peste","blurb":"Rat de Zaun, pesteux de naissance, connaisseur en saleté par passion, Twitch n'a pas peur de se salir les pattes. Armé d'une arbalète chimique qu'il pointe droit sur le cœur de Piltover, Twitch s'est juré de montrer aux gens de la surface à quel point ils sont vraiment sales. Toujours furtif et insaisissable, quand il ne traîne pas dans le Puisard, il fouille dans les déchets à la recherche de trésors qu'il est le seul à apprécier... ou d'un morceau de sandwich.","tags":["Marksman","Assassin"],"info":{"attack":9,"defense":2,"magic":3,"difficulty":6},"partype":"Mana","passif":{"nom":"Venin mortel","description":"Les attaques de base de Twitch contaminent sa cible %i:OnHit% <OnHit>à l'impact</OnHit>, lui infligeant des dégâts bruts chaque seconde."},"competences":[{"nom":"Embuscade","description":"Twitch se camoufle pendant un court instant et sa vitesse de déplacement est augmentée. Quand il quitte son camouflage, sa vitesse d'attaque est augmentée pendant un court instant.<br><br>Quand un champion ennemi affecté par Venin mortel meurt, le délai de récupération d'Embuscade prend fin.","cd":"16","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Dose de venin","description":"Twitch projette une dose de venin qui explose sur une zone, ralentissant les cibles et leur infligeant Venin mortel.","cd":"13/12/11/10/9","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Contamination","description":"Twitch contamine encore plus les ennemis empoisonnés avec de terribles maladies.","cd":"12/11/10/9/8","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Panique","description":"Twitch libère toute la puissance de son arbalète, tirant des carreaux à longue portée qui transpercent tous les ennemis touchés.","cd":"90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Udyr","nom":"Udyr","titre":"Gardien des esprits","blurb":"Udyr est le plus puissant des Gardiens des esprits, il communie avec l'ensemble des esprits qui habitent Freljord. Il comprend leurs besoins avec empathie et il est capable de canaliser et de transformer leur énergie éthérée pour alimenter son propre style de combat primitif. Il cherche l'équilibre intérieur pour que son esprit ne se perde pas parmi les autres, mais il cherche également l'équilibre à l'extérieur, car le paysage mystique de Freljord ne peut prospérer qu'avec la croissance engendrée par le conflit et la lutte. Udyr sait qu'il faut faire des sacrifices pour tenir à distance la stagnation des temps de paix.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":7,"magic":4,"difficulty":7},"partype":"Mana","passif":{"nom":"Canalisation des esprits","description":"Udyr possède quatre compétences de base qu'il peut utiliser pour changer de posture. Réactiver une compétence renouvelle ses effets et en ajoute d'autres. De plus, après avoir utilisé une compétence, les deux prochaines attaques d'Udyr gagnent de la vitesse d'attaque."},"competences":[{"nom":"Griffe sauvage","description":"Udyr gagne de la vitesse d'attaque et ses deux prochaines attaques infligent des dégâts physiques supplémentaires. Réactivation : Udyr gagne encore plus de vitesse d'attaque et ses deux prochaines attaques font tomber la foudre sur la cible.","cd":"6","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Cape de fer","description":"Udyr gagne un bouclier et ses deux prochaines attaques lui rendent des PV. Réactivation : Udyr gagne un bouclier encore plus puissant et récupère des PV selon ses PV max en quelques secondes.","cd":"6","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Piétinement flamboyant","description":"Udyr gagne de la vitesse de déplacement et sa première attaque contre chaque cible étourdit celle-ci. Réactivation : Udyr gagne encore plus de vitesse de déplacement et devient immunisé contre les effets immobilisants pendant quelques secondes. ","cd":"6","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Tempête spirituelle","description":"Udyr s'entoure d'une tempête glaciale, blessant et ralentissant les ennemis proches. Réactivation : Udyr renforce et libère la tempête. Elle suit alors les ennemis et inflige des dégâts supplémentaires.","cd":"6","cout":"40","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Urgot","nom":"Urgot","titre":"Broyeur","blurb":"Autrefois, Urgot était un puissant bourreau noxien. Il fut trahi par l'empire pour lequel il avait tant tué. Ceint de chaînes de fer, il fut contraint d'apprendre le vrai sens de la force dans les Oubliettes, une mine de forçats située dans les profondeurs de Zaun. Il put émerger à l'occasion d'un désastre qui jeta toute la ville dans le chaos. À présent, son ombre imposante s'étend dans son empire criminel souterrain. Levant sur ses victimes les chaînes qui le maintenaient naguère en esclavage, il veut purger son nouveau foyer, nouvelle croisée des douleurs, de tous ceux qu'il en estime indignes.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":8},"partype":"Mana","passif":{"nom":"Flammes purificatrices","description":"Les attaques de base et Géhenne d'Urgot font jaillir des jets de flammes de ses jambes, infligeant des dégâts physiques."},"competences":[{"nom":"Torpille corrosive","description":"Tire une torpille dans la zone ciblée. L'explosion inflige des dégâts physiques aux ennemis et les ralentit.","cd":"10/9.5/9/8.5/8","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Géhenne","description":"Urgot ralentit tout en déchargeant son arme sur les ennemis proches. Il vise en priorité les champions ennemis qu'il a récemment frappés avec d'autres compétences et il déclenche Flammes purificatrices.","cd":"12/9/6/3/0","cout":"40/30/20/10/0","typeCout":" {{ abilityresourcename }}"},{"nom":"Mépris","description":"Urgot fonce dans une direction, s'entoure d'un bouclier et piétine les ennemis sur son passage (hors champions). S'il percute un champion ennemi, il s'arrête et le projette hors de son chemin.","cd":"16/15.5/15/14.5/14","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Règne de la terreur","description":"Urgot tire un trépan qui empale le premier champion ennemi touché. Si ce champion tombe sous un certain seuil de PV, Urgot considère qu'il est trop faible et peut l'exécuter.","cd":"100/85/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Varus","nom":"Varus","titre":"Flèche de la vengeance","blurb":"Membre de la race antique des Darkin, Varus était en son temps un assassin cruel qui aimait torturer ses ennemis, les conduisant jusqu'aux portes de la folie avant de les achever d'une flèche. À la fin de la Guerre des Darkin, il fut emprisonné. Des siècles plus tard, il s'évada en utilisant la chair recomposée de deux chasseurs d'Ionia : l'ayant relâché par imprudence, ils furent condamnés à porter l'arc lié à l'essence de Varus. Varus traque désormais ceux qui l'ont enfermé pour se venger, mais les âmes des mortels à l'intérieur de lui s'opposent à ses desseins de toutes leurs forces.","tags":["Marksman","Mage"],"info":{"attack":7,"defense":3,"magic":4,"difficulty":2},"partype":"Mana","passif":{"nom":"Vengeance incarnée","description":"Quand il tue un ennemi ou quand il réussit une assistance, Varus gagne temporairement des dégâts d'attaque et de la puissance. Ce bonus est plus important si l'ennemi tué est un champion."},"competences":[{"nom":"Flèche perforante","description":"Varus effectue un tir puissant dont les dégâts et la portée augmentent avec la durée de la charge.","cd":"16/15/14/13/12","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Carquois meurtri","description":"Passive : les attaques de base de Varus infligent des dégâts magiques supplémentaires ainsi que Meurtrissure. Les autres compétences de Varus déclenchent Meurtrissure, infligeant des dégâts magiques en fonction des PV max de la cible. Active : Varus renforce sa prochaine Flèche perforante.","cd":"40","cout":"0","typeCout":"Pas de coût"},{"nom":"Pluie de flèches","description":"Varus tire une pluie de flèches qui inflige des dégâts physiques et souille le sol. Le sol souillé réduit la vitesse de déplacement des ennemis et réduit les soins qu'ils reçoivent et leur régénération.","cd":"18/16/14/12/10","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Chaîne corruptrice","description":"Varus lance une vrille de corruption qui blesse et immobilise le premier champion ennemi touché et qui se propage ensuite vers les champions non infectés proches, les immobilisant eux aussi en les touchant.","cd":"100/80/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Vayne","nom":"Vayne","titre":"Chasseresse nocturne","blurb":"Shauna Vayne est une chasseuse de monstres mortelle et sans scrupule. Originaire de Demacia, elle voue sa vie à la destruction du démon qui a assassiné sa famille. Armée d'une arbalète montée sur son poignet et dotée d'un cœur rongé par le désir de vengeance, elle n'est heureuse que quand elle assassine les praticiens ou les créations des arts obscurs en les frappant depuis l'ombre avec une volée de carreaux d'argent.","tags":["Marksman","Assassin"],"info":{"attack":10,"defense":1,"magic":1,"difficulty":8},"partype":"Mana","passif":{"nom":"Chasseresse nocturne","description":"Vayne traque sans relâche les êtres malfaisants, gagnant de la vitesse de déplacement vers les champions ennemis proches."},"competences":[{"nom":"Roulade","description":"Vayne fait une roulade et se positionne pour mieux viser. Sa prochaine attaque inflige des dégâts supplémentaires.","cd":"6/5/4/3/2","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Carreaux d'argent","description":"Vayne trempe ses carreaux dans de l'argent, un métal nocif pour les êtres maléfiques. La troisième attaque ou compétence consécutive contre une même cible inflige un pourcentage des PV max de la cible sous forme de dégâts bruts supplémentaires.","cd":"0","cout":"0","typeCout":"Compétence passive"},{"nom":"Condamnation","description":"Vayne prend l'arbalète qu'elle porte sur le dos et tire un carreau gigantesque sur sa cible, lui infligeant des dégâts et la projetant en arrière. Si la cible percute le décor, elle est empalée, ce qui lui inflige des dégâts supplémentaires et l'étourdit.","cd":"20/18/16/14/12","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Combat ultime","description":"Vayne se prépare à un combat épique ; ses dégâts d'attaque augmentent, elle devient invisible pendant Roulade, le délai de récupération de Roulade est réduit et le bonus de vitesse de Chasseresse nocturne est augmenté.","cd":"100/85/70","cout":"80","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Veigar","nom":"Veigar","titre":"Seigneur des maléfices","blurb":"Maître enthousiaste de la magie noire, Veigar s'est approprié des pouvoirs que peu de mortels osent approcher. Habitant de Bandle à l'esprit libre, il veut repousser les limites de la magie yordle et se tourner vers les textes arcaniques qui sont restés cachés des millénaires. Fasciné jusqu'à l'obstination par les mystères de l'univers, Veigar est souvent sous-estimé par les gens qui l'entourent. Bien qu'il se croie fondamentalement maléfique, il possède une moralité qui le mène à s'interroger sur ses motivations.","tags":["Mage"],"info":{"attack":2,"defense":2,"magic":10,"difficulty":7},"partype":"Mana","passif":{"nom":"Pouvoir maléfique phénoménal","description":"Veigar est le plus grand mal qui ait jamais frappé Runeterra, et son pouvoir est encore en pleine croissance ! Frapper un champion ennemi avec une compétence, tuer un champion ou effectuer une assistance octroie à Veigar un bonus permanent en puissance."},"competences":[{"nom":"Coup malin","description":"Veigar lance une boule d'énergie des ténèbres, infligeant des dégâts magiques aux deux premiers ennemis touchés. Les unités tuées par cette compétence confèrent à Veigar un gain de puissance permanent.","cd":"6/5.5/5/4.5/4","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Matière noire","description":"Veigar fait tomber de la matière noire pour infliger des dégâts magiques à ses adversaires. Les effets Pouvoir maléfique phénoménal cumulés réduisent le délai de récupération de Matière noire.","cd":"0","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Profanation","description":"Veigar distord l'espace dans la zone ciblée, créant une cage qui étourdit les ennemis qui la traversent.","cd":"20/18.5/17/15.5/14","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Explosion primordiale","description":"Lance de l'énergie explosive sur le champion ennemi ciblé, infligeant d'importants dégâts magiques qui augmentent avec les PV manquants de la cible.","cd":"120/90/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Velkoz","nom":"Vel'Koz","titre":"Œil du Néant","blurb":"On ne sait pas trop si Vel'Koz fut le premier monstre du Néant à émerger à Runeterra, mais il est certain qu'aucun autre n'a jamais égalé la froideur calculatrice de sa cruauté. Alors que ses semblables dévorent ou profanent tout ce qui les entoure, il cherche à étudier le royaume physique et les étranges êtres belliqueux qui l'habitent. Selon lui, c'est ainsi que le Néant trouvera comment exploiter leurs faiblesses. Mais Vel'Koz n'est pas qu'un observateur passif. Il répond à toute menace avec des éruptions mortelles de plasma ou en déchirant le tissu même du monde.","tags":["Mage","Support"],"info":{"attack":2,"defense":2,"magic":10,"difficulty":8},"partype":"Mana","passif":{"nom":"Décomposition organique","description":"Les compétences de Vel'Koz appliquent des effets <keywordName>Décomposition organique</keywordName> aux ennemis touchés. À 3 effets cumulés, l'ennemi subit une explosion de dégâts bruts."},"competences":[{"nom":"Fission du plasma","description":"Vel'Koz tire un projectile de plasma qui se divise en deux quand il touche un ennemi ou quand la compétence est réactivée. Le projectile ralentit et blesse à l'impact.","cd":"7","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Ouverture de faille","description":"Vel'Koz ouvre une faille vers le Néant, infligeant des dégâts initiaux. Après un court délai, la faille explose et inflige des dégâts secondaires.","cd":"1.5","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Dislocation tectonique","description":"Vel'Koz provoque une explosion dans une zone, projetant les ennemis dans les airs et repoussant légèrement les ennemis proches.","cd":"12/11.5/11/10.5/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Désintégrateur de formes de vie","description":"Vel'Koz tire un rayon canalisé qui suit le curseur pendant 2.5 sec et inflige des dégâts magiques. Les champions ennemis qui sont des sujets d'étude (affectés par Décomposition organique) subissent à la place des dégâts bruts.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Vex","nom":"Vex","titre":"Ombre du désespoir","blurb":"Au cœur des terribles Îles obscures et de leur brume spectrale, une yordle solitaire se complaît dans son malheur. Vex se protège de la gaieté, de l'excitation et des gens « normaux » dont le monde extérieur regorge grâce à une dose inépuisable d'apitoiement et à une ombre puissante. Même si l'ambition lui fait défaut, on peut compter sur elle pour ternir le bonheur des autres et éloigner tous ceux qui voudraient l'approcher avec sa morosité magique.","tags":["Mage"],"info":{"attack":0,"defense":0,"magic":0,"difficulty":0},"partype":"Mana","passif":{"nom":"Malheur et Désespoir","description":"Vex est régulièrement renforcée, ce qui permet à sa prochaine compétence de base d'effrayer les ennemis et d'interrompre les ruées. Chaque fois qu'un ennemi proche fait une ruée, Vex applique une marque qui, si elle est consommée, inflige des dégâts supplémentaires et réduit le délai de récupération du renforcement."},"competences":[{"nom":"Mistral perdant","description":"Vex lance un projectile qui inflige des dégâts et qui accélère pendant son vol.","cd":"8/7/6/5/4","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Lâchez-moi !","description":"Vex gagne un bouclier et blesse les ennemis proches.","cd":"16/15/14/13/12","cout":"75","typeCout":" {{ abilityresourcename }}"},{"nom":"Ténèbres imminentes","description":"Vex invoque une zone qui blesse et ralentit les ennemis en plus d'appliquer Désespoir sur eux.","cd":"12","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Déferlement d'Ombre","description":"Vex tire un projectile qui marque un champion ennemi. Elle peut réactiver cette compétence pour se ruer sur cet ennemi et lui infliger des dégâts.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Vi","nom":"Vi","titre":"Pacifieuse de Piltover","blurb":"Élevée dans les quartiers louches de Zaun, Vi est une femme sans peur, mais pas sans reproche, au tempérament bouillant, impulsif, qui n'a qu'un respect mesuré pour l'autorité. Elle a toujours été une survivante astucieuse, que ce soit lorsqu'elle troublait l'ordre public de Piltover pendant sa jeunesse, ou lors de son séjour injustement long à la prison de Stillwater. Aujourd'hui, elle travaille avec les pacifieurs de Piltover pour maintenir l'ordre plutôt que le troubler, et elle se sert pour cela de puissants gantelets Hextech qui n'ont peur de frapper ni les plus épais murs de briques ni les criminels.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":4},"partype":"Mana","passif":{"nom":"Bouclier antichoc","description":"Vi charge un bouclier sur la durée. Le bouclier peut être activé en frappant un ennemi avec une compétence."},"competences":[{"nom":"Brise-coffre","description":"Vi charge ses gants et balance un coup de poing destructeur qui l'entraîne vers l'avant. Les ennemis touchés sont repoussés et subissent un effet Coups fracassants.","cd":"12/10.5/9/7.5/6","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Coups fracassants","description":"Les coups de poing de Vi brisent l'armure de son adversaire, infligeant des dégâts supplémentaires et augmentant sa vitesse d'attaque.","cd":"0","cout":"0","typeCout":"Compétence passive"},{"nom":"Force implacable","description":"La prochaine attaque de Vi traversera sa cible, infligeant des dégâts aux ennemis qui se trouvent derrière.","cd":"1","cout":"26/32/38/44/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Mise en demeure","description":"Vi fonce sur un ennemi, écartant ceux qui sont sur son passage. Quand elle atteint sa cible, elle la projette dans les airs, saute par-dessus et la renvoie au sol.","cd":"140/115/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Viego","nom":"Viego","titre":"Roi déchu","blurb":"Autrefois souverain d'un royaume perdu depuis longtemps, Viego mourut il y a plus de mille ans lorsqu'il tenta de ramener sa femme d'entre les morts. Cela causa la catastrophe magique connue sous le nom de la Ruine. Devenu un puissant spectre torturé par le désir obsessionnel de retrouver sa reine morte depuis des siècles, Viego est désormais le Roi déchu. Il contrôle la Nuit de l'horreur et parcourt Runeterra pour trouver un moyen de ramener sa bien-aimée, détruisant tout sur son passage avec la Brume noire qui se répand inlassablement depuis son cœur brisé et cruel.","tags":["Fighter","Assassin"],"info":{"attack":6,"defense":4,"magic":2,"difficulty":5},"partype":"Aucune","passif":{"nom":"Assujettissement","description":"Les ennemis qui meurent devant Viego deviennent des spectres. Quand il attaque un spectre, Viego prend temporairement le contrôle du corps de l'ennemi mort, récupérant un pourcentage des PV max de la cible et gagnant l'accès à ses compétences de base et à ses objets. Viego ne gagne pas l'accès à l'ultime de la cible, mais peut lancer son propre ultime gratuitement."},"competences":[{"nom":"Lame du roi déchu","description":"La lame spectrale de Viego inflige passivement un pourcentage des PV actuels de la cible en dégâts supplémentaires <OnHit>à l'impact</OnHit> et frappe deux fois les ennemis qu'il a récemment touchés avec une compétence, leur volant au passage des PV.<br><br>Viego peut activer cette compétence pour donner un coup d'estoc, empalant ainsi les ennemis devant lui.","cd":"5/4.5/4/3.5/3","cout":"0","typeCout":"Pas de coût"},{"nom":"Gueule spectrale","description":"Viego charge son attaque avant de se ruer vers l'avant, projetant une boule de Brume noire concentrée qui étourdit le premier ennemi touché.","cd":"8","cout":"0","typeCout":"Pas de coût"},{"nom":"Chemin tourmenté","description":"Viego ordonne à la Brume noire de hanter et entourer un élément de terrain. Viego peut se cacher dans la Brume sous forme de spectre, ce qui le camoufle et augmente ses vitesses de déplacement et d'attaque.","cd":"14/12/10/8/6","cout":"0","typeCout":"Pas de coût"},{"nom":"Cœur brisé","description":"Viego se téléporte à un endroit proche et exécute un champion ennemi à l'arrivée, lui transperçant le cœur et provoquant une onde de choc destructrice qui repousse les alliés de cet ennemi.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Viktor","nom":"Viktor","titre":"Héraut de l'arcane","blurb":"Passant d'être humain maladif à un être entièrement biomécanique, Viktor a adopté sa glorieuse évolution et est devenu une sorte de messie pour ses adeptes. Il a sacrifié sa propre humanité, convaincu qu'éliminer ses émotions éliminerait ses souffrances. Il cherche désormais à apporter la révélation du cœur Hextech au reste du monde, et ce même si ce dernier se révèle incapable d'en comprendre les bénéfices. Après tout, pour ce maître de l'arcane, la violence n'est rien d'autre qu'une variable nécessaire pour équilibrer l'équation ultime.","tags":["Mage"],"info":{"attack":2,"defense":4,"magic":10,"difficulty":9},"partype":"Mana","passif":{"nom":"Glorieuse évolution","description":"Viktor gagne des fragments Hextech chaque fois qu'il tue un ennemi. Tous les 100 fragments Hextech, Viktor améliore définitivement une de ses compétences actives. Après avoir amélioré toutes ses compétences de base, il peut récupérer 100 fragments Hextech pour améliorer sa compétence ultime."},"competences":[{"nom":"Siphonnage","description":"Viktor inflige des dégâts magiques à une unité ennemie, obtient un bouclier et renforce sa prochaine attaque de base.<br><br>Amélioration : le bouclier de Siphonnage est augmenté de 60% et Viktor gagne de la vitesse de déplacement bonus après le lancement.<br>","cd":"9/8/7/6/5","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Champ gravitationnel","description":"Viktor crée un champ gravitationnel qui ralentit les ennemis dans son rayon d'action. Les ennemis qui restent trop longtemps dans le champ sont étourdis.<br><br>Amélioration : les compétences de Viktor ralentissent les ennemis touchés.<br>","cd":"17/16/15/14/13","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Rayon Hextech","description":"Viktor utilise son bras biomécanique pour tirer un rayon Hextech en ligne droite, infligeant des dégâts à tous les ennemis sur son passage.<br><br>Amélioration : le rayon Hextech provoque une explosion dans son sillage, infligeant des dégâts magiques.<br>","cd":"12/11/10/9/8","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Tempête arcanique","description":"Viktor crée une tempête arcanique dans une zone, infligeant des dégâts magiques et interrompant les canalisations ennemies. La tempête inflige périodiquement des dégâts magiques à tous les ennemis proches et peut être redirigée par Viktor.<br><br>Amélioration : la tempête arcanique se déplace 25% plus vite. Quand un champion meurt après qu'elle lui a infligé des dégâts, elle grandit et sa durée est augmentée.<br><br>","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Vladimir","nom":"Vladimir","titre":"Saigneur pourpre","blurb":"Assoiffé de sang humain, Vladimir influe sur la politique de Noxus depuis les premiers jours de l'empire. En plus d'allonger surnaturellement sa vie, sa maîtrise de l'hémomancie lui permet de contrôler les esprits et les corps des autres aussi aisément que les siens. Dans les flamboyants salons de l'aristocratie noxienne, cela lui a permis de créer autour de lui un culte de la personnalité. Cependant, dans les bas-fonds, il saigne littéralement ses ennemis à blanc.","tags":["Mage","Fighter"],"info":{"attack":2,"defense":6,"magic":8,"difficulty":7},"partype":"Afflux sanguin","passif":{"nom":"Pacte de sang","description":"Vladimir gagne 1 pt de puissance tous les 30 PV bonus, et 1.6 PV bonus tous les 1 pt de puissance (ces effets ne se cumulent pas entre eux)."},"competences":[{"nom":"Transfusion","description":"Vladimir vole les PV de l'ennemi ciblé. Quand la jauge de ressource de Vladimir est pleine, Transfusion infligera beaucoup plus de dégâts et rendra beaucoup plus de PV pendant un court instant.","cd":"9/7.9/6.8/5.7/4.6","cout":"0","typeCout":"Pas de coût"},{"nom":"Bain de sang","description":"Vladimir plonge dans une flaque de sang, devenant impossible à cibler pendant 2 sec. Les ennemis dans la flaque sont ralentis et Vladimir peut aspirer leur vie.","cd":"28/25/22/19/16","cout":"0","typeCout":"% des PV actuels"},{"nom":"Vagues de sang","description":"Vladimir dépense ses propres PV pour charger un orbe de sang qui, une fois lâché, infligera des dégâts de zone autour de lui. Les Vagues de sang peuvent être bloquées par les unités ennemies.","cd":"13/11/9/7/5","cout":"0","typeCout":"% des PV max ({{ chargehealthtooltip }})"},{"nom":"Peste sanguine","description":"Vladimir contamine une zone avec une peste virulente. Les ennemis infectés subissent plus de dégâts pendant la durée de la compétence. Après quelques secondes, Peste sanguine inflige des dégâts magiques aux ennemis infectés et rend des PV à Vladimir pour chaque champion ennemi touché.","cd":"120","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Volibear","nom":"Volibear","titre":"Tempête impitoyable","blurb":"Pour ceux qui le vénèrent encore, Volibear est l'incarnation de la tempête. Destructeur, sauvage et déterminé, il existait bien avant que les mortels n'arpentent la toundra de Freljord ; désormais, il défend férocement les terres qu'il a créées avec sa famille de demi-dieux. Habité d'une haine profonde envers la civilisation et la faiblesse qu'elle a engendrée, il se bat à coups de crocs et de griffes pour restaurer les traditions d'autrefois, celles du temps où la terre était sauvage et où le sang coulait librement.","tags":["Fighter","Tank"],"info":{"attack":7,"defense":7,"magic":4,"difficulty":3},"partype":"Mana","passif":{"nom":"Tempête impitoyable","description":"Les attaques et les compétences de Volibear augmentent sa vitesse d'attaque. Au bout d'un moment, ses attaques infligent des dégâts magiques supplémentaires aux ennemis proches."},"competences":[{"nom":"Coup fulgurant","description":"Volibear gagne de la vitesse en direction des ennemis, <status>étourdissant</status> et blessant le premier qu'il attaque.","cd":"14/13/12/11/10","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Folie mutilatrice","description":"Volibear blesse grièvement un ennemi, appliquant ses effets à l'impact et le marquant.  Relancer cette compétence sur la même cible inflige des dégâts supplémentaires et soigne Volibear.","cd":"5","cout":"20/25/30/35/40","typeCout":" {{ abilityresourcename }}"},{"nom":"Foudroiement","description":"Volibear fait tomber la foudre à l'endroit ciblé, blessant et ralentissant les ennemis tout en obtenant un bouclier s'il est dans le rayon de l'explosion.","cd":"16","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Tempête incarnée","description":"Volibear bondit vers l'endroit ciblé, ralentissant et blessant les ennemis sous lui tout en gagnant des PV supplémentaires.  Les tourelles ennemies proches de son point d'atterrissage sont temporairement désactivées.","cd":"160/135/110","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Warwick","nom":"Warwick","titre":"Fureur déchaînée de Zaun","blurb":"Warwick est un monstre qui chasse dans les allées grises de Zaun. Métamorphosé à l'issue d'expériences incroyablement douloureuses, son corps est désormais fusionné avec un système complexe de chambres et de pompes, une machinerie qui distille dans ses veines une rage alchimique constante. Il bondit des ombres pour traquer les criminels qui terrorisent les profondeurs de la ville. Warwick est attiré par le sang, dont l'odeur déclenche chez lui une furie meurtrière... et les proies blessées ne lui échappent jamais.","tags":["Fighter","Tank"],"info":{"attack":9,"defense":5,"magic":3,"difficulty":3},"partype":"Mana","passif":{"nom":"Soif inextinguible","description":"Les attaques de base de Warwick infligent des dégâts magiques supplémentaires. Si Warwick a moins de 50% de ses PV, il récupère des PV équivalents à ces dégâts. Si Warwick a moins de 25% de ses PV, le montant rendu est triplé."},"competences":[{"nom":"Dents de la bête","description":"Warwick se jette en avant et mord sa cible, infligeant des dégâts en fonction des PV max de cette cible et récupérant des PV équivalents à une partie des dégâts infligés.","cd":"8/7.5/7/6.5/6","cout":"80/85/90/95/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Traque sanguinaire","description":"Warwick repère les ennemis qui ont moins de 50% de leurs PV et obtient contre eux des bonus en vitesse de déplacement et en vitesse d'attaque. Contre les ennemis qui ont moins de 25% de leurs PV, ces bonus sont triplés.","cd":"80/70/60/50/40","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Hurlement bestial","description":"Warwick gagne de la réduction des dégâts pendant 2.5 sec. À la fin, ou si la compétence est réactivée, il hurle, ce qui fait fuir les ennemis proches pendant 1 sec.","cd":"15/14/13/12/11","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Contrainte infinie","description":"Warwick bondit dans une direction (la distance augmente avec sa vitesse de déplacement bonus), neutralisant le premier champion touché pendant 1.5 sec.","cd":"110/90/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Xayah","nom":"Xayah","titre":"Rebelle","blurb":"Précise et meurtrière, Xayah est une révolutionnaire vastaya menant une guerre personnelle dans le but de sauver son peuple. Elle se sert de sa célérité, de sa ruse et de ses plumes tranchantes comme des rasoirs pour terrasser tous ceux qui se dressent sur sa route. Xayah se bat aux côtés de son partenaire et amant, Rakan, pour défendre leur tribu dépérissante et rendre à leur race ce qu'elle considère être sa gloire d'antan.","tags":["Marksman"],"info":{"attack":10,"defense":6,"magic":1,"difficulty":5},"partype":"Mana","passif":{"nom":"Plumes perçantes","description":"Après avoir utilisé une compétence, les prochaines attaques de base de Xayah frapperont toutes les cibles sur leur passage et laisseront une <font color='#C200E1'>plume</font>."},"competences":[{"nom":"Dagues jumelles","description":"Xayah jette deux dagues qui infligent des dégâts et qui laissent des plumes qu'elle peut rappeler.","cd":"10/9.5/9/8.5/8","cout":"35","typeCout":" {{ abilityresourcename }}"},{"nom":"Plumage mortel","description":"Xayah crée une tempête de lames qui augmente sa vitesse d'attaque et ses dégâts, tout en augmentant sa vitesse de déplacement si elle attaque un champion.","cd":"18/17/16/15/14","cout":"60/55/50/45/40","typeCout":" {{ abilityresourcename }}"},{"nom":"Appel des lames","description":"Xayah rappelle toutes les plumes qu'elle a posées, infligeant des dégâts et immobilisant les ennemis.","cd":"12/11/10/9/8","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Rafale de plumes","description":"Xayah bondit dans les airs, devenant impossible à cibler et lançant des dagues qui laissent des plumes qu'elle peut rappeler.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Xerath","nom":"Xerath","titre":"Mage suprême","blurb":"Xerath est un mage transfiguré de la Shurima antique, un être d'énergie arcanique habitant les fragments détruits d'un sarcophage magique. Pendant des millénaires, il est resté prisonnier des sables du désert, mais le retour de Shurima l'a libéré de sa prison ancestrale. Devenu ivre de pouvoir, il cherche désormais à reprendre ce qu'il croit lui être dû et à remplacer les civilisations arrivistes qui ont pris possession du monde par une nouvelle, façonnée à son image.","tags":["Mage","Support"],"info":{"attack":1,"defense":3,"magic":10,"difficulty":8},"partype":"Mana","passif":{"nom":"Afflux de mana","description":"Les attaques de base de Xerath restaurent régulièrement du mana. À chaque fois que Xerath tue une unité, ce délai de récupération est réduit."},"competences":[{"nom":"Rayon arcanique","description":"Tire un rayon d'énergie à longue portée, infligeant des dégâts magiques à toutes les cibles touchées.","cd":"9/8/7/6/5","cout":"80/90/100/110/120","typeCout":" {{ abilityresourcename }}"},{"nom":"Œil de la destruction","description":"Fait tomber un barrage d'énergie arcanique, infligeant des dégâts magiques et ralentissant tous les ennemis dans la zone. Les cibles au centre de la zone d'effet subissent des dégâts supplémentaires et sont ralenties davantage.","cd":"14/13/12/11/10","cout":"80/90/100/110/120","typeCout":" {{ abilityresourcename }}"},{"nom":"Orbe d'électrocution","description":"Étourdit un ennemi et lui inflige des dégâts magiques.","cd":"13/12.5/12/11.5/11","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Rite arcanique","description":"Xerath s'immobilise et obtient plusieurs tirs de barrage à longue portée.","cd":"130/115/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"XinZhao","nom":"Xin Zhao","titre":"Sénéchal de Demacia","blurb":"Xin Zhao est un guerrier résolu qui sert fidèlement la dynastie régnante des Lightshield. Naguère condamné à se battre dans les arènes de combat de Noxus, il survécut à d'innombrables rencontres de gladiateurs. Mais après avoir été libéré par les forces de Demacia, il jura allégeance à ses braves libérateurs. Armé de sa lance à trois pointes, Xin Zhao combat désormais pour son royaume, défiant ses ennemis avec audace, quelles que soient ses chances de succès.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":6,"magic":3,"difficulty":2},"partype":"Mana","passif":{"nom":"Détermination","description":"Toutes les 3 attaques, Xin Zhao inflige des dégâts supplémentaires et récupère des PV."},"competences":[{"nom":"Frappe des trois serres","description":"Les 3 prochaines attaques de base de Xin Zhao infligeront plus de dégâts et la 3e attaque projettera la cible dans les airs.","cd":"7/6.5/6/5.5/5","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Vent et foudre","description":"Xin Zhao donne un coup de taille devant lui avec sa lance, puis donne un coup d'estoc, ralentissant les ennemis affectés et les marquant comme défiés.","cd":"12/11/10/9/8","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge audacieuse","description":"Xin Zhao charge un ennemi, augmentant sa vitesse d'attaque, infligeant des dégâts à tous les ennemis dans la zone et les ralentissant brièvement. La portée de cette compétence est augmentée contre les ennemis défiés.","cd":"11","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Garde circulaire","description":"Xin Zhao défie passivement un ennemi qu'il a récemment blessé. Lorsque la compétence est activée, Xin Zhao inflige des dégâts aux ennemis proches en fonction de leurs PV actuels et repousse les cibles non défiées. Il est ensuite immunisé contre les dégâts infligés par les champions hors du cercle créé.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Yasuo","nom":"Yasuo","titre":"Disgracié","blurb":"L'Ionien Yasuo est un épéiste agile et résolu, capable de déchaîner contre ses ennemis la puissance de l'air. Alors qu'il était encore un jeune homme fier, il fut accusé à tort d'avoir assassiné son maître. Incapable de prouver son innocence, il dut fuir et fut finalement contraint de tuer son frère pour se défendre. Même après la découverte du véritable meurtrier de son maître, Yasuo ne parvint pas à faire la paix avec sa conscience. Il erre désormais dans son pays natal, et seul le vent guide sa lame.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":4,"magic":4,"difficulty":10},"partype":"Impulsion","passif":{"nom":"Voie du vagabond","description":"Les chances de coup critique de Yasuo sont augmentées. De plus, Yasuo génère un bouclier quand il se déplace. Le bouclier se déclenche quand un champion ou un monstre lui inflige des dégâts."},"competences":[{"nom":"Tempête d'acier","description":"Donne un coup d'estoc, blessant tous les ennemis sur une ligne.<br><br>À l'impact, octroie un effet Tempête menaçante pendant quelques secondes. Après avoir cumulé 2 effets, Tempête d'acier crée une tornade qui projette <font color='#6655CC'>dans les airs</font>.<br><br>Tempête d'acier est considérée comme une attaque de base et est donc renforcée par les mêmes choses.","cd":"4","cout":"0","typeCout":"Pas de coût"},{"nom":"Mur de vent","description":"Crée un mur mobile qui bloque tous les projectiles ennemis pendant 4 sec.","cd":"25/23/21/19/17","cout":"0","typeCout":"Pas de coût"},{"nom":"Cercle tranchant","description":"Yasuo se rue à travers l'ennemi ciblé, infligeant des dégâts magiques. Chaque utilisation augmente les dégâts de la ruée suivante jusqu'à un montant max.<br><br>Ne peut pas être réutilisé sur le même ennemi pendant quelques secondes.<br><br><font color='#99FF99'>Si Tempête d'acier est lancée pendant cette ruée, elle donne un coup circulaire.</font>","cd":"0.5/0.4/0.3/0.2/0.1","cout":"0","typeCout":"Pas de coût"},{"nom":"Dernier soupir","description":"Bondit sur un champion ennemi <factionIonia1>projeté dans les airs</factionIonia1> et lui inflige des dégâts physiques. En outre, tous les ennemis qui étaient <factionIonia1>projetés dans les airs</factionIonia1> dans la zone sont maintenus en l'air. Remplit totalement l'Impulsion mais réinitialise tous les effets cumulés de Tempête menaçante.<br><br>Ensuite, pendant une durée modérée, les coups critiques de Yasuo ont une pénétration du bonus d'armure significativement augmentée.","cd":"70/50/30","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Yone","nom":"Yone","titre":"Inoublié","blurb":"Au cours de sa vie, Yone fut le demi-frère de Yasuo et un disciple renommé de l'école d'armes de son village. Mais après avoir été tué par son propre frère, il se retrouva hanté par une entité malveillante dans le royaume spirituel. Il dut la tuer avec sa propre épée. Désormais maudit et forcé de porter le masque de l'azakana, Yone chasse inlassablement ces créatures démoniaques afin de comprendre ce qu'il est devenu.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":4,"magic":4,"difficulty":8},"partype":"Impulsion","passif":{"nom":"Voie du chasseur","description":"Une attaque de Yone sur deux inflige des dégâts magiques. De plus, ses chances de coup critique sont augmentées."},"competences":[{"nom":"Acier mortel","description":"Yone donne un coup d'estoc devant lui, blessant tous les ennemis sur une ligne.<br><br>À l'impact, cela lui octroie un effet Tempête menaçante pendant quelques secondes. À 2 effets cumulés, Acier mortel permet à Yone de se ruer vers l'avant dans une rafale de vent qui <status>projette les ennemis dans les airs</status>.","cd":"4","cout":"0","typeCout":"Pas de coût"},{"nom":"Fendoir spirituel","description":"Yone frappe devant lui en blessant tous les ennemis dans une zone conique. Yone obtient un bouclier dont les PV augmentent avec le nombre de champions touchés.<br><br>Les délais de récupération et d'incantation de Fendoir spirituel sont réduits par la vitesse d'attaque.","cd":"14","cout":"0","typeCout":"Pas de coût"},{"nom":"Libération spirituelle","description":"L'esprit de Yone quitte son corps et gagne en vitesse de déplacement. Quand cette compétence prend fin, Yone est renvoyé de force dans son corps et une partie des dégâts qu'il a infligés sous forme d'esprit est répétée.","cd":"22/19/16/13/10","cout":"0","typeCout":"Pas de coût"},{"nom":"Destin scellé","description":"Yone se téléporte derrière le dernier champion sur une ligne en donnant un coup si puissant qu'il attire vers lui tous les ennemis touchés.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Yorick","nom":"Yorick","titre":"Berger des âmes","blurb":"Yorick est le dernier survivant d'un ordre religieux disparu depuis longtemps et son pouvoir sur les morts est à la fois une bénédiction et une malédiction. Prisonnier des Îles obscures, il n'a pour compagnons que les cadavres pourrissants et les spectres hurlants qu'il rassemble. Les actes monstrueux de Yorick trahissent son noble objectif : libérer sa terre natale de la malédiction de la Ruine.","tags":["Fighter","Tank"],"info":{"attack":6,"defense":6,"magic":4,"difficulty":6},"partype":"Mana","passif":{"nom":"Berger des âmes","description":"<font color='#FF9900'>Horde maudite :</font> Yorick peut invoquer des Goules de Brume pour attaquer les ennemis proches."},"competences":[{"nom":"Derniers sacrements","description":"La prochaine attaque de Yorick infligera des dégâts supplémentaires et le soignera. Si la cible est un champion, un grand monstre ou si elle meurt, cela crée une tombe.","cd":"6/5.5/5/4.5/4","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Sombre cortège","description":"Yorick invoque à l'endroit ciblé un mur destructible qui bloque les déplacements des ennemis.","cd":"20/18/16/14/12","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Brume endeuillée","description":"Yorick lance un globe de Brume noire qui réduit l'armure, blesse, ralentit et marque les ennemis. Les unités invoquées gagnent de la vitesse de déplacement lorsqu'elles avancent vers les cibles marquées. ","cd":"12/11/10/9/8","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Élégie des Îles","description":"Yorick invoque la Vierge de la Brume. Les attaques de Yorick contre la cible de la Vierge infligent des dégâts supplémentaires. La Vierge transforme automatiquement les ennemis morts en Goules de Brume.","cd":"160/130/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Yunara","nom":"Yunara","titre":"Foi inébranlable","blurb":"Par son dévouement inébranlable envers Ionia, Yunara a passé des siècles retirée dans le royaume spirituel pour perfectionner sa maîtrise des Aion Er'na, une relique légendaire du Kinkou. Malgré tous les sacrifices qu'elle a accomplis, Yunara a su garder la foi et conserver son objectif : purger le monde de la discorde et du conflit. Mais le monde qui l'attend désormais, assombri par le retour d'une ancienne menace, va mettre sa détermination à rude épreuve.","tags":["Marksman"],"info":{"attack":9,"defense":2,"magic":0,"difficulty":4},"partype":"Mana","passif":{"nom":"Serment aux Terres premières","description":"Les coups critiques de Yunara infligent des dégâts magiques bonus."},"competences":[{"nom":"Déchaînement spirituel","description":"Yunara gagne de la vitesse d'attaque, des dégâts bonus à l'impact et ses attaques rebondissent sur les ennemis proches.","cd":"0","cout":"30","typeCout":" mana"},{"nom":"Arc du jugement | Arc de la ruine","description":"Yunara lance un grain de chapelet virevoltant qui inflige des dégâts et ralentit les ennemis. En transe, elle tire à la place un rayon qui inflige des dégâts et ralentit les ennemis.","cd":"10","cout":"60","typeCout":" mana"},{"nom":"Célérité des kanmei | Ombres ineffables","description":"Yunara gagne de la vitesse de déplacement et devient fantomatique. Si elle est en état de transe, elle fait une ruée à la place.","cd":"9","cout":"40","typeCout":" mana"},{"nom":"Transe","description":"Yunara entre dans une transe qui améliore ses compétences de base.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Yuumi","nom":"Yuumi","titre":"Gardienne du Grimoire","blurb":"Originaire de Bandle, Yuumi est un familier magique dont la maîtresse, une enchanteresse yordle du nom de Norra, a mystérieusement disparu. Yuumi est désormais la gardienne du Grimoire des Seuils que possédait Norra, un livre permettant de franchir des portails. Partie à la recherche de sa maîtresse, Yuumi s'est fait de nouveaux amis durant son périple, et elle les protège tous avec la même détermination. Même si Grimoire aimerait que Yuumi se concentre davantage sur sa mission, sa comparse aime prendre le temps de faire la sieste et de pêcher des poissons. Malgré cela, elle finit toujours par repartir en quête de sa maîtresse.","tags":["Support","Mage"],"info":{"attack":5,"defense":1,"magic":8,"difficulty":2},"partype":"Mana","passif":{"nom":"Chat-maraderie","description":"Périodiquement, quand Yuumi frappe un champion avec une attaque ou une compétence, elle récupère des PV et soigne le prochain allié auquel elle s'attache.<br><br>Lorsque Yuumi est attachée à un allié, elle génère un lien spécial avec lui. L'allié avec lequel son lien est le plus fort renforce les compétences de Yuumi quand elle est attachée à lui."},"competences":[{"nom":"Tête chat-sseuse","description":"Yuumi lance un projectile qui blesse et ralentit le premier ennemi touché. Si le projectile vole au moins 1.35 sec avant d'atteindre un ennemi, il inflige des dégâts supplémentaires et un ralentissement renforcé. Lorsque Yuumi est attachée à son meilleur ami, le ralentissement est toujours renforcé et elle octroie des dégâts à l'impact supplémentaires à son allié.<br><br>Lorsque Yuumi est attachée à un allié, le projectile peut être brièvement dirigé avec votre curseur.","cd":"6.5","cout":"50/55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Félin pour l'autre !","description":"Yuumi se rue vers l'allié ciblé. Dans cet état, seules les tourelles peuvent la cibler. Lorsqu'elle est attachée à son meilleur ami, elle gagne de l'efficacité des soins et boucliers et elle octroie des soins à l'impact à son allié.","cd":"0","cout":"0","typeCout":"Pas de coût"},{"nom":"Zouuu !","description":"Yuumi gagne un bouclier et augmente ses vitesses de déplacement et d'attaque. Si elle est attachée à un allié, seul cet allié bénéficie des effets de la compétence.<br>","cd":"10","cout":"80/90/100/110/120","typeCout":" {{ abilityresourcename }}"},{"nom":"Chat-pitre final","description":"Yuumi canalise cinq vagues qui blessent les ennemis et soignent les alliés. Pendant la canalisation, Yuumi peut se déplacer, s'attacher aux champions alliés et lancer Zouuu ! Lorsque Yuumi est attachée à son meilleur ami, cette compétence suit aussi le curseur de la souris.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Zaahen","nom":"Zaahen","titre":"Incorruptible","blurb":"Dieu déchu maniant à la fois le divin et l'impie, Zaahen traque ses frères et sœurs Darkin tout en résistant à la corruption qui menace de le consumer. Autrefois scellé volontairement dans son glaive pour ne pas succomber à la folie, il est désormais libre, guidé par la noblesse de son cœur et la violence de ses actes. Zaahen mène une lutte sans fin au plus profond de lui, mais tant qu'il résistera, il s'élèvera face à tous ceux qui cherchent à réduire Runeterra en cendres.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":6,"magic":1,"difficulty":2},"partype":"Mana","passif":{"nom":"Guerrier immortel","description":"Les attaques et compétences de Zaahen qui touchent un champion ennemi lui octroient des effets de Détermination. Chaque effet lui octroie des dégâts d'attaque bonus. Au maximum d'effets cumulés, Zaahen gagne des dégâts d'attaque et peut revenir à la vie."},"competences":[{"nom":"Glaive des Darkin","description":"Lors de sa prochaine attaque, Zaahen taillade deux fois sa cible, infligeant des dégâts bonus et récupérant des PV. Zaahen peut relancer cette compétence pour que sa prochaine attaque inflige des dégâts bonus et projette sa cible dans les airs.<br>","cd":"10/9/8/7/6","cout":"25","typeCout":" {{ abilityresourcename }}"},{"nom":"Retour redoutable","description":"Zaahen donne un coup d'estoc dans une direction, infligeant des dégâts aux ennemis touchés et les attirant vers lui.","cd":"14/13.5/13/12.5/12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Incursion dorée","description":"Zaahen se rue dans une direction et lance une taillade autour de lui.","cd":"10/9.5/9/8.5/8","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Libération inexorable","description":"Zaahen s'élève dans les airs, puis redescend en piqué, infligeant des dégâts aux ennemis et se soignant d'une partie des dégâts infligés.","cd":"110/95/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Zac","nom":"Zac","titre":"Arme secrète","blurb":"Zac est le produit d'une fuite toxique qui, dégoulinant par une veine techno-chimique, se transforma en bassin dans une profonde caverne du Puisard de Zaun. En dépit de ses humbles origines, Zac a évolué pour passer du stade de dépôt primordial à celui d'être pensant qui se faufile dans les canalisations de la ville. De temps en temps, il émerge pour aider ceux qui ne s'en sortent pas seuls ou pour reconstruire les infrastructures en mauvais état de Zaun.","tags":["Tank","Fighter"],"info":{"attack":3,"defense":7,"magic":7,"difficulty":8},"partype":"Aucune","passif":{"nom":"Division cellulaire","description":"À chaque fois que Zac frappe un ennemi avec une compétence, il perd un bout de lui-même qu'il peut absorber pour récupérer des PV. S'il subit des dégâts mortels, Zac se divise en 4 blobs qui tentent de se recombiner. S'il reste des blobs, Zac revient à la vie avec un nombre de PV qui dépend des PV des blobs survivants. Chaque blob a un pourcentage des PV max, de l'armure et de la résistance magique de Zac. Cette compétence a un délai de récupération de 5 minutes."},"competences":[{"nom":"Étirements","description":"Zac étend un bras et attrape un ennemi. S'il attaque ensuite un ennemi différent, il envoie les deux cibles l'une contre l'autre.","cd":"14/12.5/11/9.5/8","cout":"0","typeCout":"% des PV actuels ({{ healthcosttooltip }})."},{"nom":"Matière instable","description":"Zac explose en direction des ennemis proches, leur infligeant des dégâts magiques équivalents à un pourcentage de leurs PV max.","cd":"5","cout":"0","typeCout":"% des PV actuels ({{ tooltiphealthcost }})."},{"nom":"Fronde","description":"Zac fixe ses bras au sol et prend de l'élan pour se projeter vers l'avant.","cd":"22/19/16/13/10","cout":"0","typeCout":"% des PV actuels ({{ healthcosttooltip }})."},{"nom":"Boing !","description":"Zac rebondit quatre fois, projetant en l'air les ennemis touchés et les ralentissant.","cd":"120/105/90","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Zed","nom":"Zed","titre":"Maître des ombres","blurb":"L'impitoyable Zed est le maître de l'Ordre de l'ombre, une organisation qu'il a créée dans l'intention de militariser la tradition des arts martiaux d'Ionia et de chasser enfin les envahisseurs noxiens. Pendant la guerre, le désespoir le conduisit à déchaîner la Forme secrète de l'ombre, un puissant esprit maléfique aussi dangereux que corrompu. Si Zed maîtrise ces techniques interdites, c'est pour détruire tout ce qu'il considère comme une menace contre sa nation ou son ordre.","tags":["Assassin"],"info":{"attack":9,"defense":2,"magic":1,"difficulty":7},"partype":"Énergie","passif":{"nom":"Mépris des faibles","description":"Les attaques de base de Zed infligent des dégâts magiques supplémentaires aux cibles dont les PV sont faibles. Cet effet ne peut se déclencher sur un même champion ennemi qu'une fois toutes les quelques secondes."},"competences":[{"nom":"Shuriken-rasoir","description":"Zed et ses ombres lancent leurs shurikens.<br><br>Chaque shuriken blesse tous les ennemis touchés.","cd":"6","cout":"75/70/65/60/55","typeCout":" {{ abilityresourcename }}"},{"nom":"Ombre vivante","description":"<font color='#FF9900'>Passive :</font> Zed regagne de l'énergie quand ses ombres et lui frappent un ennemi avec la même compétence. L'énergie ne peut être récupérée qu'une fois par utilisation d'une compétence.<br><br><font color='#FF9900'>Active :</font> l'ombre de Zed fonce vers l'avant et reste sur place pendant quelques secondes. Réactiver Ombre vivante permet à Zed de changer de position avec cette ombre.","cd":"20/19/18/17/16","cout":"40/35/30/25/20","typeCout":" {{ abilityresourcename }}"},{"nom":"Taillade des ombres","description":"Zed et ses ombres donnent un coup de taille et blessent les ennemis proches. Les ennemis touchés par la taillade d'une ombre sont ralentis.","cd":"5/4.5/4/3.5/3","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Marque de la mort","description":"Zed devient impossible à cibler et fonce sur un champion ennemi pour le marquer. Au bout de 3 sec, la marque explose, infligeant de nouveau un pourcentage de tous les dégâts infligés par Zed pendant la durée de la marque.","cd":"120/110/100","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Zeri","nom":"Zeri","titre":"Étincelle de Zaun","blurb":"Zeri est une jeune femme vive et téméraire originaire des quartiers défavorisés de Zaun. Elle canalise son électricité intérieure afin de la charger dans un fusil conçu spécialement pour elle. Son pouvoir magique est le reflet de ses émotions, et ses étincelles sont aussi fulgurantes que son caractère. Résolument tournée vers les autres, Zeri se sert de son amour pour sa famille et son quartier durant chaque combat. Malgré toute sa bonne volonté, cependant, les événements ne se passent pas toujours comme prévu. Cela dit, Zeri est sûre d'une chose : si vous vous battez pour votre communauté, elle se battra avec vous.","tags":["Marksman"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":6},"partype":"Mana","passif":{"nom":"Batterie vivante","description":"Les attaques de Zeri infligent des dégâts magiques et sont traitées comme des compétences. Se déplacer et lancer Rafale stocke de l'énergie dans le Paquetage ionique de Zeri. Lorsqu'elle est chargée à bloc, sa prochaine attaque inflige des dégâts supplémentaires."},"competences":[{"nom":"Rafale","description":"Rafale tire 7 balles qui infligent les dégâts d'attaque de Zeri au premier ennemi touché. Cette compétence est traitée comme une attaque.","cd":"0","cout":"0","typeCout":"Pas de coût"},{"nom":"Laser électrocuteur","description":"Zeri lance une impulsion électrique qui ralentit et blesse le premier ennemi touché. Si l'impulsion touche un mur, elle se transforme en laser à longue portée.","cd":"12/11/10/9/8","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge ionique","description":"Zeri effectue une courte ruée et renforce Rafale, qui devient perforante. Elle bondit par-dessus tous les obstacles qu'elle touche.","cd":"24/22.5/21/19.5/18","cout":"90/85/80/75/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Éruption électrique","description":"Zeri provoque une nova d'électricité et se surcharge : elle inflige plus de dégâts et gagne un bonus cumulable en vitesse d'attaque qui s'actualise et augmente à chaque fois qu'elle touche un champion ennemi. Lorsque Zeri est surchargée, Rafale devient un triple tir plus rapide qui crée une chaîne d'éclairs entre les ennemis.","cd":"80/75/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Ziggs","nom":"Ziggs","titre":"Expert des Hexplosifs","blurb":"Amoureux des grosses bombes et des mèches courtes, le yordle Ziggs est une force de la nature explosive. Assistant d'un inventeur de Piltover, il finit par se lasser de sa vie routinière et devint l'ami d'une jeune fille imprévisible et portée sur les explosifs, Jinx. Après une folle nuit en ville, Ziggs suivit les conseils de Jinx et s'installa à Zaun, où il se livre désormais à sa passion plus librement, terrorisant les Barons de la chimie comme les simples citoyens dans sa quête éternelle pour faire sauter tout ce qui traverse son champ de vision.","tags":["Mage"],"info":{"attack":2,"defense":4,"magic":9,"difficulty":4},"partype":"Mana","passif":{"nom":"Mèche courte","description":"Périodiquement, la prochaine attaque de base de Ziggs inflige des dégâts magiques supplémentaires. Ce délai est réduit quand Ziggs utilise une compétence."},"competences":[{"nom":"Bombe rebondissante","description":"Ziggs lance une bombe rebondissante qui inflige des dégâts magiques.","cd":"6/5.5/5/4.5/4","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge explosive","description":"Ziggs jette une charge explosive qui explose après un délai, ou quand vous réactivez cette compétence. L'explosion inflige des dégâts magiques aux ennemis et les repousse. Ziggs aussi est repoussé mais il ne subit aucun dégât. <br><br>Ziggs peut utiliser cette charge pour hexploser les tourelles ennemies vulnérables.","cd":"20/18/16/14/12","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Mines Hexplosives","description":"Ziggs disperse des mines de proximité qui explosent au contact des ennemis, leur infligeant des dégâts magiques et les ralentissant. Quand un ennemi déclenche une mine, les mines supplémentaires lui infligent des dégâts réduits.","cd":"16","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Méga bombe infernale","description":"Ziggs déploie sa création ultime, la Méga bombe infernale, et la lance de très loin. Les ennemis dans la zone d'impact principale subissent plus de dégâts que les ennemis plus éloignés.","cd":"120/95/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Zilean","nom":"Zilean","titre":"Gardien du Temps","blurb":"Naguère puissant mage d'Icathia, Zilean devint obsédé par le passage du temps après avoir assisté à la destruction de sa terre natale par le Néant. Refusant de perdre une minute à pleurer sur les décombres, il fit appel à une antique force magique capable de prédire tous les avenirs possibles. Devenu techniquement immortel, Zilean erre désormais entre passé, présent et futur, distordant autour de lui le flux du temps, toujours à la recherche du moment exact qui lui permettra de changer le passé et d'empêcher la destruction d'Icathia.","tags":["Support","Mage"],"info":{"attack":2,"defense":5,"magic":8,"difficulty":6},"partype":"Mana","passif":{"nom":"Temps dans une bouteille","description":"Zilean stocke du temps sous forme d'expérience et peut l'offrir à ses alliés. Quand il a suffisamment d'expérience pour augmenter le niveau d'un allié, il peut la lui offrir en lui cliquant dessus avec le bouton droit. Zilean reçoit autant d'expérience qu'il en donne."},"competences":[{"nom":"Bombe à retardement","description":"Lance une bombe dans une zone. La bombe se colle sur une unité qui s'en approche (en priorité les champions) et explose après 3 secondes, infligeant des dégâts de zone. Si une Bombe à retardement explose prématurément à cause d'une autre Bombe à retardement, les ennemis sont également étourdis.","cd":"10/9.5/9/8.5/8","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Retour rapide","description":"Zilean se prépare à de futures confrontations, réduisant le délai de récupération de ses autres compétences.","cd":"14/12/10/8/6","cout":"35","typeCout":" Mana"},{"nom":"Distorsion temporelle","description":"Zilean distord le temps autour d'une unité, réduisant la vitesse de déplacement d'un ennemi ou augmentant celle d'un allié pendant un court moment.","cd":"15","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Retour temporel","description":"Zilean place une rune temporelle sur un champion allié, le renvoyant dans le passé s'il subit des dégâts mortels.","cd":"120/90/60","cout":"125/150/175","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Zoe","nom":"Zoé","titre":"Manifestation du Crépuscule","blurb":"Incarnation de l'espièglerie, de l'imagination et de l'inconstance, Zoé est une messagère cosmique de Targon, annonciatrice des grands événements qui chamboulent les mondes. Sa simple présence distord les règles mathématiques qui gouvernent dans l'ombre les réalités et, sans pour autant le vouloir, peut même provoquer des cataclysmes. Cela explique peut-être la nonchalance désinvolte avec laquelle Zoé traite ses tâches, préférant consacrer le plus clair de son temps à s'amuser, à jouer des tours aux mortels, bref, à faire tout ce qui lui plaît. Une rencontre avec Zoé peut se révéler joyeuse et porteuse d'optimisme, mais ce n'est souvent qu'une apparence, cachant une vérité extrêmement dangereuse.","tags":["Mage"],"info":{"attack":1,"defense":7,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Plus d'étincelles !","description":"Après avoir lancé une compétence, la prochaine attaque de base de Zoé inflige des dégâts magiques supplémentaires."},"competences":[{"nom":"Astro-pong !","description":"Zoé lance un projectile qu'elle peut rediriger en vol. Les dégâts augmentent avec la distance parcourue en ligne droite.","cd":"8.5/8/7.5/7/6.5","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Voleuse de sorts","description":"Zoé peut ramasser les vestiges des sorts d'invocateur et des propriétés actives d'objets utilisés par les ennemis, puis les utiliser elle-même. Quand Zoé utilise un sort d'invocateur, elle tire aussi trois projectiles sur l'ennemi le plus proche.","cd":"0.25","cout":"0","typeCout":"Pas de coût"},{"nom":"Bulle soporifique","description":"La cible devient somnolente, puis s'endort. Tant que la cible dort, sa résistance magique est réduite. Les dégâts qui réveillent la cible sont doublés, jusqu'à un montant max.","cd":"18/17/16/15/14","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Bond dimensionnel","description":"Téléporte Zoé à un endroit proche pendant 1 sec, avant de la faire revenir à son point de départ.","cd":"11/8/5","cout":"40","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Zyra","nom":"Zyra","titre":"Dame aux ronces","blurb":"Née au cours d'une ancienne catastrophe magique, Zyra est la colère de la nature incarnée : mélange de plante et d'humain, faisant émerger de nouvelles pousses à chaque pas. Elle considère les nombreux mortels de Valoran comme de simples proies pour sa progéniture végétale, et les éliminer avec ses gerbes d'épines ne lui pose aucun problème. Bien que nul ne connaisse ses vrais objectifs, Zyra erre de par le monde, suivant son instinct qui est de coloniser toujours plus de terres et d'en exterminer toutes les autres formes de vie.","tags":["Mage","Support"],"info":{"attack":4,"defense":3,"magic":8,"difficulty":7},"partype":"Mana","passif":{"nom":"Jardin de ronces","description":"Des graines apparaissent régulièrement autour de Zyra, de plus en plus souvent au fur et à mesure qu'elle gagne des niveaux. Zyra peut lancer Épines funestes ou Racines fixatrices près des graines pour faire pousser des plantes qui combattront pour elle."},"competences":[{"nom":"Épines funestes","description":"Des ronces se répandent dans le sol et provoquent une explosion d'épines, infligeant des dégâts magiques aux ennemis dans la zone. Si le sort est lancé près d'une graine, Épines funestes fait pousser une Cracheuse de ronces qui tire sur les ennemis de loin.","cd":"7/6.5/6/5.5/5","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Croissance incontrôlée","description":"Zyra plante une graine qui dure jusqu'à 60 sec. Lancer Épines funestes ou Racines fixatrices près des graines les change en plantes qui combattront pour Zyra. Zyra peut stocker plusieurs graines. Tuer des ennemis réduit le délai de rechargement de Croissance incontrôlée.","cd":"0","cout":"0","typeCout":"1 graine"},{"nom":"Racines fixatrices","description":"Zyra lance des racines à travers le sol pour capturer sa cible, infligeant des dégâts et immobilisant les ennemis qu'elles touchent. Si le sort est lancé près d'une graine, Racines fixatrices fait pousser une Plante flagellante dont les attaques à courte portée réduisent la vitesse de déplacement des ennemis.","cd":"11","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Ronces étrangleuses","description":"Zyra invoque des ronces malfaisantes dans la zone ciblée, infligeant des dégâts aux ennemis en s'étendant avant de les projeter en l'air. Les plantes dans les ronces deviennent enragées.","cd":"110/100/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]}
];

        function chargerChampion() {
            var params = new URLSearchParams(window.location.search);
            var champName = params.get("name");
            if (!champName) {
                document.querySelector("#app").innerHTML = '<a class="back" href="index.html?tab=lol">&larr; Retour</a><p class="error" style="margin-top:20px">Aucun champion sp\u00e9cifi\u00e9.</p>';
                return;
            }

            var champ = null;
            for (var i = 0; i < CHAMPIONS_DATA.length; i++) {
                if (CHAMPIONS_DATA[i].id === champName || CHAMPIONS_DATA[i].nom === champName) {
                    champ = CHAMPIONS_DATA[i];
                    break;
                }
            }

            if (!champ) {
                document.querySelector("#app").innerHTML = '<a class="back" href="index.html?tab=lol">&larr; Retour</a><p class="error" style="margin-top:20px">Champion "' + champName + '" introuvable.</p>';
                return;
            }

            afficherChampion(champ);
        }

        function getRoleIcon(role) {
            var map = {
                "Assassin": "roleAssassin.svg",
                "Fighter": "roleFighter.svg",
                "Mage": "roleMage.svg",
                "Marksman": "roleMarksman.svg",
                "Support": "roleSupport.svg",
                "Tank": "roleTank.svg"
            };
            var f = map[role];
            return f ? '<img src="images/roles/' + f + '" alt="' + role + '" class="role-icon"><span class="role-label">' + role + '</span>' : '';
        }

        function getDifficultyIcon(diff) {
            var icon = "difficultyLow.svg";
            if (diff >= 4 && diff <= 6) icon = "difficultyMed.svg";
            else if (diff >= 7) icon = "difficultyHigh.svg";
            return '<img src="images/roles/' + icon + '" alt="Difficult\u00e9 ' + diff + '" style="width:32px;height:22px;vertical-align:middle">';
        }

        function afficherChampion(champ) {
            document.title = champ.nom + " - League of Legends Memory";

            var html = '';
            html += '<a class="back" href="index.html?tab=lol">&larr; Retour aux champions</a>';

            html += '<div class="header">';
            html += '<img src="images/lol/' + champ.id + '.png" alt="' + champ.nom + '">';
            html += '<div style="flex:1">';
            html += '<div class="header-top">';
            html += '<h1>' + champ.nom + '</h1>';
            html += '</div>';
            html += '<div class="title">' + champ.titre + '</div>';
            if (champ.tags && champ.tags.length > 0) {
                html += '<div class="role-under-name">';
                for (var t = 0; t < champ.tags.length; t++) {
                    html += getRoleIcon(champ.tags[t]);
                }
                html += getDifficultyIcon(champ.info.difficulty);
                html += '</div>';
            }
            if (champ.partype && champ.partype !== "") {
                html += '<div style="font-size:14px;color:#666;margin-top:4px">Ressource: ' + champ.partype + '</div>';
            }
            html += '</div>';
            html += '</div>';

            html += '<div class="section-title">Statistiques</div>';
            html += '<div class="stats-grid">';
            html += '<div class="stat-bar"><span class="label">Attaque</span><div class="bar-bg"><div class="bar-fill attack" style="width:' + (champ.info.attack * 10) + '%"></div></div><span style="font-size:13px;color:#666">' + champ.info.attack + '/10</span></div>';
            html += '<div class="stat-bar"><span class="label">D\u00e9fense</span><div class="bar-bg"><div class="bar-fill defense" style="width:' + (champ.info.defense * 10) + '%"></div></div><span style="font-size:13px;color:#666">' + champ.info.defense + '/10</span></div>';
            html += '<div class="stat-bar"><span class="label">Magie</span><div class="bar-bg"><div class="bar-fill magic" style="width:' + (champ.info.magic * 10) + '%"></div></div><span style="font-size:13px;color:#666">' + champ.info.magic + '/10</span></div>';
            html += '<div class="stat-bar"><span class="label">Difficult\u00e9</span><div class="bar-bg"><div class="bar-fill difficulty" style="width:' + (champ.info.difficulty * 10) + '%"></div></div><span style="font-size:13px;color:#666;display:flex;align-items:center;gap:4px">' + getDifficultyIcon(champ.info.difficulty) + champ.info.difficulty + '/10</span></div>';
            html += '</div>';

            html += '<div class="section-title">Histoire</div>';
            html += '<p class="histoire">' + champ.blurb + '</p>';

            html += '<div class="section-title">Comp\u00e9tences</div>';

            if (champ.passif) {
                html += '<div class="ability">';
                html += '<span class="nom">' + champ.passif.nom + '</span>';
                html += '<span class="type">Passif</span>';
                html += '<div class="desc">' + champ.passif.description + '</div>';
                html += '</div>';
            }

            if (champ.competences) {
                var spellLabels = ["Q", "Z", "E", "R"];
                for (var s = 0; s < champ.competences.length; s++) {
                    var spell = champ.competences[s];
                    var hasCost = spell.cout && spell.cout !== "0" && spell.cout !== "0/0/0/0/0";
                    var costType = spell.typeCout ? spell.typeCout.replace(/[{}]/g,'').trim() : "Pas de co\u00fbt";
                    if (costType.indexOf("abilityresourcename") >= 0) costType = champ.partype || "Mana";
                    html += '<div class="ability">';
                    html += '<span class="nom">' + spell.nom + '</span>';
                    html += '<span class="type">' + spellLabels[s] + ' &mdash; ' + costType + '</span>';
                    html += '<div class="desc">' + spell.description + '</div>';
                    html += '<div class="cost">' + (spell.cd ? "Rechargement: " + spell.cd : "") + (spell.cd && hasCost ? " &middot; " : "") + (hasCost ? "Co\u00fbt: " + spell.cout : "") + '</div>';
                    html += '</div>';
                }
            }

            document.querySelector("#app").innerHTML = html;
        }

        chargerChampion();
    </script>
</body>
</html>
