{"id":"KSante","nom":"K'Santé","titre":"Fierté de Nazumah","blurb":"Rebelle et courageux, K'Santé combat les bêtes colossales et les Transfigurés impitoyables qui menacent son foyer convoité de Nazumah, une oasis lovée au cœur des sables de Shurima. Après s'être séparé de son ancien partenaire, K'Santé comprend que pour devenir un guerrier digne de diriger sa ville, il doit apprendre à brider son désir de victoire qui vire à l'obsession. Ce n'est qu'à ce prix qu'il pourra éviter les écueils de son propre orgueil et trouver en lui la sagesse nécessaire à la protection de son peuple.","tags":["Tank","Fighter"],"info":{"attack":8,"defense":8,"magic":7,"difficulty":9},"partype":"Mana","passif":{"nom":"Instinct intrépide","description":"Les compétences de K'Santé marquent ses cibles pour que sa prochaine attaque leur inflige plus de dégâts.<br><br>Dans sa forme Grand jeu, les attaques et les compétences de K'Santé infligent plus de dégâts."},"competences":[{"nom":"Coups de ntofo","description":"K'Santé frappe le sol, blessant et ralentissant tous les ennemis sur une courte ligne.<br><br>À l'impact, cela lui octroie un effet Coups de ntofo. À 2 effets cumulés, K'Santé lance une onde de choc qui attire les ennemis à lui.<br><br>Dans sa forme Grand jeu, le délai de récupération est réduit.","cd":"3.5","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Pour Nazumah !","description":"K'Santé charge son attaque, subissant moins de dégâts avant de se ruer en avant, ce qui repousse et étourdit les ennemis.<br><br>En forme Grand jeu, K'Santé inflige des dégâts bonus et ne repousse ni n'étourdit plus.","cd":"14/13/12/11/10","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Jeu de jambes","description":"K'Santé se rue vers sa cible et gagne un bouclier. S'il cible un allié, la ruée de K'Santé a une plus grande portée et son allié gagne également un bouclier.<br><br>Dans sa forme Grand jeu, le délai de récupération est réduit et la vitesse de la ruée est augmentée.","cd":"10/9.5/9/8.5/8","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Grand jeu","description":"K'Santé repousse un ennemi, le forçant à traverser tout mur sur sa trajectoire. Puis, K'Santé sort le Grand jeu et se rue sur l'ennemi, renforce ses dégâts et ses soins, et transforme ses compétences, au détriment de ses défenses.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Leblanc","nom":"LeBlanc","titre":"Manipulatrice","blurb":"Mystérieuse, même aux yeux des autres membres de la Rose noire, LeBlanc n'est que l'un des nombreux noms de la femme pâle qui manipule le destin de Noxus depuis ses premiers jours. Utilisant sa magie pour se cloner, elle peut être partout, devant tout le monde, et même à plusieurs endroits en même temps. Les objectifs que poursuit LeBlanc, de même que sa véritable identité, sont à l'image de ses complots : totalement insaisissables.","tags":["Assassin","Mage"],"info":{"attack":1,"defense":4,"magic":10,"difficulty":9},"partype":"Mana","passif":{"nom":"Image miroir","description":"Quand LeBlanc tombe à moins de 40% de ses PV max, elle devient invisible pendant 1 sec et crée une Image miroir qui n'inflige aucun dégât et dure jusqu'à 8 sec."},"competences":[{"nom":"Sceau de malveillance","description":"LeBlanc lance un sceau qui inflige des dégâts et qui marque la cible pendant 3.5 sec. Blesser la cible marquée avec une compétence fait exploser le sceau, infligeant des dégâts supplémentaires. Si le sceau ou son explosion tue la cible, LeBlanc récupère le coût en mana et réduit le délai de récupération restant de cette compétence.","cd":"6","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Distorsion","description":"LeBlanc fonce jusqu'à l'endroit visé, infligeant des dégâts aux ennemis proches de son point d'arrivée. Dans les 4 sec qui suivent, LeBlanc peut réactiver Distorsion pour retourner à son point de départ.","cd":"15/13.75/12.5/11.25/10","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Chaînes éthérées","description":"LeBlanc lance une chaîne qui s'attache au premier ennemi touché. Si la cible reste enchaînée pendant 1.5 sec, LeBlanc l'immobilise et lui inflige des dégâts supplémentaires.","cd":"14/13.25/12.5/11.75/11","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Imitation","description":"LeBlanc imite l'une de ses compétences de base.","cd":"45/35/25","cout":"0","typeCout":"Pas de coût"}]},

{"id":"LeeSin","nom":"Lee Sin","titre":"Moine aveugle","blurb":"Maître des antiques arts martiaux d'Ionia, Lee Sin est un combattant dévoué à de nobles principes qui canalise l'esprit du dragon pour affronter tous les défis. Bien qu'il ait perdu la vue il y a bien des années, le moine-guerrier a dédié sa vie à la protection de sa terre natale contre tous ceux qui voudraient en déstabiliser l'équilibre spirituel. Les ennemis qui sous-estiment son apparence méditative auront peu de temps pour le regretter, face à ses poings de feu et à ses coups de pied flamboyants.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":6},"partype":"Énergie","passif":{"nom":"Rafale","description":"Après avoir utilisé une compétence, Lee Sin voit sa vitesse d'attaque augmenter pour ses 2 prochaines attaques de base. Ces attaques accélérées lui rendent de l'énergie."},"competences":[{"nom":"Onde sonore/Coup résonant","description":"Onde sonore : Lee Sin émet une onde sonore pour localiser ses ennemis, infligeant des dégâts physiques au premier ennemi touché. Si Onde sonore touche un ennemi, Lee Sin peut lancer Coup résonant dans les 3 sec qui suivent.<br>Coup résonant : Lee Sin fonce vers l'ennemi touché par Onde sonore, infligeant des dégâts physiques en fonction des PV manquants de l'ennemi.","cd":"10/9/8/7/6","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Rempart/Force d'âme","description":"Rempart : Lee Sin fonce vers un allié, se protégeant contre les dégâts. Si l'allié est un champion, il est également protégé. Après avoir lancé Rempart, Lee Sin peut lancer Force d'âme.<br>Force d'âme : l'entraînement intense de Lee Sin lui permet de décupler ses forces pendant un combat. Lee Sin gagne de l'omnivampirisme.","cd":"7","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Trombe/Fracture","description":"Trombe : Lee Sin frappe le sol, envoyant une onde de choc qui inflige des dégâts magiques et révèle les unités ennemies touchées. Si Trombe touche un ennemi, Lee Sin peut lancer Fracture.<br>Fracture : Lee Sin estropie les ennemis proches blessés par Trombe, réduisant leur vitesse de déplacement. La vitesse de déplacement revient peu à peu à la normale pendant la durée de la compétence.","cd":"8","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Rage du dragon","description":"Lee Sin donne un puissant coup de pied qui projette sa cible en arrière, infligeant des dégâts physiques à la cible et à tous les ennemis qu'elle percute. Les ennemis ainsi percutés sont également projetés en l'air un court instant. Cette technique lui a été enseignée par Jesse Perring, mais Lee Sin ne sait pas encore éjecter les joueurs de la carte.","cd":"110/85/60","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Leona","nom":"Leona","titre":"Aube radieuse","blurb":"Imprégnée de l'énergie du soleil, Leona est une guerrière sainte des Solaris qui défend le Mont Targon ; elle combat avec sa Lame du zénith et son Bouclier de l'aube. Sa peau brûle d'éclats ardents et ses yeux crépitent au rythme de la Manifestation céleste qui l'habite. Équipée d'une armure d'or et affligée par le terrible fardeau de connaissances antiques, Leona apporte à certains l'illumination, à d'autres la mort.","tags":["Tank","Support"],"info":{"attack":4,"defense":8,"magic":3,"difficulty":4},"partype":"Mana","passif":{"nom":"Rayon de soleil","description":"Les sorts marquent les ennemis d'un Rayon de soleil pendant 1.5 sec. Si des champions alliés blessent ces ennemis, ils dissipent Rayon de soleil et infligent des dégâts magiques supplémentaires."},"competences":[{"nom":"Bouclier de l'aube","description":"Leona utilise son bouclier pour sa prochaine attaque de base, infligeant des dégâts magiques supplémentaires et étourdissant la cible.","cd":"5","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Éclipse","description":"Leona lève son bouclier et profite d'une amélioration de son armure et de sa résistance magique ainsi que d'une réduction des dégâts. Lorsque l'effet prend fin pour la première fois, s'il y a des ennemis proches, elle leur inflige des dégâts magiques et l'effet de protection est prolongé.","cd":"14/13/12/11/10","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Lame du zénith","description":"Leona projette une image solaire de son épée, infligeant des dégâts magiques à tous les ennemis sur une ligne. Lorsque l'image se dissipe, le dernier champion ennemi touché est brièvement immobilisé et Leona fonce vers lui.","cd":"12/10.5/9/7.5/6","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Éruption solaire","description":"Leona invoque un rayon d'énergie solaire qui inflige des dégâts à tous les ennemis dans une zone. Les ennemis au centre de la zone sont étourdis et ceux qui sont en bordure sont ralentis.","cd":"90/75/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Lillia","nom":"Lillia","titre":"Fleur timide","blurb":"Profondément timide, Lillia, le faon féérique, parcourt nerveusement les forêts d'Ionia. Échappant toujours au regard des mortels dont la nature a longtemps captivé et intimidé la jeune créature, Lillia espère découvrir la raison pour laquelle les rêves des mortels n'atteignent plus l'Arbre des rêves. Elle sillonne désormais Ionia, sa branche magique en main, afin de retrouver les rêves inassouvis des hommes. Ce n'est qu'alors que Lillia pourra s'épanouir et aider les autres à démêler leurs peurs et trouver l'étincelle qui se cache au fond d'eux. Hii !","tags":["Fighter","Mage"],"info":{"attack":0,"defense":2,"magic":10,"difficulty":8},"partype":"Mana","passif":{"nom":"Bâton chargé de rêves","description":"Toucher un champion ou un monstre avec une compétence lui inflige des dégâts supplémentaires sur la durée équivalents à un pourcentage de ses PV max."},"competences":[{"nom":"Frappe fleurie","description":"Passivement, Lillia gagne des bonus cumulables en vitesse de déplacement quand elle touche des ennemis avec ses compétences. Elle peut activer cette compétence pour infliger des dégâts magiques aux ennemis proches, ainsi que des dégâts bruts supplémentaires en bordure de la zone.","cd":"6/5.5/5/4.5/4","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Attention, désolée !","description":"Lillia lance une attaque dans une zone proche, infligeant d'importants dégâts au centre de la zone.","cd":"14/13/12/11/10","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Graine tournoyante","description":"Lillia lance une graine qui blesse et ralentit ceux qu'elle touche. Si la graine ne touche rien, elle continue de rouler jusqu'à toucher un mur ou une cible.","cd":"12","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Douce berceuse","description":"Lillia provoque un effet de somnolence chez tous les ennemis affectés par Poussière de rêve, qui finissent par s'endormir. Ces ennemis subiront des dégâts supplémentaires s'ils sont réveillés de force.","cd":"150/130/110","cout":"50","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Lissandra","nom":"Lissandra","titre":"Sorcière de glace","blurb":"La magie de Lissandra est capable de manipuler la pure puissance de la glace en quelque chose d'à la fois obscur et terrible. Avec la force de sa glace noire, elle fait bien plus que glacer... elle empale et écrase ceux qui osent s'opposer à elle. Les habitants du Nord, terrifiés, la connaissent sous le nom de « Sorcière de glace ». La vérité est bien plus sombre : Lissandra complote pour corrompre la Nature et ramener le monde à l'âge de glace.","tags":["Mage"],"info":{"attack":2,"defense":5,"magic":8,"difficulty":6},"partype":"Mana","passif":{"nom":"Emprise de la Sublimée","description":"Lorsqu'un champion ennemi meurt à proximité de Lissandra, il se transforme en Serviteur de glace. Les Serviteurs de glace ralentissent les ennemis proches et, après un délai, le froid les fait exploser, infligeant des dégâts magiques aux cibles proches."},"competences":[{"nom":"Éclat de glace","description":"Projette une lance de glace qui se brise au contact du premier ennemi touché, lui infligeant des dégâts magiques et réduisant sa vitesse de déplacement. Des éclats traversent la cible, infligeant les mêmes dégâts aux autres ennemis touchés.","cd":"7/6/5/4/3","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Cercle de givre","description":"Congèle les ennemis proches, leur infligeant des dégâts magiques et les immobilisant.","cd":"10/9.5/9/8.5/8","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Chemin glacial","description":"Lissandra lance une griffe de glace qui inflige des dégâts magiques. Si vous réactivez la compétence, Lissandra est transportée à l'endroit où se situe sa griffe.","cd":"24/21/18/15/12","cout":"80/85/90/95/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Tombeau polaire","description":"Si le sort est lancé sur un champion ennemi, la cible est congelée, ce qui l'étourdit. Si le sort est lancé sur Lissandra, elle s'immobilise dans la glace, ce qui la soigne en plus de la rendre impossible à cibler et insensible aux dégâts. De la glace obscure émane de la cible, infligeant des dégâts magiques aux ennemis et réduisant leur vitesse de déplacement.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Locke","nom":"Locke","titre":"Exorciste cendré","blurb":"Exorciste maniant les clous et versé dans les rites interdits, Corvin Locke est le descendant d'occultistes demaciens. Né dans le mensonge et l'hypocrisie, il a compris très tôt que les démons ne sont pas la cause de la noirceur de l'humanité, mais sa...","tags":["Assassin","Mage"],"info":{"attack":6,"defense":4,"magic":2,"difficulty":5},"partype":"Mana","passif":{"nom":"Pieu argenté","description":"Les attaques de Locke infligent des dégâts magiques bonus à l'impact, augmentés en fonction des PV manquants de l'ennemi."},"competences":[{"nom":"Clous rituels","description":"Locke lance des clous spirituels vers l'avant, infligeant des dégâts et marquant les ennemis touchés. Locke peut consommer ces marques pour infliger des dégâts bonus avec ses attaques.","cd":"10/9/8/7/6","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Brûlure d'âme","description":"Locke embrase son âme. Il gagne en vitesse d'attaque et en vitesse de déplacement, mais s'inflige des dégâts. À la fin de la durée, Locke se soigne d'une portion des dégâts subis pendant l'effet.","cd":"18/17/16/15/14","cout":"50/55/60/65/70","typeCout":" pts de mana et {{ healthcost*100 }}% des PV actuels par seconde"},{"nom":"Traque cendrée","description":"Locke se téléporte à un emplacement avant d'effectuer une ruée pour attaquer sa prochaine cible, infligeant des dégâts aux ennemis traversés.","cd":"10","cout":"30/40/50/60/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Purgatoire","description":"Locke lance un artefact qui inflige des dégâts et peut exécuter les ennemis touchés. Locke gagne de la puissance supplémentaire en scellant des champions ennemis.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Lucian","nom":"Lucian","titre":"Purificateur","blurb":"Lucian, Sentinelle de la lumière, est un funeste chasseur de spectres. Les pourchassant sans relâche, il les abat de ses pistolets jumeaux. Lorsque sa femme fut tuée par le spectre Thresh, Lucian fit tout pour se venger. Aujourd'hui, Senna est revenue à la vie, mais la rage de Lucian demeure inchangée. Sans pitié et obstiné, il ne reculera devant rien pour protéger les vivants des monstres de la Brume noire.","tags":["Marksman","Assassin"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":6},"partype":"Mana","passif":{"nom":"Pistolero","description":"Quand Lucian utilise une compétence, sa prochaine attaque devient un double-tir. Quand Lucian est soigné par un allié, quand il reçoit un bouclier de la part d'un allié ou quand un champion ennemi proche est immobilisé, ses 2 prochaines attaques de base infligeront des dégâts magiques supplémentaires."},"competences":[{"nom":"Lumière perforante","description":"Lucian tire un rayon lumineux qui transperce une cible.","cd":"9/8/7/6/5","cout":"48/56/64/72/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Flamboiement","description":"Lucian tire un projectile qui provoque une explosion en forme d'étoile, marquant et révélant brièvement les ennemis. Lucian augmente sa vitesse de déplacement quand il attaque les ennemis marqués.","cd":"14/13/12/11/10","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Poursuite inlassable","description":"Lucian fonce sur une courte distance. Pistolero réduit le délai de récupération de Poursuite inlassable.","cd":"16/15.5/15/14.5/14","cout":"32/24/16/8/0","typeCout":" {{ abilityresourcename }}"},{"nom":"Déluge de balles","description":"Lucian tire un déluge de balles avec ses armes.","cd":"110/100/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Lulu","nom":"Lulu","titre":"Sorcière féérique","blurb":"Magicienne yordle, Lulu aime conjurer des illusions oniriques et de drôles de créatures en explorant Runeterra avec Pix, sa fée de compagnie. Lulu forge la réalité selon ses désirs, modifiant à sa guise la structure du monde et ce qu'elle considère comme les contraintes physiques d'un univers sans saveur. Beaucoup pensent que sa magie n'est pas naturelle, pour ne pas dire dangereuse, mais elle estime qu'un peu d'enchantement ne peut faire de mal à personne.","tags":["Support","Mage"],"info":{"attack":4,"defense":5,"magic":7,"difficulty":5},"partype":"Mana","passif":{"nom":"Pix, le Compagnon féérique","description":"Pix tire des projectiles magiques quand le champion qu'il suit attaque une autre unité ennemie. Ces tirs sont guidés, mais ils peuvent être interceptés par d'autres unités."},"competences":[{"nom":"Duo éclatant","description":"Pix et Lulu tirent chacun un projectile magique qui blesse et ralentit grandement les ennemis touchés.","cd":"7","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Fantaisie","description":"Si le sort est lancé sur un allié, il augmente temporairement ses vitesses de déplacement et d'attaque. S'il est lancé sur un ennemi, il le transforme en une petite bête adorable qui ne peut ni attaquer, ni lancer de sorts.","cd":"18","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Pix à la rescousse !","description":"Sort lancé sur un allié : ordonne à Pix de rejoindre un allié et de le protéger, après quoi Pix le suit et l'aide à attaquer. Sort lancé sur un ennemi : ordonne à Pix de foncer sur un ennemi et de le blesser, après quoi Pix le suit et vous confère la vision de cet ennemi.","cd":"10/9.5/9/8.5/8","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Croissance prodigieuse","description":"Lulu fait grandir un allié, projetant en l'air les ennemis proches et lui conférant de nombreux PV supplémentaires. Pendant les quelques secondes qui suivent, cet allié bénéficie d'un halo qui ralentit les ennemis proches.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Lux","nom":"Lux","titre":"Dame de lumière","blurb":"Luxanna Crownguard est originaire de Demacia, un royaume isolationniste où la magie inspire la peur et la méfiance. Capable de plier la lumière à sa volonté, elle a grandi dans la crainte d'être un jour exilée et a été contrainte de dissimuler son pouvoir pour préserver l'honneur de sa famille. Cependant, l'optimisme et la ténacité de Lux l'ont conduite à accepter ses talents uniques, et elle les emploie désormais secrètement pour le bénéfice de sa patrie.","tags":["Mage","Support"],"info":{"attack":2,"defense":4,"magic":9,"difficulty":5},"partype":"Mana","passif":{"nom":"Illumination","description":"Les compétences de Lux infligeant des dégâts chargent la cible en énergie pendant quelques secondes. La prochaine attaque de Lux embrase l'énergie, infligeant des dégâts magiques supplémentaires à la cible (en fonction du niveau de Lux)."},"competences":[{"nom":"Entrave de lumière","description":"Lux projette une sphère de lumière qui immobilise et blesse jusqu'à deux unités ennemies.","cd":"10","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Barrière prismatique","description":"Lux lance son bâton et courbe la lumière autour des cibles alliées touchées, les protégeant contre les dégâts.","cd":"12/11.5/11/10.5/10","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Anomalie radieuse","description":"Crée une anomalie composée de lumière dans une zone, ralentissant les ennemis proches. Lux peut la faire exploser pour blesser les ennemis dans la zone d'effet.","cd":"10/9.5/9/8.5/8","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Éclat final","description":"Après avoir chargé de l'énergie, Lux tire un rayon lumineux qui inflige des dégâts à toutes les cibles dans la zone. En outre, Éclat final déclenche la compétence passive de Lux et rafraîchit la durée du sortilège d'Illumination.","cd":"60/50/40","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Malphite","nom":"Malphite","titre":"Éclat du monolithe","blurb":"Massive créature de pierre vivante, Malphite lutte pour imposer un ordre sacré dans un monde chaotique. Né pour servir l'obélisque mystique que l'on nomme le Monolithe, il utilisa son incroyable force élémentaire pour protéger son créateur, mais n'y parvint pas. Seul survivant de la destruction qui s'ensuivit, Malphite doit désormais supporter les inconséquences des êtres de chair et trouver un nouveau rôle, digne du dernier survivant de son espèce.","tags":["Tank","Mage"],"info":{"attack":5,"defense":9,"magic":7,"difficulty":2},"partype":"Mana","passif":{"nom":"Bouclier de granit","description":"Malphite est protégé par un bouclier de roche qui absorbe des dégâts équivalents à 10% de ses PV max. Si Malphite n'est pas touché pendant quelques secondes, l'effet se recharge."},"competences":[{"nom":"Éclat sismique","description":"Malphite envoie un éclat de terre à son ennemi à travers le sol, infligeant des dégâts à l'impact et lui dérobant sa vitesse de déplacement pendant 3 sec.","cd":"8","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Coup de tonnerre","description":"Malphite attaque avec tant de force qu'il crée des bangs supersoniques. Pendant quelques secondes, ses attaques produisent des ondes de choc devant lui.","cd":"10/9.5/9/8.5/8","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Choc au sol","description":"Malphite frappe le sol, provoquant une onde de choc qui inflige des dégâts magiques en fonction de son armure et qui réduit brièvement la vitesse d'attaque des ennemis.","cd":"7","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Force indomptable","description":"Malphite fonce vers une position à grande vitesse, blessant les ennemis et les projetant dans les airs.","cd":"130/115/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Malzahar","nom":"Malzahar","titre":"Prophète du Néant","blurb":"Voyant fanatique ayant dédié son existence à l'unification de toute forme de vie, Malzahar croit fermement que le Néant est la voie du salut de Runeterra. Dans les étendues désertiques de Shurima, il suivit les voix qui murmuraient dans son esprit jusqu'à l'antique cité d'Icathia. Au plus profond des ruines, il plongea le regard dans le cœur noir du Néant et reçut de nouveaux pouvoirs, un nouveau but. Malzahar se considère désormais comme un berger : sa tâche est d'unir ses semblables… ou de libérer les créatures du Néant qui vivent sous terre.","tags":["Mage"],"info":{"attack":2,"defense":2,"magic":9,"difficulty":6},"partype":"Mana","passif":{"nom":"Plan du Néant","description":"Quand il ne subit pas de dégâts ou de contrôle de foule pendant un temps, Malzahar gagne une énorme réduction des dégâts et devient insensible aux contrôles de foule. Cet effet perdure pendant un court instant après avoir subi des dégâts."},"competences":[{"nom":"Appel du Néant","description":"Malzahar ouvre deux portails vers le Néant. Après un court délai, ils tirent des projectiles qui infligent des dégâts magiques et réduisent les champions ennemis au silence.","cd":"6","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Nuée du Néant","description":"Malzahar invoque des êtres du Néant qui attaquent les ennemis proches.","cd":"8","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Visions maléfiques","description":"Malzahar tourmente sa cible avec des visions de sa mort, infligeant des dégâts sur la durée. Utiliser les autres sorts de Malzahar sur la cible renouvelle les visions.<br><br>Si la cible meurt en étant affectée par cet effet, les visions sont transmises à une unité ennemie proche et Malzahar regagne du mana. Les êtres du Néant de Malzahar sont attirés par les cibles ainsi affectées.","cd":"11/10/9/8/7","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Poigne du Néant","description":"Malzahar canalise l'essence du Néant pour neutraliser un champion ennemi dans une zone d'énergie négative infligeant des dégâts.","cd":"140/110/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Maokai","nom":"Maokai","titre":"Tréant torturé","blurb":"Maokai est un immense tréant possédé par la colère, qui combat les horreurs impies des Îles obscures. Il est devenu l'incarnation de la vengeance après la destruction de ses terres par un cataclysme magique, n'échappant lui-même à l'état de mort-vivant que grâce à l'eau de la vie qui l'irrigue. Autrefois, Maokai était un paisible esprit de la nature ; aujourd'hui, il combat avec fureur le fléau mort-vivant qui accable les Îles obscures pour rendre à l'archipel son ancienne beauté.","tags":["Tank","Support"],"info":{"attack":3,"defense":8,"magic":6,"difficulty":3},"partype":"Mana","passif":{"nom":"Sève magique","description":"L'attaque de base de Maokai a un effet qui lui rend des PV et qui inflige des dégâts supplémentaires, avec un délai de récupération modéré. Chaque fois que Maokai lance une compétence ou est touché par une compétence ennemie, ce délai de récupération est réduit."},"competences":[{"nom":"Coup de ronces","description":"Maokai projette les ennemis proches en arrière avec une onde de choc, leur infligeant des dégâts magiques et les ralentissant.","cd":"7/6.5/6/5.5/5","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Croissance torturée","description":"Maokai se transforme en une masse de racines mouvantes, devenant impossible à cibler et fonçant sur la cible. À l'arrivée, il immobilise la cible.","cd":"14/13/12/11/10","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Jet d'arbrisseau","description":"Maokai envoie un arbrisseau qui surveille une zone. Plus efficace dans les hautes herbes.","cd":"18/17/16/15/14","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Emprise de la nature","description":"Maokai invoque un colossal mur de ronces et d'épines qui avance lentement, blessant et immobilisant les ennemis sur son chemin.","cd":"130/110/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"MasterYi","nom":"Maître Yi","titre":"Fine lame Wuju","blurb":"Maître Yi a renforcé son corps et affûté son esprit jusqu'à ce que réflexion et action ne fassent plus qu'un. Bien qu'il ne fasse appel à la violence qu'en dernier recours, la grâce et la vitesse avec lesquelles il manie son épée assurent une résolution rapide de tout conflit. En tant que l'un des derniers praticiens vivants de l'art martial ionien appelé Wuju, Yi a voué sa vie à perpétuer l'héritage de son peuple, scrutant les nouveaux disciples potentiels à l'aide des Sept lentilles d'éveil pour identifier les plus dignes de recevoir son enseignement.","tags":["Fighter","Assassin"],"info":{"attack":10,"defense":4,"magic":2,"difficulty":4},"partype":"Mana","passif":{"nom":"Coup double","description":"Après plusieurs attaques consécutives, Maître Yi frappe deux fois."},"competences":[{"nom":"Assaut éclair","description":"Maître Yi se téléporte sur le champ de bataille à la vitesse de l'éclair, infligeant des dégâts physiques à plusieurs unités sur son chemin tout en étant impossible à cibler. Assaut éclair peut infliger des coups critiques et inflige des dégâts physiques supplémentaires aux monstres. Les attaques de base réduisent le délai de récupération d'Assaut éclair.","cd":"20/19.5/19/18.5/18","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Méditation","description":"Maître Yi médite, régénérant ses PV chaque seconde et subissant moins de dégâts un court moment. De plus, Maître Yi cumule des effets Coup double et met en pause la durée restante de Style Wuju et de Highlander pour chaque seconde de canalisation.","cd":"10","cout":"40","typeCout":" pts de mana (+{{ percentmanacostpersecond*100 }}% du mana max par seconde)"},{"nom":"Style Wuju","description":"Permet aux attaques de base d'infliger des dégâts bruts supplémentaires.","cd":"14","cout":"0","typeCout":"Pas de coût"},{"nom":"Highlander","description":"Maître Yi se déplace avec une agilité sans pareille, ce qui augmente ses vitesses de déplacement et d'attaque et le rend temporairement insensible aux effets qui ralentissent. Pendant la durée de l'effet, tuer un champion ou effectuer une assistance prolonge la durée de Highlander. Passivement, tuer un champion ou effectuer une assistance réduit le délai de récupération des autres compétences.","cd":"85","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Mel","nom":"Mel","titre":"Reflet de l'âme","blurb":"Mel Medarda est l'héritière présumée de la famille Medarda, autrefois l'une des plus puissantes familles de Noxus. Aristocrate gracieuse en apparence, elle est en réalité une politicienne chevronnée, soucieuse de connaître les moindres détails de tous ceux qu'elle rencontre. Après sa rencontre avec la mystérieuse Rose noire, Mel découvre l'importance de la supercherie de sa mère et se retrouve confrontée à une situation qui échappe à son contrôle. Dotée de pouvoirs magiques fraîchement révélés, elle rentre chez elle à la recherche de réponses. Bien que beaucoup cherchent encore à tempérer la lumière qui l'habite, l'âme de Mel reste à jamais insoumise.","tags":["Mage","Support"],"info":{"attack":2,"defense":4,"magic":9,"difficulty":5},"partype":"Mana","passif":{"nom":"Luminescence incandescente","description":"Chaque fois que Mel utilise une compétence, elle gagne trois projectiles bonus (neuf max) pour sa prochaine attaque.<br><br>Lorsque Mel inflige des dégâts grâce à une compétence ou une attaque, elle applique Accablement (cumulable à l'infini). S'il y a suffisamment d'effets cumulés sur un ennemi quand Mel le touche, les effets sont consommés pour exécuter la cible."},"competences":[{"nom":"Salve radieuse","description":"Mel tire une rafale de projectiles qui explosent sur une zone et infligent des dégâts répétés aux ennemis qui s'y trouvent.","cd":"10/9/8/7/6","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Réfutation","description":"Mel crée une barrière autour d'elle qui renvoie les projectiles ennemis à l'envoyeur. Cela la protège des dégâts et augmente sa vitesse de déplacement.","cd":"38/35/33/29/26","cout":"80/60/40/20/0","typeCout":" {{ abilityresourcename }}"},{"nom":"Piège solaire","description":"Mel lance un orbe brillant qui immobilise les ennemis touchés par le centre du projectile et qui ralentit ceux qui se trouvent en périphérie tout en leur infligeant des dégâts sur la durée.","cd":"11/10.5/10/9.5/9","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Éclipse dorée","description":"Mel frappe tous les ennemis marqués par Accablement sans tenir compte de la distance qui les sépare d'elle. Cela leur inflige des dégâts bonus pour chaque effet d'Accablement cumulé.<br><br>Plus la compétence Éclipse dorée a un niveau élevé, plus les dégâts d'Accablement sont importants.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Milio","nom":"Milio","titre":"Douce flamme","blurb":"Milio est un garçon d'Ixtal chaleureux qui, malgré son jeune âge, maîtrise l'Axiome du feu et a découvert le feu guérisseur. Grâce à cette puissance nouvelle, il espère intégrer les Yun Tal, comme sa grand-mère avant lui, et annuler le jugement qui contraint sa famille à l'exil. Après avoir traversé les jungles d'Ixtal pour rejoindre Ixaocan, la capitale, il se prépare à affronter le Vidalion, ignorant tout des épreuves et des dangers qui l'attendent.","tags":["Support","Mage"],"info":{"attack":2,"defense":4,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Tout feu tout flamme","description":"Les compétences de Milio enchantent les alliés touchés, ce qui permet aux prochains dégâts de ces alliés d'infliger des dégâts supplémentaires et de brûler leur cible."},"competences":[{"nom":"Ultra méga boule de feu","description":"Milio tire une boule de feu qui repousse un ennemi. À l'impact, la boule part en cloche et retombe sur l'ennemi, ce qui blesse et ralentit les ennemis dans la zone.","cd":"10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Feu de camp","description":"Milio crée une zone de renforcement qui soigne les alliés qui y entrent tout en augmentant leur portée d'attaque. La zone suit l'allié le plus proche du point de départ.","cd":"29/27/25/23/21","cout":"90/100/110/120/130","typeCout":" {{ abilityresourcename }}"},{"nom":"Chaud devant !","description":"Milio lance un bouclier sur un allié, ce qui augmente temporairement la vitesse de déplacement de cet allié. Cette compétence a 2 charges.","cd":"0.5","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Flammes vitales","description":"Milio libère une vague de flammes guérisseuses qui soignent les alliés à portée tout en supprimant les effets de contrôle de foule qui les affectent.","cd":"160/145/130","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"MissFortune","nom":"Miss Fortune","titre":"Chasseuse de primes","blurb":"Capitaine de Bilgewater réputée pour sa beauté et crainte pour sa cruauté, Sarah Fortune est une personnalité qui détonne au milieu des criminels endurcis qui arpentent la cité portuaire. Enfant, elle assista au massacre de sa famille par Gangplank, le roi des pillards, et elle prit sa revanche des années plus tard, faisant exploser son navire alors qu'il se trouvait à bord. Ceux qui la sous-estiment découvrent un adversaire imprévisible et séduisant... avant de prendre une ou deux balles dans les entrailles.","tags":["Marksman","Mage"],"info":{"attack":8,"defense":2,"magic":5,"difficulty":1},"partype":"Mana","passif":{"nom":"Cœur volage","description":"Miss Fortune inflige des dégâts physiques supplémentaires quand elle attaque une nouvelle cible."},"competences":[{"nom":"Doublé","description":"Miss Fortune tire une balle sur une cible, blessant cette cible et celle qui se trouve derrière. Les deux coups peuvent aussi appliquer Cœur volage.","cd":"7/6/5/4/3","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Fanfaronne","description":"Miss Fortune augmente passivement sa vitesse de déplacement quand elle n'est pas attaquée. Cette compétence peut être activée pour recevoir un bonus en vitesse d'attaque pendant un court instant. Quand cette compétence est en récupération, Cœur volage réduit le délai de récupération restant de Fanfaronne.","cd":"12","cout":"45","typeCout":" {{ abilityresourcename }}"},{"nom":"Pluie de balles","description":"Miss Fortune révèle une zone avec une pluie de balles, infligeant des vagues de dégâts aux ennemis et les ralentissant.","cd":"18/17/16/15/14","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Barrage de plomb","description":"Miss Fortune déchaîne un déluge de balles dans un cône devant elle, infligeant d'importants dégâts aux ennemis. Chaque vague de Barrage de plomb peut infliger des coups critiques.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"MonkeyKing","nom":"Wukong","titre":"Roi des singes","blurb":"Wukong est un Vastaya qui utilise sa force, son agilité et son intelligence pour semer la confusion parmi ses adversaires et prendre sur eux l'avantage. Après s'être fait un ami en la personne d'un guerrier nommé Maître Yi, Wukong est devenu le dernier tenant d'un art martial antique connu sous le nom de Wuju. Armé de son bâton enchanté, Wukong veut empêcher Ionia de devenir ruines et décombres.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":5,"magic":2,"difficulty":3},"partype":"Mana","passif":{"nom":"Peau de pierre","description":"Wukong augmente son armure et la régénération de ses PV lorsqu'il est en combat avec des champions ou des monstres (effet cumulable)."},"competences":[{"nom":"Écrasement","description":"La prochaine attaque de Wukong a une plus longue portée, inflige des dégâts supplémentaires et réduit l'armure de la cible pendant quelques secondes.","cd":"8/7.5/7/6.5/6","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Guerrier espiègle","description":"Wukong devient <font color='#91d7ee'>invisible</font> et se rue dans une direction, laissant derrière lui un clone qui attaquera les ennemis proches.","cd":"22/21/20/19/18","cout":"60/55/50/45/40","typeCout":" {{ abilityresourcename }}"},{"nom":"Nimbus","description":"Wukong se rue sur l'ennemi ciblé et envoie des images qui attaquent les ennemis proches de sa cible, infligeant des dégâts à chaque ennemi frappé.","cd":"10/9.25/8.5/7.75/7","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Cyclone","description":"Wukong agrandit son bâton et le fait tournoyer, ce qui augmente sa vitesse de déplacement.<br><br>Les ennemis touchés subissent des dégâts et sont projetés en l'air.","cd":"130/110/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Mordekaiser","nom":"Mordekaiser","titre":"Revenant de fer","blurb":"Deux fois abattu et trois fois né, Mordekaiser est un chef de guerre brutal venu d'un lointain passé. Il utilise ses pouvoirs nécromantiques pour lier les âmes à une éternité de servitude. Il n'y a plus guère de gens pour se souvenir de ses anciennes conquêtes ou pour connaître l'étendue de ses vrais pouvoirs. Pourtant, certaines âmes antiques en ont gardé la mémoire et craignent le jour où il prétendra de nouveau régner sur les vivants et les morts.","tags":["Fighter","Mage"],"info":{"attack":4,"defense":6,"magic":7,"difficulty":4},"partype":"Bouclier","passif":{"nom":"Vortex de ténèbres","description":"Après 3 attaques ou compétences contre des champions ou des monstres, Mordekaiser gagne un puissant halo de dégâts et augmente sa vitesse de déplacement."},"competences":[{"nom":"Oblitération","description":"Mordekaiser frappe le sol avec sa massue, infligeant des dégâts à tous les ennemis touchés. Les dégâts sont augmentés si un seul ennemi est touché.","cd":"8/7/6/5/4","cout":"0","typeCout":"Pas de coût"},{"nom":"Indestructible","description":"Mordekaiser stocke une partie des dégâts qu'il inflige et qu'il subit pour créer un bouclier. Il peut consommer ce bouclier pour récupérer des PV.","cd":"12/11/10/9/8","cout":"0","typeCout":"Pas de coût"},{"nom":"Emprise funeste","description":"Mordekaiser attire tous les ennemis qui se trouvent dans une zone.","cd":"18/16/14/12/10","cout":"0","typeCout":"Pas de coût"},{"nom":"Royaume des morts","description":"Mordekaiser entraîne sa victime avec lui dans une autre dimension et lui vole une partie de ses stats. S'il la tue, il garde ces stats jusqu'à la réapparition de sa victime.","cd":"140/120/100","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Morgana","nom":"Morgana","titre":"Déchue","blurb":"Déchirée entre ses origines célestes et mortelles, Morgana a enchaîné ses ailes pour appartenir pleinement à l'humanité et abattre sa peine et sa rancœur sur les corrompus et les malhonnêtes. Elle rejette les lois et les traditions qu'elle juge injustes. Terrée dans les recoins obscurs de Demacia, elle préfère se battre pour la vérité – quand d'autres veulent la faire taire – en employant ses boucliers et ses chaînes de feu ténébreux. Plus que tout, Morgana croit fermement que même les proscrits et les parias peuvent un jour se racheter.","tags":["Support","Mage"],"info":{"attack":1,"defense":6,"magic":8,"difficulty":1},"partype":"Mana","passif":{"nom":"Siphon d'âme","description":"Morgana peut drainer l'esprit de ses ennemis. Elle récupère des PV quand elle blesse des champions, des grands sbires et des monstres grands ou moyens de la jungle."},"competences":[{"nom":"Entrave sombre","description":"Morgana utilise la magie noire pour immobiliser un ennemi, l'obligeant à ressentir la douleur qu'il a causée et lui infligeant des dégâts magiques. ","cd":"10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Tourment ténébreux","description":"Morgana déploie une ombre maudite sur une zone, blessant les ennemis qui osent y mettre les pieds. Ces ennemis subissent des dégâts magiques sur la durée qui augmentent avec leurs PV manquants.","cd":"12","cout":"70/80/90/100/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Bouclier noir","description":"Morgana offre à un allié une barrière de feu stellaire qui absorbe les dégâts magiques et les entraves jusqu'à ce que celle-ci soit brisée.","cd":"26/23.5/21/18.5/16","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Chaînes spirituelles","description":"Morgana détache ses ailes, libérant toute sa puissance céleste et se mettant à survoler le sol. Elle lance des chaînes sombres sur les champions ennemis proches, gagnant de la vitesse de déplacement. Les chaînes ralentissent ces ennemis et leur infligent des dégâts ; après un délai, les ennemis qui n'ont pas brisé les chaînes sont étourdis.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Naafiri","nom":"Naafiri","titre":"la meute de fer","blurb":"À travers le désert de Shurima, un concert de hurlements retentit. C'est l'appel des chiens des sables, ces prédateurs voraces qui se déplacent en meutes et luttent pour la moindre source de nourriture de ces terres stériles. Parmi ces meutes, une se distingue des autres. Elle ne suit pas uniquement ses instincts primitifs : elle est guidée par le pouvoir antique des Darkin.","tags":["Assassin","Fighter"],"info":{"attack":9,"defense":5,"magic":0,"difficulty":2},"partype":"Mana","passif":{"nom":"La meute s'agrandit","description":"Naafiri fait apparaître des membres de meute qui attaquent les cibles de ses attaques et de ses compétences."},"competences":[{"nom":"Dagues des Darkin","description":"Naafiri lance jusqu'à deux dagues qui appliquent chacune un saignement, ou qui infligent des dégâts supplémentaires si la cible saigne déjà.<br><br>Les membres de meute bondissent pour attaquer le premier champion ou monstre touché par cette compétence.<br>","cd":"9/8.5/8/7.5/7","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Appel de la meute","description":"Naafiri devient impossible à cibler et renforce sa meute, invoquant des membres de meute supplémentaires et gagnant de la vitesse de déplacement et des dégâts d'attaque.<br>","cd":"26/24/22/20/18","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Éviscération","description":"Naafiri se rue dans une direction et inflige des dégâts aux ennemis dans une zone autour d'elle. Les membres de meute sont rappelés et entièrement soignés.","cd":"11/10/9/8/7","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Hallali","description":"Naafiri et ses membres de meute se ruent sur un champion, lui infligeant des dégâts. Naafiri révèle les ennemis proches et peut relancer sa compétence une fois si elle réalise une élimination. La deuxième activation de la compétence n'octroie pas de bouclier.","cd":"110/95/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Nami","nom":"Nami","titre":"Aquamancienne","blurb":"Jeune Vastaya des mers, Nami fut la première de la tribu des Marai à quitter les océans et à s'aventurer sur la terre ferme lorsque leur accord ancestral avec les Targoniens fut rompu. Convaincue qu'il n'y avait pas d'autre solution, elle a décidé de suivre le rituel sacré permettant de garantir la protection de son peuple. Plongée en plein chaos, Nami fait face à son avenir avec détermination, utilisant son bâton d'Aquamancienne pour invoquer la puissance des océans.","tags":["Support","Mage"],"info":{"attack":4,"defense":3,"magic":7,"difficulty":5},"partype":"Mana","passif":{"nom":"Déferlantes","description":"Quand les compétences de Nami touchent des champions alliés, la vitesse de déplacement de ces champions augmente un court instant."},"competences":[{"nom":"Prison aqueuse","description":"Envoie une bulle sur la zone ciblée, infligeant des dégâts et étourdissant tous les ennemis à l'impact.","cd":"12/11/10/9/8","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Flux et reflux","description":"Projette un flux d'eau qui rebondit sur les champions alliés et ennemis, soignant les alliés et blessant les ennemis.","cd":"10","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Bénédiction de l'Aquamancienne","description":"Renforce un champion allié pendant un court instant, permettant à ses attaques de base et à ses compétences d'infliger des dégâts magiques supplémentaires et de ralentir sa cible.","cd":"11","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Raz-de-marée","description":"Invoque un énorme raz-de-marée qui projette tous les ennemis touchés en l'air, les ralentit et les blesse. Les alliés touchés gagnent le double de l'effet de Déferlantes.","cd":"120/110/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Nasus","nom":"Nasus","titre":"Gardien des sables","blurb":"Nasus est un imposant Transfiguré à tête de chacal, une figure héroïque que les peuples du désert considéraient comme un demi-dieu aux temps anciens de Shurima. Il était très intelligent ; son savoir encyclopédique et son extraordinaire sens stratégique guidèrent l'antique empire de Shurima vers la grandeur pendant des siècles. Après la chute de l'empire, il s'imposa un exil et devint peu à peu une légende. Maintenant que l'ancienne cité de Shurima renaît de ses cendres, il est de retour, déterminé à empêcher qu'elle ne chute de nouveau.","tags":["Fighter","Tank"],"info":{"attack":7,"defense":5,"magic":6,"difficulty":6},"partype":"Mana","passif":{"nom":"Mangeur d'âmes","description":"Nasus draine l'énergie spirituelle de son adversaire et profite d'un bonus de Vol de vie."},"competences":[{"nom":"Buveuse d'âmes","description":"Nasus frappe son ennemi, infligeant des dégâts et augmentant la puissance des prochaines Buveuses d'âmes s'il tue sa cible.","cd":"7.5/6.5/5.5/4.5/3.5","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Flétrissement","description":"Nasus fait vieillir un champion ennemi et réduit ses vitesses d'attaque et de déplacement sur la durée.","cd":"15/14/13/12/11","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Esprit enflammé","description":"Nasus libère un esprit enflammé sur une zone, infligeant des dégâts aux ennemis qui s'y trouvent et réduisant leur armure.","cd":"12","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Fureur des sables","description":"Nasus libère une puissante tempête de sable. Tant que la tempête fait rage, il a plus de PV, sa portée d'attaque est augmentée, il blesse les ennemis proches, il augmente son armure et sa résistance magique et le délai de récupération de Buveuse d'âmes est réduit.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Nautilus","nom":"Nautilus","titre":"Titan des profondeurs","blurb":"Nautilus, une légende plus ancienne encore que la première jetée de Bilgewater, est un titan en armure qui sillonne les eaux sombres au large des Îles de la Flamme Bleue. Trahi il y a bien longtemps de cela, il frappe désormais sans prévenir, se servant de son ancre gigantesque pour sauver les malheureux et couler les avares. On raconte qu'il vient chercher ceux qui oublient de payer le « tribut de Bilgewater » et qu'il les emmène avec lui au fond des mers, d'où nul ne peut s'échapper.","tags":["Tank","Support"],"info":{"attack":4,"defense":6,"magic":6,"difficulty":6},"partype":"Mana","passif":{"nom":"Coup écrasant","description":"La première attaque de Nautilus contre une cible inflige des dégâts physiques supplémentaires et l'immobilise brièvement."},"competences":[{"nom":"Abordage","description":"Nautilus lance son ancre devant lui.  S'il touche un ennemi, Nautilus et la cible sont tirés l'un vers l'autre et Nautilus lui inflige des dégâts magiques.  S'il touche un élément de terrain, Nautilus est tiré vers lui.","cd":"14/13/12/11/10","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Colère du titan","description":"Nautilus profite d'un bouclier temporaire.  Tant que le bouclier persiste, les attaques de Nautilus infligent des dégâts sur la durée à ses cibles et aux ennemis proches.","cd":"12","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Répliques","description":"Nautilus crée trois vagues explosives autour de lui. Chaque explosion blesse et ralentit les ennemis.","cd":"7/6.5/6/5.5/5","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Grenade ASM","description":"Nautilus lance une onde de choc qui poursuit un ennemi. L'onde de choc transperce le sol et projette les ennemis en l'air. Quand elle atteint l'ennemi, l'onde de choc éclate, projetant la cible en l'air en l'étourdissant.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Neeko","nom":"Neeko","titre":"Caméléon curieux","blurb":"Originaire d'une tribu disparue de Vastayas, Neeko est capable de se fondre dans n'importe quelle foule en empruntant l'apparence des autres, allant même jusqu'à absorber un soupçon de leur état émotionnel pour différencier un instant les amis des ennemis. Personne ne sait réellement où – ni qui – peut bien être Neeko, mais ceux qui chercheront à lui faire du mal découvriront bien vite sa véritable nature… et goûteront à toute la force primordiale de son pouvoir spirituel.","tags":["Mage","Support"],"info":{"attack":1,"defense":1,"magic":9,"difficulty":5},"partype":"Mana","passif":{"nom":"Mirage inné","description":"Neeko peut prendre l'apparence d'un champion allié ou d'autres unités sur la carte. Votre déguisement prend fin si vous subissez une immobilisation, lancez des compétences offensives, infligez des dégâts aux tourelles ennemies (uniquement si vous avez pris la forme d'un non-champion) ou si vous subissez des dégâts équivalents aux PV de votre déguisement."},"competences":[{"nom":"Explosion florale","description":"Neeko lance une graine qui inflige des dégâts magiques. La graine éclot une nouvelle fois si elle touche des champions ou si elle tue des ennemis.","cd":"9/8.5/8/7.5/7","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Métaclonage","description":"Passivement, Neeko inflige des dégâts magiques supplémentaires toutes les 3 attaques, augmentant brièvement sa vitesse de déplacement. Elle peut activer la compétence pour envoyer un clone dans une direction et la réactiver pour modifier la direction du clone.","cd":"16/15/14/13/12","cout":"0","typeCout":"Pas de coût"},{"nom":"Spirale épineuse","description":"Neeko tire un projectile qui blesse et qui immobilise tous les ennemis traversés. Si le projectile tue un ennemi ou traverse un champion, il augmente sa taille, sa vitesse et la durée de son immobilisation.","cd":"12/11.5/11/10.5/10","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Floraison renversante","description":"Après une courte préparation, Neeko bondit dans les airs, projetant en l'air tous les ennemis proches. Quand elle atterrit, les ennemis proches sont blessés et étourdis. La préparation ne se voit pas si Neeko est déguisée.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Nidalee","nom":"Nidalee","titre":"Chasseresse bestiale","blurb":"Élevée au plus profond de la jungle, Nidalee est une pisteuse d'exception qui peut se transformer à volonté en couguar. Ni totalement femme, ni totalement bête, elle défend férocement son territoire contre tous ceux qui veulent y pénétrer avec ses pièges judicieusement placés et sa lance. Elle estropie sa proie avant de se jeter sur elle sous sa forme de félin. Ceux qui survivent sont rares, et tous la décrivent comme une femme aux griffes aussi aiguisées que ses instincts...","tags":["Assassin","Mage"],"info":{"attack":5,"defense":4,"magic":7,"difficulty":8},"partype":"Mana","passif":{"nom":"Prédateur","description":"Dans les herbes hautes, la vitesse de déplacement de Nidalee augmente de 10% pendant 2 sec. Le bonus passe à 30% si Nidalee va vers des champions ennemis visibles à moins de 1400 unités de distance.<br><br>Quand elle touche des champions ou des monstres avec Javelot ou Guérilla, Nidalee se met à les <font color='#FFF673'>chasser</font> et obtient une <font color='#ee91d7'>vision pure</font> de ces cibles pendant 4 sec. Pendant ce temps, la vitesse de déplacement de Nidalee augmente de 10% (30% vers les cibles <font color='#FFF673'>chassées</font>) et, contre ces cibles, Mise à terre et Bond sont renforcés."},"competences":[{"nom":"Javelot / Mise à terre","description":"Dans sa forme humaine, Nidalee lance un javelot qui inflige de plus en plus de dégâts selon la distance parcourue. Sous la forme d'un Couguar, sa prochaine attaque tente d'égorger sa cible, et plus celle-ci a déjà perdu de PV, plus les dégâts sont importants.","cd":"6","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Guérilla / Bond","description":"Dans sa forme humaine, Nidalee place un piège qui blesse et révèle la cible qui le déclenche. Sous la forme d'un Couguar, elle bondit dans une direction et inflige des dégâts de zone en atterrissant.","cd":"13/12/11/10/9","cout":"30/35/40/45/50","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge primale / Taillade","description":"Dans sa forme humaine, Nidalee canalise l'esprit du Couguar pour soigner ses alliés et leur conférer temporairement un bonus en vitesse d'attaque. Sous la forme d'un Couguar, elle donne un coup de griffes aux ennemis devant elle.","cd":"12","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Aspect du Couguar","description":"Nidalee prend la forme d'un Couguar, ce qui lui confère de nouvelles compétences.","cd":"3","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Nilah","nom":"Nilah","titre":"Joie incarnée","blurb":"Nilah est une guerrière disciplinée originaire d'une contrée lointaine. Elle traque les monstres les plus gigantesques et les plus dangereux pour les affronter et les détruire. Elle a obtenu son pouvoir du démon de la joie, emprisonné il y a bien longtemps. Cela explique qu'elle ne ressente aucune émotion, à part une joie continue. Le prix à payer est donc très faible en contrepartie de la force extraordinaire qu'elle possède désormais. Elle canalise la forme liquide du démon dans une épée au pouvoir unique et elle s'oppose aux menaces antiques dont le souvenir s'est perdu depuis longtemps.","tags":["Fighter","Assassin"],"info":{"attack":8,"defense":4,"magic":4,"difficulty":10},"partype":"Mana","passif":{"nom":"Joie éternelle","description":"Nilah gagne plus d'expérience quand elle tue des sbires. De plus, elle renforce et partage les soins et boucliers des alliés proches."},"competences":[{"nom":"Lame fluide","description":"Nilah donne un coup de lame-fouet dans la direction choisie, infligeant des dégâts aux ennemis sur une ligne droite. Cela augmente sa portée d'attaque pendant un court instant.","cd":"4","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Voile de liesse","description":"Nilah s'enveloppe de brume, ce qui augmente sa vitesse de déplacement et lui permet d'esquiver avec grâce toutes les attaques. Tout allié qu'elle touche pendant la durée de la brume gagne aussi cet effet.","cd":"26/25/24/23/22","cout":"60/45/30/15/0","typeCout":" {{ abilityresourcename }}"},{"nom":"Torrent","description":"Nilah se rue avec enthousiasme vers sa cible, infligeant des dégâts aux ennemis sur son chemin.","cd":"0.5","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Apothéose","description":"Faisant gaiement tournoyer sa lame-fouet, Nilah inflige des dégâts aux ennemis qui l'entourent avant de les attirer vers elle.","cd":"110/95/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Nocturne","nom":"Nocturne","titre":"Éternel cauchemar","blurb":"Expression démoniaque des cauchemars qui hantent tous les êtres doués d'intelligence, la chose que l'on nomme Nocturne est devenue une force primordiale du mal. D'aspect liquide, c'est une ombre sans visage, au regard glacial, armée de lames effrayantes. Après s'être affranchi du royaume des esprits, Nocturne est parvenu jusqu'au monde éveillé, pour se nourrir d'une terreur qui ne prospère que dans les véritables ténèbres.","tags":["Fighter","Assassin"],"info":{"attack":9,"defense":5,"magic":2,"difficulty":4},"partype":"Mana","passif":{"nom":"Lames d'ombre","description":"Toutes les quelques secondes, la prochaine attaque de Nocturne frappe les ennemis proches, infligeant des dégâts physiques supplémentaires et lui rendant des PV. <br><br>Les attaques de base de Nocturne réduisent ce délai."},"competences":[{"nom":"Crépuscule","description":"Nocturne projette une lame noire qui inflige des dégâts et laisse une Lueur crépusculaire derrière elle. Les champions ennemis touchés émettent également une Lueur crépusculaire. Quand il est dans la lueur, Nocturne peut traverser les unités et profite d'un bonus en vitesse de déplacement et en dégâts d'attaque.","cd":"8","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Linceul des ténèbres","description":"Nocturne renforce ses lames, ce qui augmente passivement sa vitesse d'attaque. En lançant Linceul des ténèbres, Nocturne se fond dans l'obscurité, ce qui crée une barrière magique capable de bloquer une compétence ennemie et de doubler le bonus passif en vitesse d'attaque en cas de blocage.","cd":"20/18/16/14/12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Horreur indicible","description":"Nocturne implante un cauchemar dans l'esprit de sa cible, infligeant des dégâts chaque seconde et terrifiant la cible si elle reste à portée pendant toute la durée du sort.","cd":"15/14/13/12/11","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Paranoïa","description":"Nocturne réduit le champ de vision de tous les champions ennemis et supprime la vision qu'ils ont de leurs alliés. Il peut ensuite se projeter vers un champion ennemi proche.","cd":"140/115/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Nunu","nom":"Nunu et Willump","titre":"Le Garçon et son yéti","blurb":"Il était une fois un jeune garçon qui voulait prouver qu'il était un héros en tuant un monstre effrayant, mais il découvrit que la créature, un yéti solitaire, avait seulement besoin d'un ami. Rapprochés par une puissance ancienne et un amour partagé des boules de neige, Nunu et Willump courent maintenant librement dans tout Freljord en donnant vie à des aventures rêvées. Ils espèrent un jour retrouver la mère disparue de l'enfant. S'ils peuvent la sauver, peut-être seront-ils vraiment des héros, finalement…","tags":["Tank","Mage"],"info":{"attack":4,"defense":6,"magic":7,"difficulty":4},"partype":"Mana","passif":{"nom":"Appel de Freljord","description":"Nunu augmente les vitesses d'attaque et de déplacement de Willump et d'un allié proche, et les attaques de base de Willump infligent des dégâts aux ennemis proches de la cible."},"competences":[{"nom":"Voracité","description":"Willump mord un sbire, un monstre ou un champion ennemi, lui infligeant d'importants dégâts et récupérant des PV.","cd":"13/12/11/10/9","cout":"60","typeCout":" pts de mana"},{"nom":"Boule de neige géante !","description":"Willump crée une boule de neige qui grossit et accélère à mesure qu'il la fait rouler.  La boule de neige blesse et projette en l'air les ennemis.","cd":"14","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Rafale de boules de neige","description":"Nunu lance plusieurs boules de neige qui blessent les ennemis.  Ensuite, Willump immobilise les champions et les grands monstres qui ont été touchés par une boule de neige.","cd":"14/13/12/11/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Zéro absolu","description":"Nunu et Willump créent un puissant blizzard dans une zone, ce qui ralentit les ennemis et inflige d'importants dégâts à la fin du sort.","cd":"110/100/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Olaf","nom":"Olaf","titre":"Berzerker","blurb":"Olaf, avec sa hache et son extraordinaire force de destruction, ne souhaite que mourir au combat. Venu de l'âpre péninsule freljordienne de Lokfar, il a été choqué par une prophétie qui lui prédisait une mort paisible : dans l'esprit de son peuple, une ignoble fin de lâche. Cherchant la mort et animé par la rage, il ravage une région après l'autre, éliminant des hordes de grands guerriers et de bêtes légendaires dans sa recherche d'un ennemi capable de l'arrêter. Aujourd'hui un brutal combattant de la Griffe hivernale, il espère mourir glorieusement dans les grandes guerres à venir.","tags":["Fighter","Tank"],"info":{"attack":9,"defense":5,"magic":3,"difficulty":3},"partype":"Mana","passif":{"nom":"Rage du berzerker","description":"Olaf gagne de la vitesse d'attaque et du vol de vie selon ses PV manquants."},"competences":[{"nom":"Déchireuse","description":"Olaf lance sa hache à l'endroit ciblé, infligeant des dégâts aux ennemis traversés et réduisant leur armure et leur vitesse de déplacement. Si Olaf ramasse la hache, le délai de récupération de cette compétence est réduit.","cd":"9","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Force décuplée","description":"Olaf augmente sa vitesse d'attaque et gagne un bouclier.","cd":"16/15/14/13/12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Frappe sauvage","description":"Olaf attaque avec tant de force qu'il inflige des dégâts physiques bruts non seulement à sa cible, mais aussi à lui-même. Il récupère le coût en PV s'il tue sa cible.","cd":"11/10/9/8/7","cout":"0","typeCout":" PV."},{"nom":"Ragnarok","description":"Olaf gagne passivement de l'armure et de la résistance magique. Il peut activer cette compétence pour devenir immunisé contre les entraves aussi longtemps qu'il attaque.","cd":"100/90/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Orianna","nom":"Orianna","titre":"Demoiselle mécanique","blurb":"Autrefois une jeune fille curieuse, de chair et d'os, Orianna est aujourd'hui une merveille de technologie entièrement mécanisée. Elle est tombée gravement malade à la suite d'un accident dans les quartiers inférieurs de Zaun, et son corps défaillant a été remplacé petit à petit par des prothèses perfectionnées. Accompagnée par une sphère extraordinaire qu'elle a elle-même créée pour lui servir de compagnon et de protectrice, Orianna est désormais libre d'explorer la merveilleuse ville de Piltover et ce qui se trouve au-delà.","tags":["Mage","Support"],"info":{"attack":4,"defense":3,"magic":9,"difficulty":7},"partype":"Mana","passif":{"nom":"Remontoir","description":"Les attaques d'Orianna infligent des dégâts magiques supplémentaires. Plus Orianna attaque la même cible, plus les dégâts sont importants."},"competences":[{"nom":"Ordre : Attaque","description":"Orianna ordonne à sa sphère de voler vers une zone cible, infligeant des dégâts magiques aux cibles sur son passage (les dégâts diminuent à chaque cible supplémentaire). La sphère reste ensuite dans la zone cible.","cd":"7/6/5/4/3","cout":"35","typeCout":" {{ abilityresourcename }}"},{"nom":"Ordre : Dissonance","description":"Orianna ordonne à sa sphère d'émettre une impulsion énergétique, infligeant des dégâts magiques autour de la sphère. Cela crée une zone qui accélère les alliés et ralentit les ennemis.","cd":"7","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Ordre : Protection","description":"Orianna ordonne à sa sphère d'aller se fixer sur un champion allié pour lui octroyer un bouclier, infligeant des dégâts magiques aux ennemis sur son passage. La sphère augmente aussi l'armure et la résistance magique du champion sur lequel elle est fixée.","cd":"9","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Ordre : Onde de choc","description":"Orianna ordonne à sa sphère d'émettre une onde de choc, infligeant des dégâts magiques et projetant les ennemis proches vers la sphère après un bref délai.","cd":"110/95/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Ornn","nom":"Ornn","titre":"Dieu de la forge volcanique","blurb":"Ornn est le demi-dieu de la forge et de l'artisanat à Freljord. Avec comme seule compagne la solitude, il travaille dans sa forge enfouie au plus profond des cavernes de lave de l'Âtre-foyer. C'est là qu'il fond et purifie les métaux nécessaires à la création d'objets de qualité inimitable. Tandis que d'autres divinités – Volibear avant tout – s'immiscent dans les affaires des mortels, Ornn ne sort de son antre que pour remettre ces déités à leur place, avec son fidèle marteau ou les pouvoirs du volcan lui-même.","tags":["Tank"],"info":{"attack":5,"defense":9,"magic":3,"difficulty":5},"partype":"Mana","passif":{"nom":"Forgeron ambulant","description":"Ornn augmente tous ses bonus d'armure et de résistance magique.<br><br>Ornn peut dépenser des PO pour forger des objets non consommables n'importe où sur la carte.<br><br>De plus, il peut créer des chefs-d'œuvre pour ses alliés ou lui-même."},"competences":[{"nom":"Fracture magmatique","description":"Ornn frappe le sol, créant une fissure qui blesse et ralentit les ennemis touchés. Après un court délai, une colonne de lave se forme au bout de la fissure.","cd":"9/8.5/8/7.5/7","cout":"45","typeCout":" {{ abilityresourcename }}"},{"nom":"Fournaise","description":"Ornn avance en crachant des flammes. Les ennemis touchés par la dernière flamme deviennent fragiles.","cd":"12/11.5/11/10.5/10","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Ruée ardente","description":"Ornn fonce dans une direction en infligeant des dégâts aux ennemis qu'il traverse. Si Ornn percute un terrain pendant la ruée, l'impact crée une onde de choc autour de lui qui blesse et projette en l'air les ennemis.","cd":"14/13.5/13/12.5/12","cout":"35/40/45/50/55","typeCout":" {{ abilityresourcename }}"},{"nom":"Appel du dieu de la forge","description":"Ornn invoque un énorme élémentaire à l'endroit ciblé. Cet élémentaire se déplace ensuite vers Ornn, de plus en plus vite. Les ennemis écrasés par l'élémentaire subissent des dégâts, sont ralentis et deviennent fragiles. Ornn peut relancer cette compétence pour se ruer vers l'élémentaire, le réorientant selon la direction de la collision. L'élémentaire redirigé projette en l'air les ennemis qu'il touche, en infligeant les mêmes dégâts qu'avant et en appliquant de nouveau l'effet Fragilité.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Pantheon","nom":"Pantheon","titre":"Lance éternelle","blurb":"Autrefois l'hôte réticent de la Manifestation de la Guerre, Atreus a survécu à la mort de la puissance céleste qui l'habitait, refusant de succomber au coup qui arracha les étoiles mêmes des cieux. Avec le temps, il apprit à accepter le pouvoir de sa mortalité, et la résistance bornée qui y est associée. Atreus s'oppose désormais aux entités divines en tant que Pantheon, ressuscité parmi les mortels, et manie les armes de la Manifestation animées par sa volonté inébranlable sur le champ de bataille.","tags":["Fighter","Assassin"],"info":{"attack":9,"defense":4,"magic":3,"difficulty":4},"partype":"Mana","passif":{"nom":"Ardeur mortelle","description":"Après un certain nombre de compétences ou d'attaques, la prochaine compétence de Pantheon est renforcée."},"competences":[{"nom":"Lance astrale","description":"Pantheon donne un coup de lance ou jette sa lance dans la direction choisie.","cd":"11/10.25/9.5/8.75/8","cout":"25","typeCout":" {{ abilityresourcename }}"},{"nom":"Assaut martial","description":"Pantheon se rue sur une cible, l'étourdissant et lui infligeant des dégâts.","cd":"13/12/11/10/9","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Égide impénétrable","description":"Pantheon lève son bouclier, devenant invulnérable aux attaques auxquelles il fait face, et donne des coups de lance en succession rapide.","cd":"22/21/20/19/18","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Météore","description":"Pantheon rassemble ses forces pour sauter dans les airs, puis il atterrit tel un météore à l'endroit choisi.","cd":"180/165/150","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Poppy","nom":"Poppy","titre":"Gardienne du marteau","blurb":"Runeterra ne manque pas de braves champions, mais peu peuvent se targuer d'être aussi tenaces que Poppy. Armée du légendaire marteau d'Orlon, faisant deux fois sa taille, cette yordle déterminée cherche depuis d'innombrables années le « héros de Demacia », qui serait le dépositaire légitime de cette arme. En attendant, elle part inlassablement au combat, repoussant les ennemis du royaume à grands coups de marteau.","tags":["Tank","Fighter"],"info":{"attack":6,"defense":7,"magic":2,"difficulty":6},"partype":"Mana","passif":{"nom":"Ambassadrice de fer","description":"Poppy lance son écu et le fait rebondir sur sa cible. Poppy peut le ramasser pour obtenir un bouclier temporaire."},"competences":[{"nom":"Commotion","description":"Poppy balance son marteau, infligeant des dégâts et créant une zone qui ralentira les ennemis et explosera après un délai.","cd":"8/7/6/5/4","cout":"35/40/45/50/55","typeCout":" {{ abilityresourcename }}"},{"nom":"Présence immuable","description":"Poppy obtient passivement de l'armure et de la résistance magique. Ce bonus augmente quand il lui reste peu de PV. Poppy peut activer Présence immuable pour augmenter sa vitesse de déplacement et arrêter les ruées ennemies autour d'elle. Si elle arrête une ruée, l'ennemi est ralenti et inerte.","cd":"20/18/16/14/12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge héroïque","description":"Poppy charge la cible et la repousse. Si la cible est repoussée contre un mur, elle est étourdie.","cd":"14/13/12/11/10","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Verdict de la gardienne","description":"Poppy canalise un coup de marteau qui projette les ennemis très loin.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Pyke","nom":"Pyke","titre":"Éventreur des abysses","blurb":"Harponneur renommé des quais-abattoirs de Bilgewater, Pyke aurait dû trouver la mort dans le ventre d'une énorme créature marine… et pourtant, il est revenu. À présent, il écume les ruelles sombres de son ancien port d'attache, utilisant ses dons surnaturels pour assassiner brutalement les riches exploiteurs du peuple. Bilgewater, la ville des chasseurs de monstres, est devenue le terrain de chasse d'un monstre.","tags":["Support","Assassin"],"info":{"attack":9,"defense":3,"magic":1,"difficulty":7},"partype":"Mana","passif":{"nom":"Don des noyés","description":"Quand Pyke n'est pas vu par les ennemis, il régénère les dégâts que les champions lui ont récemment infligés. Par ailleurs, Pyke ne peut pas augmenter ses PV max ; tous ses PV supplémentaires sont convertis en dégâts d'attaque."},"competences":[{"nom":"Harponnage","description":"Pyke poignarde un ennemi devant lui ou attire un ennemi vers lui.","cd":"10/9.5/9/8.5/8","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Plongée spectrale","description":"Pyke se camoufle et obtient un important bonus en vitesse de déplacement qui diminue sur la durée.","cd":"14/13/12/11/10","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Ressac fantôme","description":"Pyke fonce dans une direction et laisse derrière lui un fantôme de noyé qui reviendra vers lui en étourdissant les champions ennemis sur son passage.","cd":"15/14/13/12/11","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Exécution abyssale","description":"Pyke fonce sur les ennemis qui ont peu de PV et les exécute, ce qui lui permet de relancer ce sort et d'octroyer des PO supplémentaires à un allié qui l'assiste.","cd":"100/85/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Qiyana","nom":"Qiyana","titre":"Impératrice des éléments","blurb":"Dans la ville d'Ixaocan, perdue dans la jungle, Qiyana complote pour obtenir au prix du sang le siège révéré des Yun Tal. Dernière dans l'ordre de la succession, elle affronte ceux qui sont sur son chemin avec une absolue confiance en elle et une maîtrise exceptionnelle de la magie élémentaire. La terre elle-même obéit à ses ordres et Qiyana se considère comme la plus grande élémentaliste de l'histoire d'Ixaocan. À ce titre, elle pense mériter, non une ville, mais un empire.","tags":["Assassin"],"info":{"attack":0,"defense":2,"magic":4,"difficulty":8},"partype":"Mana","passif":{"nom":"Privilège royal","description":"La première compétence ou attaque de base de Qiyana contre un ennemi inflige des dégâts supplémentaires."},"competences":[{"nom":"Courroux élémentaire/Lame d'Ixtal","description":"Qiyana frappe avec son arme, infligeant des dégâts et un effet supplémentaire selon son élément.","cd":"7","cout":"35","typeCout":" {{ abilityresourcename }}"},{"nom":"Terraforce","description":"Qiyana se rue vers la zone ciblée et enchante son arme avec un élément. Ses attaques et ses compétences infligent des dégâts supplémentaires quand son arme est enchantée. ","cd":"7","cout":"25/30/35/40/45","typeCout":" {{ abilityresourcename }}"},{"nom":"Audace","description":"Qiyana se rue sur un ennemi et lui inflige des dégâts.","cd":"11/10/9/8/7","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Tour de force suprême","description":"Qiyana envoie une onde de choc qui provoque une explosion en touchant un élément, ce qui étourdit et blesse les ennemis proches.","cd":"120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Quinn","nom":"Quinn","titre":"Ailes de Demacia","blurb":"Quinn est un chevalier-éclaireur d'élite de Demacia qui se spécialise dans les missions d'infiltration en territoire ennemi. Avec son aigle de légende, Valor, elle forme un duo inséparable dont les proies rendent souvent l'âme avant même de comprendre qu'elles affrontaient non pas un, mais deux héros demaciens. D'une grande agilité quand la situation l'impose, Quinn pointe son arbalète sur l'ennemi pendant que Valor survole le terrain et marque les cibles évasives, pour une efficacité meurtrière sur le champ de bataille.","tags":["Marksman","Assassin"],"info":{"attack":9,"defense":4,"magic":2,"difficulty":5},"partype":"Mana","passif":{"nom":"Busard","description":"Valor, l'aigle demacien de Quinn, marque périodiquement des ennemis avec <keywordMajor>Busard</keywordMajor>. La première attaque de base de Quinn contre une cible marquée par le <keywordMajor>Busard</keywordMajor> inflige des dégâts physiques bonus."},"competences":[{"nom":"Assaut aveuglant","description":"Quinn fait appel à Valor pour marquer un ennemi et limiter sa vision avant de blesser tous les ennemis proches.","cd":"11/10.5/10/9.5/9","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Œil d'aigle","description":"Confère passivement à Quinn de la vitesse d'attaque et de la vitesse de déplacement après qu'elle a attaqué une cible marquée par <keywordMajor>Busard</keywordMajor>. Activez pour que Valor révèle une grande zone à proximité.","cd":"50/45/40/35/30","cout":"0","typeCout":"Pas de coût"},{"nom":"Salto","description":"Quinn charge un ennemi, lui infligeant des dégâts physiques et réduisant sa vitesse de déplacement. Après avoir atteint sa cible, elle prend appui sur celle-ci, l'interrompt brièvement et se projette en arrière sur une distance équivalente à sa portée d'attaque max.","cd":"12/11/10/9/8","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"En territoire ennemi","description":"Quinn et Valor s'unissent pour voler à grande vitesse.  Mettre fin à la compétence lance Volée fatale, qui inflige des dégâts aux ennemis proches et marque les champions avec Busard.","cd":"3","cout":"50/25/0","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Rakan","nom":"Rakan","titre":"Charmeur","blurb":"Aussi lunatique qu'il est charmeur, Rakan est un trublion vastaya tristement célèbre, et le plus grand danseur guerrier de l'histoire de la tribu Lhotla. Pour les humains qui vivent dans les hautes terres d'Ionia, son nom est depuis longtemps synonyme de festivals endiablés, de fêtes déraisonnables et de musique anarchique. Peu de gens savent cependant que cet histrion ambulant est également le partenaire de Xayah, la rebelle, dont il défend avec ferveur la cause.","tags":["Support"],"info":{"attack":2,"defense":4,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Plumes enchantées","description":"Rakan gagne périodiquement un bouclier."},"competences":[{"nom":"Rémige rayonnante","description":"Rakan tire une plume magique qui inflige des dégâts magiques. Frapper un champion ou un monstre épique permet à Rakan de soigner ses alliés.","cd":"11/10/9/8/7","cout":"45","typeCout":" {{ abilityresourcename }}"},{"nom":"Entrée triomphale","description":"Rakan fonce vers l'endroit ciblé, projetant en l'air les ennemis proches de son point d'arrivée.","cd":"14/13/12/11/10","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Valse guerrière","description":"Rakan s'envole vers un champion allié en lui octroyant un bouclier. La compétence peut être relancée sans coût pendant un court instant.","cd":"0","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Danse ultime","description":"Rakan augmente sa vitesse de déplacement, charme les ennemis touchés et leur inflige des dégâts magiques.","cd":"130/110/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},
