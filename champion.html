{"id":"Ezreal","nom":"Ezreal","titre":"Explorateur prodigue","blurb":"Aventurier audacieux, doué sans le savoir pour les arts magiques, Ezreal poursuit ses expéditions dans les catacombes oubliées, se bat avec d'antiques malédictions et contourne avec aisance les obstacles les plus impossibles. Son courage et son panache sont sans borne, et il préfère improviser son salut dans les situations critiques, avec pour armes principales sa vivacité d'esprit et son gantelet mystique shurimien, qu'il utilise pour déchaîner de puissants projectiles arcaniques. Une chose est sûre : quand Ezreal est dans les parages, les problèmes ne sont pas loin. Et ils sont partout. Absolument partout.","tags":["Marksman","Mage"],"info":{"attack":7,"defense":2,"magic":6,"difficulty":7},"partype":"Mana","passif":{"nom":"Force grandissante","description":"Ezreal augmente sa vitesse d'attaque chaque fois qu'il touche un ennemi avec une compétence (cumulable jusqu'à 5 fois)."},"competences":[{"nom":"Tir mystique","description":"Ezreal tire un trait d'énergie blessant qui, s'il touche un ennemi, réduit légèrement tous les délais de récupération d'Ezreal.","cd":"5.5/5.25/5/4.75/4.5","cout":"28/31/34/37/40","typeCout":" {{ abilityresourcename }}"},{"nom":"Flux essentiel","description":"Ezreal tire un orbe qui se colle au premier champion ou objectif touché. Si Ezreal frappe un ennemi affecté par un orbe, ce dernier explose et inflige des dégâts.","cd":"8","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Transfert arcanique","description":"Ezreal se téléporte dans une zone ciblée et tire un projectile autoguidé qui frappe l'ennemi le plus proche. Le tir vise en priorité les ennemis affectés par Flux essentiel.","cd":"26/23/20/17/14","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Arc térébrant","description":"Ezreal se concentre avant de tirer une puissante vague d'énergie qui inflige d'importants dégâts à chaque unité traversée (les dégâts sont réduits pour les sbires et les monstres non épiques).","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Fiddlesticks","nom":"Fiddlesticks","titre":"Effroi nocturne","blurb":"Quelque chose s'est éveillé à Runeterra. Quelque chose d'ancien. Quelque chose de terrible. L'horreur intemporelle connue sous le nom de Fiddlesticks arpente les frontières des civilisations mortelles, attirée dans les régions en proie à la paranoïa, où elle se repaît de ses victimes terrorisées. Armée d'une faux ébréchée, la créature décharnée moissonne la peur elle-même et fait voler en éclats l'esprit de ceux qui ont eu la malchance de lui survivre. Prenez garde aux cris des corbeaux et aux chuchotements de la silhouette qui vous \\u003ci\\u003eparaît\\u003c/i\\u003e humaine... car Fiddlesticks est de retour.","tags":["Mage","Support"],"info":{"attack":2,"defense":3,"magic":9,"difficulty":9},"partype":"Mana","passif":{"nom":"Épouvantable épouvantail","description":"La relique de Fiddlesticks est remplacée par des Effigies d'épouvantail."},"competences":[{"nom":"Terreur","description":"Si Fiddlesticks blesse un ennemi avec un sort en n'étant pas visible ou s'il cible un ennemi avec la propriété active de Terreur, il terrifie cet ennemi et le fait fuir aussi longtemps que dure l'effet.","cd":"15/14.5/14/13.5/13","cout":"65","typeCout":" {{ abilityresourcename }}"},{"nom":"Moisson fructueuse","description":"Fiddlesticks draine l'essence vitale des ennemis proches, infligeant des dégâts d'exécution supplémentaires à la fin de l'effet.","cd":"10/9.5/9/8.5/8","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Fauchaison","description":"Fiddlesticks donne un coup de faux dans une zone, ralentissant tous les ennemis touchés et réduisant au silence ceux touchés au centre de la zone.","cd":"10/9/8/7/6","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Rafale de corbeaux","description":"Une nuée de corbeaux tourbillonne sauvagement autour de Fiddlesticks, infligeant des dégâts par seconde à toutes les unités ennemies dans la zone.","cd":"140/110/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Fiora","nom":"Fiora","titre":"Sublime bretteuse","blurb":"Fiora est la duelliste la plus redoutée de Valoran : elle est connue pour ses manières brusques et sa vivacité d'esprit autant que pour la rapidité de sa rapière d'acier bleu. Née au sein de la Maison Laurent du royaume de Demacia, Fiora a pris le contrôle de la famille à son père dans les remous d'un scandale qui faillit la détruire. La réputation de la Maison Laurent a été ternie, mais Fiora investit toute son énergie à restaurer l'honneur de sa famille pour qu'elle reprenne sa place légitime parmi les grands de Demacia.","tags":["Fighter","Assassin"],"info":{"attack":10,"defense":4,"magic":2,"difficulty":3},"partype":"Mana","passif":{"nom":"Danse de la duelliste","description":"Fiora a révélé un des <keywordMajor>points faibles</keywordMajor> de ce champion. Si elle frappe ce <keywordMajor>point faible</keywordMajor>, elle <healing>récupère des PV</healing> et gagne de la <speed>vitesse de déplacement</speed>."},"competences":[{"nom":"Fente","description":"Fiora se fend dans une direction et frappe un ennemi proche, infligeant des dégâts physiques et appliquant ses effets à l'impact.","cd":"13/11.25/9.5/7.75/6","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Riposte","description":"Fiora pare tous les dégâts et toutes les entraves qui la ciblent pendant un court instant, après quoi elle donne un coup d'estoc dans une direction. Ce coup d'estoc ralentit le premier champion ennemi touché. Si Fiora a paré un effet immobilisant, elle étourdit le premier champion ennemi touché.","cd":"24/22/20/18/16","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Botte secrète","description":"Fiora augmente sa vitesse d'attaque pour ses deux prochaines attaques. La première attaque ralentit la cible et la seconde inflige un coup critique.","cd":"11/10/9/8/7","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Défi suprême","description":"Fiora révèle les quatre points faibles d'un champion ennemi et augmente sa vitesse de déplacement à proximité de ce champion. Si Fiora frappe les quatre points faibles ou si l'adversaire meurt après qu'elle en a frappé au moins un, Fiora et ses alliés dans la zone sont soignés pendant quelques secondes.","cd":"110/90/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Fizz","nom":"Fizz","titre":"Filou des mers","blurb":"Fizz est un yordle amphibie qui vit dans les récifs qui entourent Bilgewater. Il essaie souvent de récupérer et de rendre les tributs que lancent dans l'océan les capitaines superstitieux, mais même le plus dessalé des marins n'est pas assez arrogant pour essayer de le tromper. On raconte bien des histoires sur ceux qui ont sous-estimé son humeur changeante... Souvent confondu avec un esprit océanique capricieux, il semble capable de commander aux créatures des profondeurs et n'aime rien tant que confondre alliés comme ennemis.","tags":["Assassin","Fighter"],"info":{"attack":6,"defense":4,"magic":7,"difficulty":6},"partype":"Mana","passif":{"nom":"Combattant agile","description":"Fizz peut traverser les unités et profite d'un montant fixe de réduction des dégâts contre toutes les sources de dégâts."},"competences":[{"nom":"Frappe de l'oursin","description":"Fizz traverse sa cible, infligeant des dégâts magiques et des effets à l'impact.","cd":"8/7.5/7/6.5/6","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Trident marin","description":"Les attaques de Fizz font saigner ses ennemis, infligeant des dégâts magiques en plusieurs secondes. Fizz peut renforcer sa prochaine attaque pour infliger des dégâts supplémentaires, et renforcer ses attaques suivantes pour une courte durée.","cd":"7/6/5/4/3","cout":"30/40/50/60/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Joueur/Filou","description":"Fizz saute et retombe avec grâce sur sa lance, devenant impossible à cibler. Depuis cette position, Fizz peut soit frapper le sol, soit sauter à nouveau avant de retomber.","cd":"16/14/12/10/8","cout":"75/80/85/90/95","typeCout":" {{ abilityresourcename }}"},{"nom":"Pêche au gros","description":"Fizz lance un poisson qui s'accroche à tout champion qui le touche, ralentissant la cible. Après un court instant, un requin surgit du sol, projetant la cible dans les airs et repoussant les ennemis proches. Tous les ennemis touchés subissent des dégâts magiques et sont ralentis.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Galio","nom":"Galio","titre":"Colosse","blurb":"Près de la cité étincelante de Demacia, le colosse de pierre Galio monte une garde attentive. Érigé comme un rempart contre les mages ennemis, il reste souvent immobile pendant des décennies, jusqu'à ce que l'apparition de puissants flux magiques le ramène à la vie. Une fois éveillé, Galio profite de chaque seconde d'existence ; il s'enivre des frissons du combat et de l'honneur trop rare de défendre ses compatriotes. Mais ses triomphes ont toujours un arrière-goût amer, car la magie qu'il éradique est également la sève qui le fait vivre, et chaque victoire le renvoie au sommeil.","tags":["Tank","Mage"],"info":{"attack":1,"defense":10,"magic":6,"difficulty":5},"partype":"Mana","passif":{"nom":"Frappe colossale","description":"Toutes les quelques secondes, la prochaine attaque de base de Galio inflige des dégâts magiques supplémentaires dans une zone."},"competences":[{"nom":"Vents de guerre","description":"Galio tire deux rafales de vent qui convergent pour créer une grande tornade infligeant des dégâts sur la durée.","cd":"11/10/9/8/7","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Bouclier de Durand","description":"Galio canalise une posture défensive, ce qui ralentit ses déplacements. Au relâchement de la canalisation, Galio provoque et blesse les ennemis proches.","cd":"18/17/16/15/14","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Horion de la justice","description":"Galio fait un pas en arrière et charge, projetant en l'air le premier champion ennemi qu'il touche.","cd":"11/10/9/8/7","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Entrée héroïque","description":"Galio désigne la position d'un allié comme zone d'atterrissage, octroyant un bouclier anti-dégâts magiques à tous les alliés dans la zone. Après un délai, Galio s'abat sur cet emplacement, projetant en l'air les ennemis proches.","cd":"180/160/140","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Gangplank","nom":"Gangplank","titre":"Fléau des mers","blurb":"Aussi imprévisible que brutal, le roi des pillards déchu connu sous le nom de Gangplank est partout redouté. Il régnait autrefois sur la ville portuaire de Bilgewater et, bien que ce temps soit révolu, certains pensent que cela l'a rendu plus dangereux encore. Gangplank préférerait engloutir une fois de plus Bilgewater dans le sang plutôt que de laisser quelqu'un d'autre s'en emparer. Il possède aujourd'hui assez de pistolets, de sabres et de barils de poudre pour prétendre récupérer ce qu'il a perdu.","tags":["Fighter"],"info":{"attack":7,"defense":6,"magic":4,"difficulty":9},"partype":"Mana","passif":{"nom":"Épreuve du feu","description":"Toutes les quelques secondes, les attaques de base de Gangplank mettent le feu à sa cible."},"competences":[{"nom":"Pourparlers","description":"Gangplank tire sur une cible. Il gagne des PO supplémentaires si le tir tue la cible.","cd":"4.5","cout":"50/45/40/35/30","typeCout":" {{ abilityresourcename }}"},{"nom":"Guérison du scorbut","description":"Gangplank mange des agrumes pour dissiper les effets de contrôle de foule qui l'affectent et récupérer des PV.","cd":"22/20/18/16/14","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Baril de poudre","description":"Gangplank place un baril de poudre à l'endroit ciblé. S'il l'attaque, le baril explose, étendant les dégâts de l'attaque dans la zone et ralentissant les ennemis.","cd":"0","cout":"0","typeCout":"Pas de coût"},{"nom":"Tir de barrage","description":"Gangplank demande à son navire de bombarder une zone, ralentissant et blessant les ennemis.","cd":"160/140/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Garen","nom":"Garen","titre":"Force de Demacia","blurb":"Garen est un guerrier fier et noble qui fait partie du Détachement hardi. Héritier des Crownguard, la famille chargée de défendre Demacia et ses idéaux, il est apprécié par ses compatriotes et respecté par ses ennemis. Équipé d'une armure résistante à la magie et d'une épée large, Garen affronte sans faillir les mages et les sorciers dans un véritable tourbillon d'acier.","tags":["Fighter","Tank"],"info":{"attack":7,"defense":7,"magic":1,"difficulty":5},"partype":"Aucune","passif":{"nom":"Persévérance","description":"Si Garen n'a pas subi de dégâts ou de compétences ennemies récemment, il régénère un pourcentage de ses PV totaux chaque seconde."},"competences":[{"nom":"Coup décisif","description":"Garen reçoit un bonus en vitesse de déplacement et purge tous les ralentissements qui l'affectent. Sa prochaine attaque frappe un point vital de son adversaire, infligeant des dégâts supplémentaires et le réduisant au silence.","cd":"8","cout":"0","typeCout":"Pas de coût"},{"nom":"Courage","description":"Garen augmente passivement son armure et sa résistance magique quand il tue des ennemis. Il peut également activer cette compétence pour recevoir un bouclier et augmenter grandement sa Ténacité pendant un bref instant, avant de profiter d'un montant moindre de réduction des dégâts pendant une durée plus longue.","cd":"22/19.5/17/14.5/12","cout":"0","typeCout":"Pas de coût"},{"nom":"Jugement","description":"Garen donne des coups d'épée tourbillonnants, infligeant des dégâts physiques aux ennemis proches.","cd":"9/8.25/7.5/6.75/6","cout":"0","typeCout":"Pas de coût"},{"nom":"Justice de Demacia","description":"Garen en appelle à la puissance de Demacia pour tenter d'exécuter un champion ennemi.","cd":"120/100/80","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Gnar","nom":"Gnar","titre":"Chaînon manquant","blurb":"Gnar est un yordle primitif dont les manières joyeuses peuvent soudain faire place à une colère irrationnelle. Il se transforme alors en une bête colossale portée à la destruction. Gelé dans de la glace pure pendant des millénaires, la curieuse créature s'est libérée de sa prison. Aujourd'hui, il parcourt avec enthousiasme un monde qu'il trouve exotique et merveilleux. Enchanté par le danger, Gnar lance à ses ennemis tout ce qu'il trouve, qu'il s'agisse de son boomerang en croc ou d'un bâtiment proche.","tags":["Fighter","Tank"],"info":{"attack":6,"defense":5,"magic":5,"difficulty":8},"partype":"Rage","passif":{"nom":"Rage génique","description":"Gnar génère de la Rage quand il combat. Une fois sa jauge de Rage remplie, sa prochaine compétence le transforme en Méga Gnar, ce qui améliore ses défenses et lui octroie de nouvelles compétences."},"competences":[{"nom":"Jet de boomerang/Jet de rocher","description":"Gnar lance un boomerang qui blesse et ralentit les cibles touchées avant de retourner vers lui. S'il rattrape le boomerang, le délai de récupération est réduit.<br><br>Méga Gnar lance un rocher qui s'arrête à la première unité touchée, blessant et ralentissant tous les ennemis proches. Gnar peut ensuite ramasser le rocher pour réduire le délai de récupération.","cd":"16/14.5/13/11.5/10","cout":"0","typeCout":"Pas de coût"},{"nom":"Agitation/Beigne","description":"Gnar est agité à force d'attaquer et d'utiliser des compétences, ce qui lui permet d'infliger des dégâts supplémentaires et d'augmenter sa vitesse de déplacement.<br><br>Méga Gnar est enragé : il se dresse sur ses pattes arrière et frappe devant lui, étourdissant les ennemis dans la zone.","cd":"7","cout":"0","typeCout":"Pas de coût"},{"nom":"Rebond/Aplatissement","description":"Gnar bondit dans la direction ciblée et rebondit sur la tête de toute unité sur laquelle il atterrit, ce qui lui permet d'aller plus loin.<br><br>Méga Gnar est trop gros pour rebondir : il atterrit de façon fracassante et inflige des dégâts de zone.","cd":"22/19.5/17/14.5/12","cout":"0","typeCout":"Pas de coût"},{"nom":"GNAR !","description":"Méga Gnar projette tous les ennemis proches dans la direction ciblée, leur infligeant des dégâts et les ralentissant. Si un ennemi percute un mur, il est étourdi et il subit des dégâts supplémentaires.","cd":"90/60/30","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Gragas","nom":"Gragas","titre":"Agitateur","blurb":"Aussi imposant que jovial, Gragas est un brasseur à l'impressionnante carrure qui cherche toujours de nouveaux moyens de répandre la bonne humeur. Venu d'on ne sait où, il continue de chercher des ingrédients dans les terres vierges de Freljord pour perfectionner sa dernière concoction. Impulsif et cabochard, il est connu pour ses rixes, qui finissent souvent en fêtes nocturnes préjudiciables au mobilier urbain. Toute apparition de Gragas annonce bamboche et destruction. Dans cet ordre.","tags":["Fighter","Mage"],"info":{"attack":4,"defense":7,"magic":6,"difficulty":5},"partype":"Mana","passif":{"nom":"Tournée","description":"Gragas récupère des PV quand il utilise une compétence."},"competences":[{"nom":"Fût roulant","description":"Gragas fait rouler son fût vers une zone ciblée ; le fût explose automatiquement au bout de 4 sec (vous pouvez activer l'explosion manuellement). La puissance de l'explosion augmente sur la durée. La vitesse de déplacement des ennemis touchés est réduite.","cd":"10/9/8/7/6","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Rage d'ivrogne","description":"Gragas boit pendant 1 sec. Il devient alors turbulent et querelleur, ce qui lui permet d'infliger des dégâts magiques à tous les ennemis proches avec sa prochaine attaque de base et de subir moins de dégâts.","cd":"5","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Coup de bidon","description":"Gragas charge vers une zone ciblée et percute le premier ennemi rencontré, infligeant des dégâts à tous les ennemis proches et les étourdissant.","cd":"14/13.5/13/12.5/12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Fût explosif","description":"Gragas lance son fût, infligeant des dégâts et repoussant les ennemis touchés par l'explosion.","cd":"100/85/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Graves","nom":"Graves","titre":"Hors-la-loi","blurb":"Malcolm Graves est un mercenaire, un parieur et un voleur recherché dans toutes les cités et tous les empires par lesquels il est passé. Malgré son tempérament explosif, il a un sens de l'honneur indéniable qu'il applique souvent avec son fusil à double canon, Destinée. Ces dernières années, il s'est réconcilié avec Twisted Fate. Leur partenariat rétabli, ils prospèrent à nouveau dans les allées sombres de Bilgewater.","tags":["Marksman"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":3},"partype":"Mana","passif":{"nom":"Nouvelle destinée","description":"Le fusil de Graves dispose de propriétés uniques. Graves doit recharger quand il n'a plus de munitions. Chaque attaque tire 4 balles qui ne traversent pas les unités. Les unités touchées par plusieurs balles sont repoussées (sauf les champions)."},"competences":[{"nom":"Terminus","description":"Graves tire un projectile qui explose au bout de 1 sec, ou quand il entre en contact avec un obstacle.","cd":"13/11.25/9.5/7.75/6","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Écran de fumée","description":"Graves tire une grenade fumigène qui produit un nuage de fumée réduisant le champ de vision. Les ennemis touchés par l'impact initial subissent des dégâts magiques et sont brièvement ralentis.","cd":"26/24/22/20/18","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Ruée vers l'or","description":"Graves charge devant lui et profite d'un bonus en armure et en résistance magique pendant quelques secondes. Si Graves fonce vers un champion ennemi, il gagne deux effets Nerfs d'acier au lieu d'un. Lorsqu'il touche des ennemis avec ses attaques de base, le délai de récupération de cette compétence est réduit et le bonus est actualisé.","cd":"16/15/14/13/12","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Dégâts collatéraux","description":"Graves tire un obus explosif qui inflige de lourds dégâts au premier champion touché. Lorsque l'obus touche un champion ou arrive au bout de sa course, il explose et inflige des dégâts dans une zone en forme de cône.","cd":"100/80/60","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Gwen","nom":"Gwen","titre":"Couturière sacrée","blurb":"Ancienne poupée à qui la magie a conféré la vie, Gwen est armée des outils qui l'ont créée. Elle emporte à chaque pas l'amour de sa créatrice et ne tient jamais rien pour acquis. Elle commande à la Brume sacrée, une ancienne magie de protection qui a béni ses ciseaux, ses aiguilles et son fil à coudre. Tout est nouveau pour Gwen, mais elle reste déterminée à combattre dans la joie pour préserver le bien qui survit dans un monde en déréliction.","tags":["Fighter"],"info":{"attack":7,"defense":4,"magic":5,"difficulty":5},"partype":"Mana","passif":{"nom":"Mille coupures","description":"Les attaques de Gwen infligent des dégâts magiques supplémentaires selon les PV de la cible. Gwen récupère des PV équivalents à une partie des dégâts que cet effet inflige aux champions. "},"competences":[{"nom":"Tchac, tchac !","description":"Gwen coupe jusqu'à 6 fois avec ses ciseaux, infligeant des dégâts magiques dans une zone conique. Gwen inflige des dégâts bruts aux unités au centre de la zone et applique sa compétence passive sur eux à chaque coup de ciseaux.","cd":"6.5/5.75/5/4.25/3.5","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Brume sacrée","description":"Gwen invoque une brume qui la protège des ennemis hors de la zone. Elle ne peut être ciblée que par les ennemis qui entrent dans la brume.","cd":"22/21/20/19/18","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Élan incisif","description":"Gwen effectue une courte ruée, puis gagne de la vitesse d'attaque, de la portée d'attaque et des dégâts magiques <OnHit>à l'impact</OnHit> pendant quelques secondes. Si elle frappe un ennemi pendant cette durée, le délai de récupération de cette compétence est réduit. ","cd":"13/12.5/12/11.5/11","cout":"35","typeCout":" {{ abilityresourcename }}"},{"nom":"Piqûre","description":"Gwen lance une aiguille qui ralentit les ennemis touchés, inflige des dégâts magiques et applique Mille coupures sur les champions touchés. <br><br>Cette compétence peut être activée jusqu'à deux fois de plus. Chaque activation lance des aiguilles supplémentaires et inflige plus de dégâts. ","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Hecarim","nom":"Hecarim","titre":"Ombre de la guerre","blurb":"Fusion spectrale de l'homme et de la bête, Hecarim est condamné à pourchasser les âmes des vivants pour l'éternité. Lorsque les ombres ont envahi les Îles bénies, ce fier chevalier et sa horde de cavaliers ont été anéantis par les énergies destructrices de la Ruine. À présent, quand la Brume noire s'étend sur Runeterra, il mène la charge et se plaît à massacrer et écraser ses ennemis sous ses lourds sabots.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":6,"magic":4,"difficulty":6},"partype":"Mana","passif":{"nom":"Galop","description":"Les dégâts d'attaque d'Hecarim augmentent d'un montant égal à un pourcentage de sa vitesse de déplacement bonus."},"competences":[{"nom":"Carnage","description":"Hecarim tranche les ennemis proches et leur inflige des dégâts physiques. Si Hecarim blesse au moins un ennemi, il augmente les dégâts et réduit le délai de récupération des Carnages suivants.","cd":"4","cout":"28/26/24/22/20","typeCout":" {{ abilityresourcename }}"},{"nom":"Essence de la peur","description":"Hecarim gagne de l'armure et de la résistance magique. Hecarim inflige des dégâts magiques aux ennemis proches. Il regagne un nombre de PV équivalent à un pourcentage de tous les dégâts subis par ces ennemis.","cd":"14","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Charge dévastatrice","description":"La vitesse de déplacement d'Hecarim augmente et il peut traverser les unités pendant un court instant. Sa prochaine attaque repousse la cible et inflige des dégâts physiques supplémentaires en fonction de la distance parcourue depuis l'activation de la compétence.","cd":"20/19/18/17/16","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Légion des ombres","description":"Hecarim invoque des cavaliers fantomatiques et charge devant lui, infligeant des dégâts magiques sur une ligne. À la fin de sa charge, Hecarim crée une onde de choc qui effraie les ennemis proches.","cd":"140/120/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Heimerdinger","nom":"Heimerdinger","titre":"Inventeur réputé","blurb":"L'excentrique professeur Cecil B. Heimerdinger est considéré comme l'un des inventeurs les plus innovants qu'ait connus le monde. En tant que plus ancien membre actif du Conseil de Piltover, il a été témoin du meilleur comme du pire que le désir de progrès incessant de la ville a pu produire. Néanmoins, ce brillant scientifique et enseignant restera toujours déterminé à utiliser ses dispositifs atypiques pour améliorer la vie d'autrui.","tags":["Mage","Support"],"info":{"attack":2,"defense":6,"magic":8,"difficulty":8},"partype":"Mana","passif":{"nom":"Affinité Hextech","description":"Gagne de la vitesse de déplacement à proximité des tourelles alliées et des tourelles déployées par Heimerdinger."},"competences":[{"nom":"Tourelle H-28G Évolution","description":"Heimerdinger déploie une tourelle équipée d'un laser secondaire perforant (elle inflige 50% de dégâts aux tourelles ennemies).","cd":"1","cout":"20","typeCout":" kit de tourelle et {{ cost }} pts de mana"},{"nom":"Micro-roquettes Hextech","description":"Heimerdinger lance des roquettes à longue portée qui convergent vers son curseur.","cd":"11/10/9/8/7","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Grenade électro-tempête CH-2","description":"Heimerdinger lance une grenade vers l'endroit ciblé, infligeant des dégâts aux unités ennemies. Cela étourdit aussi les unités touchées directement et ralentit les unités proches.","cd":"11","cout":"85","typeCout":" {{ abilityresourcename }}"},{"nom":"AMÉLIORATION !","description":"Heimerdinger invente une amélioration, ce qui permet à son prochain sort d'avoir des effets augmentés.","cd":"100/85/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Hwei","nom":"Hwei","titre":"Visionnaire","blurb":"Hwei est un peintre dont les œuvres sont aussi flamboyantes que son humeur est morose. Il utilise son art pour faire face aux criminels d'Ionia et apporter du réconfort à leurs victimes. Sous sa mélancolie se débat un esprit déchiré et émotif, hanté à la fois par les splendides visions de son imagination et par les souvenirs horribles de son temple détruit. Hwei cherche à comprendre cette lumière et ces ténèbres, ce qui le met inévitablement sur la piste de l'artiste à l'origine de ce conflit. Avec son pinceau et sa palette, Hwei donne forme à d'infinies possibilités tandis qu'il s'approche d'une réponse à ses questions, ou du plus complet désespoir.","tags":["Mage","Support"],"info":{"attack":7,"defense":1,"magic":8,"difficulty":9},"partype":"Mana","passif":{"nom":"Signature du Visionnaire","description":"Hwei prépare les champions ennemis qu'il blesse à l'aide de ses compétences pour sa touche finale : sa signature.<br><br>Toucher un ennemi avec une deuxième compétence blessante termine sa signature, qui apparaît sous l'ennemi. La signature explose après un court délai, infligeant des dégâts magiques à tous les ennemis à portée."},"competences":[{"nom":"Sujet : Désastres","description":"Hwei imagine une série de désastres, ce qui lui permet de peindre des coups dévastateurs.<br><br>Désastres remplace les compétences de Hwei par des compétences blessantes : Feu dévastateur, Éclair enflammé et Champ de lave.","cd":"10/9/8/7/6","cout":"80/90/100/110/120","typeCout":" {{ abilityresourcename }}"},{"nom":"Sujet : Sérénités","description":"Hwei imagine une série de sérénités, ce qui lui permet de peindre des paysages revigorants.<br><br>Sérénités remplace les compétences de Hwei par des compétences utilitaires : Ruisseau, Étang et Nuit étoilée.","cd":"18/17.5/17/16.5/16","cout":"90/95/100/105/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Sujet : Tourments","description":"Hwei imagine une série de tourments, ce qui lui permet de peindre des visages manipulateurs.<br><br>Tourments remplace les compétences de Hwei par des contrôles de foule : Visage effroyable, Œil des abysses et Mâchoires chatoyantes.","cd":"12/11.5/11/10.5/10","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Vision de désespoir","description":"Hwei peint une vision de pur désespoir. Le premier champion ennemi touché devient le centre d'une peinture grandissante, qui ralentit et blesse les ennemis proches. Cette vision explose lorsqu'elle atteint sa limite de taille, ou lorsque le champion affecté meurt.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Illaoi","nom":"Illaoi","titre":"Prêtresse du kraken","blurb":"La stature colossale d'Illaoi n'a d'égale que sa foi implacable. Prophétesse du Grand Kraken, elle se sert d'une énorme idole dorée pour arracher les esprits de ses ennemis et faire voler en éclats leur perception de la réalité. Ceux qui défient « l'Apôtre de la vérité de Nagakabouros » découvrent bien vite qu'Illaoi ne combat jamais seule, car le dieu des Îles aux serpents lui prête main-forte.","tags":["Fighter","Tank"],"info":{"attack":8,"defense":6,"magic":3,"difficulty":4},"partype":"Mana","passif":{"nom":"Prophétesse d'un dieu ancestral","description":"Illaoi et les <font color='#669900'>réceptacles</font> qu'elle crée font apparaître des tentacules sur les éléments de décor infranchissables à proximité. Les tentacules frappent les esprits, les <font color='#669900'>réceptacles</font> et les victimes de l'Âpre leçon d'Illaoi. Les tentacules infligent des dégâts physiques aux ennemis touchés, et ils soignent Illaoi s'ils blessent un champion."},"competences":[{"nom":"Coup de tentacule","description":"Augmente les dégâts infligés par les tentacules. À l'activation, Illaoi fait s'abattre un tentacule qui inflige des dégâts physiques.","cd":"10/9/8/7/6","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Âpre leçon","description":"Illaoi bondit sur sa cible, infligeant des dégâts physiques et poussant tous les tentacules proches à frapper la cible.","cd":"4","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Épreuve de l'esprit","description":"Illaoi arrache l'esprit d'un ennemi et l'attire jusqu'à elle. L'esprit transmet un pourcentage des dégâts qu'il subit à la cible originale. S'il est détruit ou si la cible s'éloigne trop de son esprit, la cible devient un <font color='#669900'>réceptacle</font> et commence à faire apparaître des tentacules.","cd":"16/15/14/13/12","cout":"35/40/45/50/55","typeCout":" {{ abilityresourcename }}"},{"nom":"Acte de foi","description":"Illaoi écrase son idole au sol, infligeant des dégâts physiques aux ennemis proches. Un tentacule apparaît pour chaque champion ennemi touché.","cd":"120/95/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Irelia","nom":"Irelia","titre":"Danseuse des lames","blurb":"Des nombreux héros qui naquirent de l'occupation noxienne, aucun n'est plus étonnant que la jeune Irelia de Navori. Formée aux danses ancestrales de sa province, elle adapta son art pour la guerre, se servant de ses mouvements gracieux et précis pour faire léviter une multitude de lames acérées. Après avoir prouvé ses talents de guerrière, elle devint le chef et le symbole de la Résistance ; à ce jour, sa tâche est toujours de défendre son pays.","tags":["Fighter","Assassin"],"info":{"attack":7,"defense":4,"magic":5,"difficulty":5},"partype":"Mana","passif":{"nom":"Ferveur ionienne","description":"Quand Irelia frappe des ennemis avec ses compétences, elle gagne un bonus de vitesse d'attaque cumulable. Au maximum d'effets cumulés, elle gagne aussi des dégâts à l'impact supplémentaires."},"competences":[{"nom":"Rush fatal","description":"Irelia fonce vers l'avant pour frapper sa cible tout en récupérant des PV. Si la cible était marquée ou si elle est tuée par Rush fatal, le délai de récupération de la compétence est annulé.","cd":"10/9/8/7/6","cout":"15","typeCout":" {{ abilityresourcename }}"},{"nom":"Danse de défi","description":"Irelia charge une attaque. Plus la charge dure longtemps, plus les dégâts augmentent. Irelia subit moins de dégâts physiques pendant la charge.","cd":"20/18/16/14/12","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Duo parfait","description":"Irelia envoie deux lames qui volent ensuite l'une vers l'autre. Les ennemis pris entre les lames sont blessés, étourdis et marqués.","cd":"16/14.5/13/11.5/10","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Pointe de l'avant-garde","description":"Irelia tire un grand nombre de lames qui se dispersent en touchant un champion ennemi. Les ennemis touchés par les lames sont blessés et marqués. Les lames forment ensuite un mur qui blesse et ralentit les ennemis qui le traversent.","cd":"125/105/85","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Ivern","nom":"Ivern","titre":"Aîné de la forêt","blurb":"Ivern Roncepied, que beaucoup connaissent sous le nom d'Aîné de la forêt, est un être étrange mi-homme mi-arbre, qui arpente les forêts de Runeterra en cultivant la vie partout où il va. Il connaît les secrets du monde naturel et entretient une profonde amitié avec tout ce qui rampe, vole et pousse. Ivern erre dans la nature sauvage, partageant sa sagesse avec tous ceux qu'il rencontre, enrichissant les forêts et confiant parfois (à tort !) certains de ses secrets aux papillons.","tags":["Support","Mage"],"info":{"attack":3,"defense":5,"magic":7,"difficulty":7},"partype":"Mana","passif":{"nom":"Ami de la forêt","description":"Ivern ne peut pas attaquer ou être attaqué par les monstres non épiques. Ivern peut créer des bosquets magiques qui se développent progressivement sur les camps de monstres. Quand le bosquet est pleinement développé, Ivern peut libérer les monstres pour recevoir des PO et de l'expérience."},"competences":[{"nom":"Enracinement","description":"Ivern projette une racine, infligeant des dégâts et immobilisant les cibles ennemies touchées. Les alliés d'Ivern peuvent foncer vers la cible immobilisée.","cd":"14/13/12/11/10","cout":"60","typeCout":" {{ abilityresourcename }}"},{"nom":"Main verte","description":"Dans les hautes herbes, les attaques d'Ivern et de ses alliés proches infligent des dégâts magiques supplémentaires. Ivern peut activer cette compétence pour créer une parcelle d'herbes hautes.","cd":"0.5","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Graine à retardement","description":"Ivern offre à un allié un bouclier qui explose après un court instant, ralentissant et blessant les ennemis. Le bouclier se réinitialise s'il ne touche aucun ennemi.","cd":"11/10/9/8/7","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Marguerite !","description":"Ivern invoque son amie Marguerite, une sentinelle, pour qu'elle combatte à ses côtés. Relancez la compétence pour ordonner à Marguerite d'attaquer ou de se déplacer.","cd":"140/130/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Janna","nom":"Janna","titre":"Avatar de l'air","blurb":"Armée de la puissance des grands vents de Runeterra, Janna est un mystérieux esprit élémentaire qui protège les parias de Zaun. Certains croient que la vie lui a été donnée par les suppliques des marins de Runeterra cherchant les bons vents des mers calmes, affrontant les courants traîtres ou bravant les typhons. Depuis, on implore sa protection jusque dans les profondeurs de Zaun, où Janna est devenue un fanal d'espoir pour ceux qui sont dans le besoin. Nul ne sait quand et où elle apparaîtra, mais ceux qui espèrent son aide sont rarement déçus.","tags":["Support","Mage"],"info":{"attack":3,"defense":5,"magic":7,"difficulty":7},"partype":"Mana","passif":{"nom":"Zéphyr","description":"Les alliés de Janna gagnent de la vitesse de déplacement quand ils se dirigent vers elle.<br><br>Les dégâts à l'impact de Janna et Alizé infligent des dégâts magiques supplémentaires équivalents à une partie de sa vitesse de déplacement bonus."},"competences":[{"nom":"Vent hurlant","description":"En modifiant localement la pression et la température, Janna peut créer une petite tornade qui croît en taille avec le temps. Elle peut activer une nouvelle fois le sort pour libérer la tornade. Elle fonce alors dans la direction de l'invocation, projetant en l'air les ennemis sur son passage et leur infligeant des dégâts.","cd":"14","cout":"90/95/100/105/110","typeCout":" {{ abilityresourcename }}"},{"nom":"Alizé","description":"Janna invoque un élémentaire d'air qui, passivement, augmente sa vitesse de déplacement et lui permet de traverser les unités. Elle peut aussi activer cette compétence pour infliger des dégâts et réduire la vitesse de déplacement d'un ennemi.","cd":"8/7.5/7/6.5/6","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Œil du cyclone","description":"Janna invoque une tempête défensive qui protège un champion allié ou une tourelle alliée contre les dégâts et qui augmente ses dégâts d'attaque.","cd":"16/15/14/13/12","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Mousson","description":"Janna s'entoure d'une puissante tempête magique, repoussant au loin les ennemis. Quand la tempête est terminée, les dernières brises soignent les alliés proches tant que la compétence est active.","cd":"130/115/100","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"JarvanIV","nom":"Jarvan IV","titre":"Exemple demacien","blurb":"Le prince Jarvan, héritier de la dynastie des Lightshield, doit un jour monter sur le trône de Demacia. Élevé de manière à incarner les plus hautes vertus de sa nation, il est contraint de trouver un équilibre entre les attentes placées en lui et son désir de combattre sur la ligne de front. Jarvan inspire ses troupes avec son courage, sa détermination et son dévouement. Il porte haut les couleurs de sa famille et révèle chaque jour davantage sa véritable force de prochain souverain.","tags":["Fighter","Tank"],"info":{"attack":6,"defense":8,"magic":3,"difficulty":5},"partype":"Mana","passif":{"nom":"Cadence martiale","description":"La première attaque de base de Jarvan IV sur un ennemi inflige des dégâts physiques supplémentaires selon un pourcentage des PV actuels de la cible. Cet effet ne peut ensuite plus être infligé au même ennemi pendant quelques secondes."},"competences":[{"nom":"Frappe du dragon","description":"Jarvan IV allonge sa lance, infligeant des dégâts physiques et réduisant l'armure des ennemis sur son chemin. En outre, cela peut ramener Jarvan à son Étendard demacien, projetant les ennemis dans les airs au passage.","cd":"10/9/8/7/6","cout":"45/50/55/60/65","typeCout":" {{ abilityresourcename }}"},{"nom":"Égide dorée","description":"Jarvan IV implore les anciens rois de Demacia de le protéger et de ralentir les ennemis proches.","cd":"9","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Étendard demacien","description":"Jarvan IV porte la fierté de Demacia, ce qui lui octroie passivement un bonus en vitesse d'attaque. Activer Étendard demacien permet à Jarvan IV de planter un drapeau demacien, infligeant des dégâts magiques à l'impact et augmentant la vitesse d'attaque des champions alliés proches.","cd":"12/11.5/11/10.5/10","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Cataclysme","description":"Jarvan IV bondit héroïquement sur une cible avec une telle force qu'il transforme la zone autour de lui en une arène. Les ennemis proches sont blessés lors de l'impact.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Jax","nom":"Jax","titre":"Maître d'armes","blurb":"Jax, dont nul ne peut égaler l'art du sarcasme et des armements inhabituels, est connu comme le dernier maître d'armes d'Icathia. Après la chute de sa terre natale, ravagée par le Néant qu'elle avait eu l'orgueil de déchaîner, Jax et ses compagnons jurèrent de protéger le peu qu'il en restait. La magie montant de nouveau dans le monde, la menace se fait plus pressante et Jax parcourt Valoran, porteur des dernières lumières d'Icathia. Il éprouve les qualités de tous les guerriers qu'il rencontre pour voir s'ils sont assez puissants pour combattre à ses côtés...","tags":["Fighter"],"info":{"attack":7,"defense":5,"magic":7,"difficulty":5},"partype":"Mana","passif":{"nom":"Acharnement","description":"Les attaques de base successives de Jax augmentent continuellement sa vitesse d'attaque."},"competences":[{"nom":"Frappe bondissante","description":"Jax bondit sur une unité. S'il s'agit d'un ennemi, il le frappe avec son arme.","cd":"8/7.5/7/6.5/6","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Élargissement","description":"Jax charge son arme en énergie pour infliger des dégâts supplémentaires avec sa prochaine attaque.","cd":"7/6/5/4/3","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Contre-attaque","description":"Jax est capable d'esquiver toutes les attaques pendant un bref instant puis d'étourdir tous les ennemis proches en contre-attaquant.","cd":"17/15/13/11/9","cout":"50/60/70/80/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Maître d'armes","description":"Toutes les trois attaques consécutives, Jax inflige des dégâts magiques supplémentaires. De plus, Jax peut activer cette compétence pour infliger des dégâts autour de lui et renforcer sa détermination, ce qui augmente son armure et sa résistance magique pendant un court instant.","cd":"110/100/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Jayce","nom":"Jayce","titre":"Protecteur du futur","blurb":"Jayce Talis est un inventeur de génie qui, aux côtés de son ami Viktor, a fait les premières grandes découvertes dans le domaine de l'Hextech. Reconnu dans tout Piltover, il s'efforce d'être à la hauteur de sa réputation d'« Homme du progrès », mais les attentes qui lui sont imposées pèsent lourd sur ses épaules. Ce sont elles qui ont permis à Jayce de voir la façon dont son invention a contribué à accentuer la division entre Piltover et Zaun. Armé de son marteau Hextech, il est désormais prêt à défendre le futur.","tags":["Fighter","Marksman"],"info":{"attack":8,"defense":4,"magic":3,"difficulty":7},"partype":"Mana","passif":{"nom":"Capaciteur Hextech","description":"Quand Jayce change d'arme, il gagne un bonus en vitesse de déplacement pendant un court instant."},"competences":[{"nom":"Direction le ciel ! / Orbe électrique","description":"Marteau : bondit sur un ennemi, infligeant des dégâts physiques et ralentissant les ennemis.<br><br>Canon : tire un orbe qui explose en touchant un ennemi ou en arrivant au bout de sa course, infligeant des dégâts physiques à tous les ennemis touchés.","cd":"16/14/12/10/8/6","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Champ électrique / Hypercharge","description":"Marteau - Passive : rend du mana à chaque attaque.<br>Active : crée un champ d'électricité qui blesse les ennemis proches pendant plusieurs secondes.<br><br>Canon : provoque une poussée d'énergie, augmentant la vitesse d'attaque au maximum pour plusieurs attaques.","cd":"10","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Coup foudroyant / Portail d'accélération","description":"Marteau : inflige des dégâts magiques à un ennemi et le repousse sur une courte distance.<br><br>Canon : déploie un Portail d'accélération qui augmente la vitesse de déplacement de tous les champions alliés le traversant. Si Orbe électrique passe le portail, la vitesse, la portée et les dégâts du projectile augmentent.","cd":"20/18/16/14/12/10","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Canon Mercury / Marteau Mercury","description":"Marteau : transforme le Marteau Mercury en Canon Mercury, offrant à Jayce de nouvelles compétences et augmentant sa portée. La première attaque avec le canon réduit l'armure et la résistance magique de l'ennemi.<br>Canon : transforme le Canon Mercury en Marteau Mercury, offrant à Jayce de nouvelles compétences et augmentant ses résistances aux dégâts. La première attaque avec le marteau infligera des dégâts magiques supplémentaires.","cd":"6","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Jhin","nom":"Jhin","titre":"Virtuose","blurb":"Jhin est un psychopathe méticuleux pour qui le meurtre est une forme d'art. Autrefois prisonnier de Ionia, mais libéré par des conspirateurs opérant au sein du conseil dirigeant du pays, ce tueur en série a désormais mis ses talents d'assassin au service de leur complot. Utilisant son pistolet comme un pinceau, Jhin crée des œuvres d'art empreintes de brutalité, aussi terrifiantes pour ses victimes que pour les témoins de ses crimes. Il tire un plaisir sadique de ses performances théâtrales, ce qui en fait un atout de poids quand il s'agit d'envoyer le plus puissant des messages : celui de la terreur.","tags":["Marksman","Mage"],"info":{"attack":10,"defense":2,"magic":6,"difficulty":6},"partype":"Mana","passif":{"nom":"Murmure","description":"Le pistolet de Jhin, Murmure, est un instrument de précision capable d'infliger de lourds dégâts. Sa cadence de tir est fixe et il ne peut tirer que quatre balles avant de devoir être rechargé. Jhin insuffle à la dernière balle un soupçon de magie noire qui lui permet de toujours infliger un coup critique et des dégâts supplémentaires. Quand Murmure inflige un coup critique, Jhin reçoit un bonus en vitesse de déplacement."},"competences":[{"nom":"Grenade dansante","description":"Jhin lance une bombe magique sur un ennemi. Elle peut toucher jusqu'à quatre cibles et ses dégâts augmentent après chaque coup fatal.","cd":"7/6.5/6/5.5/5","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Floraison mortelle","description":"Jhin brandit sa canne et tire une unique balle à très longue portée. Elle transperce les sbires et les monstres, mais s'arrête au premier champion touché. Si la cible avait récemment été blessée par Jhin ou touchée par les alliés de Jhin ou un piège-lotus, elle est immobilisée.","cd":"12","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Public captif","description":"Jhin pose un piège-lotus invisible qui fleurit quand un ennemi marche dessus. Il ralentit les ennemis proches avant de leur infliger des dégâts dans une explosion de pétales lacérants. <br><br><font color='#FFFFFF'>Beauté dans la mort :</font> quand Jhin tue un champion ennemi, un piège-lotus fleurit près de son cadavre.","cd":"2","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Rappel de rideau","description":"Après une canalisation, Jhin transforme Murmure en méga-canon d'épaule. Il peut alors tirer 4 super balles à très longue portée qui transpercent les sbires et les monstres, mais s'arrêtent au premier champion touché. Murmure estropie les ennemis touchés, ce qui les ralentit et leur inflige des dégâts supplémentaires. Le 4e tir est parfaitement calibré et puissant, et il inflige toujours un coup critique.","cd":"120/105/90","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Jinx","nom":"Jinx","titre":"Gâchette folle","blurb":"Criminelle dérangée et impulsive de la basse-ville, Jinx est hantée par les conséquences de son passé. Mais cela ne l'empêche jamais d'apporter sa touche de chaos à Piltover comme à Zaun. Elle utilise son arsenal d'armes bricolées de façon dévastatrice, déclenchant des torrents d'explosions et de tirs colorés, et la pagaille qu'elle laisse derrière elle finit par inciter les laissés-pour-compte à la rébellion et à la résistance.","tags":["Marksman"],"info":{"attack":9,"defense":2,"magic":4,"difficulty":6},"partype":"Mana","passif":{"nom":"Enthousiasme !","description":"Jinx reçoit un énorme bonus en vitesse de déplacement et en vitesse d'attaque quand elle participe à l'élimination/destruction d'un champion, d'un monstre épique de la jungle ou d'un bâtiment."},"competences":[{"nom":"Flip flap !","description":"Jinx modifie ses attaques de base en optant pour Bang-Bang, son minigun, ou Poiscaille, son lance-roquettes. Les attaques avec Bang-Bang augmentent la vitesse d'attaque, tandis que les attaques avec Poiscaille infligent des dégâts de zone et ont une plus grande portée, mais drainent du mana et sont plus lentes.","cd":"0.9","cout":"20","typeCout":" pts de mana par roquette"},{"nom":"Zap !","description":"Jinx utilise Zapper, son pistolet, pour tirer un rayon qui inflige des dégâts au premier ennemi touché, le ralentit et le révèle.","cd":"8/7/6/5/4","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Pyromâcheurs !","description":"Jinx lance des grenades immobilisantes qui explosent au bout de 5 sec et mettent le feu aux ennemis. Les Pyromâcheurs mordent les champions ennemis qui leur marchent dessus, les immobilisant.","cd":"24/20.5/17/13.5/10","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Super roquette de la mort !","description":"Jinx tire une super roquette qui traverse la carte et dont les dégâts augmentent pendant le trajet. La roquette explose au contact d'un champion ennemi, infligeant des dégâts à ce champion et aux ennemis proches en fonction de leurs PV manquants.","cd":"85/65/45","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kaisa","nom":"Kai'Sa","titre":"Fille du Néant","blurb":"Capturée par le Néant alors qu'elle n'était qu'une enfant, Kai'Sa parvint à survivre par la simple force de sa détermination et de sa ténacité. Si ses expériences ont fait d'elle une chasseuse meurtrière, certains voient en elle l'avant-goût d'un avenir qu'ils préféreraient ne pas connaître. Étant entrée en fragile symbiose avec une carapace vivante du Néant, il lui faudra bientôt décider si elle doit pardonner aux mortels qui la considèrent comme un monstre et vaincre la vague grandissante des ténèbres… ou si elle doit fermer les yeux et laisser le Néant consumer le monde qui l'a abandonnée.","tags":["Marksman","Mage"],"info":{"attack":8,"defense":5,"magic":3,"difficulty":6},"partype":"Mana","passif":{"nom":"Seconde peau","description":"Les attaques de base de Kai'Sa appliquent des effets Plasma, infligeant de plus en plus de dégâts magiques supplémentaires. Les effets immobilisants des alliés appliquent aussi des effets Plasma. De plus, les objets achetés par Kai'Sa améliorent ses sorts de base en leur offrant des propriétés plus puissantes."},"competences":[{"nom":"Pluie d'Icathia","description":"Kai'Sa tire une volée de projectiles qui traquent les cibles proches.<br><br>Arme vivante : Pluie d'Icathia est améliorée pour tirer davantage de projectiles.","cd":"10/9/8/7/6","cout":"55","typeCout":" {{ abilityresourcename }}"},{"nom":"Rayon du Néant","description":"Kai'Sa tire un projectile à longue portée, marquant les ennemis avec sa compétence passive.<br><br>Arme vivante : Rayon du Néant est amélioré pour appliquer davantage de marques passives et pour réduire son délai de récupération contre les champions.","cd":"20/18.5/17/15.5/14","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Surpresseur","description":"Kai'Sa augmente brièvement sa vitesse de déplacement, puis augmente sa vitesse d'attaque.<br><br>Arme vivante : Surpresseur est amélioré pour octroyer une brève invisibilité.","cd":"16/14.5/13/11.5/10","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Instinct meurtrier","description":"Kai'Sa effectue une ruée jusqu'à un champion ennemi.","cd":"130/100/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kalista","nom":"Kalista","titre":"Lance de la vengeance","blurb":"Spectre courroucé des Îles obscures, Kalista est l'esprit immortel de la vengeance, un cauchemar en armure que l'on invoque pour pourchasser les traîtres et les menteurs. Les victimes trahies peuvent réclamer vengeance, mais Kalista ne répond qu'à ceux dont elle estime la cause digne de ses talents. Malheur à ceux qui suscitent l'ire de Kalista, car tout pacte qu'elle scelle ne se finit que d'une seule façon : dans les flammes glacées de ses lances spirituelles.","tags":["Marksman"],"info":{"attack":8,"defense":2,"magic":4,"difficulty":7},"partype":"Mana","passif":{"nom":"Maintien martial","description":"Donnez un ordre de déplacement pendant l'animation de l'attaque de base ou de la Perforation de Kalista pour bondir sur une petite distance dans cette direction après avoir lancé l'attaque."},"competences":[{"nom":"Perforation","description":"Kalista projette une lance rapide qui traverse les ennemis ainsi tués.","cd":"9","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Sentinelle","description":"Inflige des dégâts supplémentaires quand Kalista et son pactisant frappent la même cible. <br><br>Activez pour envoyer une âme patrouiller le long d'une route, révélant la zone devant elle.","cd":"30","cout":"0","typeCout":"Pas de coût"},{"nom":"Extirpation","description":"Les attaques plantent des lances dans leurs cibles. Activez pour extirper les lances, ralentissant les ennemis et leur infligeant des dégâts augmentés.","cd":"0","cout":"30","typeCout":" {{ abilityresourcename }}"},{"nom":"Appel du destin","description":"Kalista téléporte le pactisant allié auprès d'elle. Le pactisant peut ensuite charger vers une position pour repousser tous les champions ennemis proches.","cd":"160/140/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Karma","nom":"Karma","titre":"Sagesse incarnée","blurb":"Aucun mortel n'incarne mieux que Karma les traditions spirituelles d'Ionia. Elle est l'hôte vivant d'une âme ancienne réincarnée à de multiples reprises. Elle contient tous les souvenirs accumulés au fil de ces vies et elle possède une puissance que peu peuvent comprendre. Elle a fait de son mieux pour guider son peuple lors de la crise récente, même si elle sait que la paix et l'harmonie ne sont possibles qu'à un prix élevé, pour elle et pour la terre qu'elle aime tant.","tags":["Mage","Support"],"info":{"attack":1,"defense":7,"magic":8,"difficulty":5},"partype":"Mana","passif":{"nom":"Concentration ardente","description":"Les compétences de Karma qui infligent des dégâts réduisent le délai de récupération de Mantra."},"competences":[{"nom":"Flamme intérieure","description":"Karma envoie une boule d'énergie spirituelle qui explose et inflige des dégâts au contact d'une unité ennemie.<br><br>Bonus Mantra : en plus de l'explosion, Mantra augmente la puissance destructrice de Flamme intérieure, créant un cataclysme qui inflige des dégâts après un court délai.","cd":"9/8/7/6/5","cout":"40/50/60/70/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Volonté concentrée","description":"Karma se lie à un ennemi, lui infligeant des dégâts et le révélant. Si le lien n'est pas brisé, l'ennemi sera immobilisé et subira de nouveau des dégâts.<br><br>Bonus Mantra : Karma renforce le lien, ce qui la soigne et prolonge la durée de l'immobilisation.","cd":"12","cout":"50/55/60/65/70","typeCout":" {{ abilityresourcename }}"},{"nom":"Exaltation","description":"Karma invoque un bouclier qui absorbe les dégâts et qui augmente la vitesse de déplacement de l'allié protégé.<br><br>Bonus Mantra : de l'énergie se diffuse depuis la cible, renforçant le bouclier initial et octroyant Exaltation aux champions alliés proches.","cd":"10/9.5/9/8.5/8","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Mantra","description":"Karma renforce sa prochaine compétence pour qu'elle ait un effet supplémentaire. Mantra est disponible au niveau 1 sans nécessiter de point de compétence.","cd":"40/38/36/34","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Karthus","nom":"Karthus","titre":"Liche","blurb":"Héraut de l'oubli, Karthus est un esprit immortel dont les chants ensorcelants préludent à l'horreur de son apparition. Les vivants craignent l'existence éternelle des morts-vivants, mais Karthus n'y voit que beauté et pureté, une union parfaite de la vie et de la mort. Lorsque Karthus émerge des Îles obscures, c'est pour apporter aux mortels la joie de la mort dont il est le vibrant apôtre.","tags":["Mage"],"info":{"attack":2,"defense":2,"magic":10,"difficulty":7},"partype":"Mana","passif":{"nom":"Déni de mort","description":"Lorsqu'il meurt, Karthus prend une forme spirituelle qui lui permet de continuer à lancer des sorts."},"competences":[{"nom":"Dévastation","description":"Karthus crée une explosion à retardement, infligeant des dégâts aux ennemis proches. Les ennemis isolés subissent plus de dégâts. ","cd":"0","cout":"20/25/30/35/40","typeCout":" {{ abilityresourcename }}"},{"nom":"Mur de douleur","description":"Karthus crée un mur d'énergie. Les ennemis franchissant le mur voient leur vitesse de déplacement et leur résistance magique temporairement réduites.","cd":"15","cout":"70","typeCout":" {{ abilityresourcename }}"},{"nom":"Souillure","description":"Karthus vole passivement l'énergie de ses victimes, gagnant du mana à chaque élimination. Karthus peut aussi s'immerger dans les âmes de ses proies, infligeant des dégâts aux ennemis proches mais au prix d'une grande perte de mana.","cd":"0.5","cout":"30/42/54/66/78","typeCout":" pts de mana par sec"},{"nom":"Requiem","description":"Après une canalisation de 3 secondes, Karthus inflige des dégâts à tous les champions ennemis.","cd":"200/180/160","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kassadin","nom":"Kassadin","titre":"Chasseur du Néant","blurb":"Kassadin se fraye un chemin brûlant dans les lieux les plus sombres du monde ; il sait que ses jours sont comptés. Guide et aventurier shurimien accompli, il avait choisi de fonder une famille parmi les tribus pacifiques du sud, jusqu'au jour où son village fut ravagé par le Néant. Il jura de se venger et s'arma de reliques arcaniques qu'il combina à l'aide de technologies interdites. Enfin, Kassadin se dirigea vers les ruines d'Icathia à la recherche du prophète autoproclamé, Malzahar, prêt à affronter les monstres du Néant.","tags":["Assassin","Mage"],"info":{"attack":3,"defense":5,"magic":8,"difficulty":8},"partype":"Mana","passif":{"nom":"Pierre du Néant","description":"Kassadin subit moins de dégâts magiques et peut traverser les unités."},"competences":[{"nom":"Orbe du Néant","description":"Kassadin tire un orbe d'énergie du Néant sur sa cible, infligeant des dégâts et interrompant les canalisations. Le surplus d'énergie lui confère un bouclier temporaire qui absorbe les dégâts magiques.","cd":"9/8.5/8/7.5/7","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Lame éthérée","description":"Passive : les attaques de base de Kassadin infligent des dégâts magiques supplémentaires. Active : la prochaine attaque de base de Kassadin inflige d'importants dégâts magiques supplémentaires et lui rend du mana.","cd":"7","cout":"1","typeCout":" {{ abilityresourcename }}"},{"nom":"Pulsation","description":"Kassadin tire de l'énergie des sorts lancés près de lui. Après avoir tiré assez d'énergie, Kassadin peut utiliser Pulsation pour blesser et ralentir les ennemis dans une zone en forme de cône devant lui.","cd":"21/20/19/18/17","cout":"60/65/70/75/80","typeCout":" {{ abilityresourcename }}"},{"nom":"Fissure","description":"Kassadin se téléporte vers une destination proche, blessant les ennemis se trouvant à proximité. Chaque utilisation de Fissure dans une courte période augmente le coût en mana et les dégâts de la Fissure suivante.","cd":"5/3.5/2","cout":"40","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Katarina","nom":"Katarina","titre":"Lame sinistre","blurb":"Aussi prompte dans ses décisions qu'elle est meurtrière en combat, Katarina figure parmi les assassins les plus prestigieux de Noxus. Fille aînée du légendaire général Du Couteau, elle révéla bien vite ses talents en éliminant ses ennemis avec la plus grande des discrétions. Son ambition était telle qu'elle n'hésitait pas à traquer des cibles solidement gardées, au risque de mettre ses alliés en danger. Quelle que fût la mission, elle n'hésitait jamais à remplir son devoir dans un tourbillon de lames acérées.","tags":["Assassin","Mage"],"info":{"attack":4,"defense":3,"magic":9,"difficulty":8},"partype":"Aucune","passif":{"nom":"Voracité","description":"Les délais de récupération des compétences de Katarina sont grandement réduits quand un champion qu'elle a blessé récemment meurt.<br><br>Si Katarina ramasse une <font color='#FFF673'>dague</font>, elle s'en sert pour frapper tous les ennemis proches, infligeant des dégâts magiques."},"competences":[{"nom":"Lame rebondissante","description":"Katarina lance une <font color='#FFF673'>dague</font> sur une cible. La dague rebondit ensuite sur les ennemis proches avant de tomber au sol.","cd":"11/10/9/8/7","cout":"0","typeCout":"Pas de coût"},{"nom":"Préparation","description":"Katarina augmente sa vitesse de déplacement et lance une <font color='#FFF673'>dague</font> dans les airs.","cd":"15/14/13/12/11","cout":"0","typeCout":"Pas de coût"},{"nom":"Shunpo","description":"Katarina se téléporte près de sa cible. S'il s'agit d'un ennemi, elle le frappe. Sinon, elle frappe l'ennemi le plus proche.","cd":"12/11/10/9/8","cout":"0","typeCout":"Pas de coût"},{"nom":"Lotus mortel","description":"Katarina tournoie et projette rapidement des couteaux sur les trois champions ennemis les plus proches, infligeant d'énormes dégâts sur la durée de la canalisation.","cd":"75/60/45","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Kayle","nom":"Kayle","titre":"Vertueuse","blurb":"Née d'une Manifestation targonienne au plus fort des Guerres runiques, Kayle honore l'héritage de sa mère en combattant pour la justice, portée par des ailes de feu divin. Elle et sa sœur jumelle Morgana ont longtemps été les protectrices de Demacia. Mais Kayle fut déçue par les trop nombreuses faiblesses des mortels et elle abandonna le royaume. Pourtant, d'après les légendes, elle punit toujours l'iniquité avec ses lames de feu, et beaucoup attendent avec espoir son retour…","tags":["Mage","Marksman"],"info":{"attack":6,"defense":6,"magic":7,"difficulty":7},"partype":"Mana","passif":{"nom":"Ascension divine","description":"Les attaques de Kayle sont renforcées par les cieux au fur et à mesure qu'elle gagne des niveaux et dépense des points de compétence. Ses ailes s'enflamment tandis qu'elle gagne progressivement de la vitesse d'attaque, de la vitesse de déplacement, de la portée d'attaque et des vagues de feu sur ses attaques."},"competences":[{"nom":"Incandescence","description":"Kayle fait apparaître un portail pour tirer une épée céleste qui traverse les ennemis touchés, les ralentissant, les blessant et réduisant leurs résistances.","cd":"12/11/10/9/8","cout":"60/70/80/90/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Bénédiction céleste","description":"Kayle se soigne et soigne l'allié le plus proche, et tous les deux reçoivent un bonus en vitesse de déplacement.","cd":"15","cout":"70/75/80/85/90","typeCout":" {{ abilityresourcename }}"},{"nom":"Lame de feu stellaire","description":"Passive : l'épée céleste de Kayle, Vertu, inflige des dégâts magiques supplémentaires aux ennemis qu'elle attaque.<br><br>Active : la prochaine attaque de Kayle déchaîne le feu céleste sur sa cible, infligeant des dégâts supplémentaires en fonction des PV manquants de la cible.","cd":"8/7.5/7/6.5/6","cout":"0","typeCout":"Pas de coût"},{"nom":"Jugement divin","description":"Kayle rend un allié invulnérable et fait appel aux anciennes Manifestations de la Justice pour faire tomber une pluie d'épées purificatrices autour de sa cible.","cd":"160/120/80","cout":"100/50/0","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kayn","nom":"Kayn","titre":"Faucheur de l'ombre","blurb":"Expert inégalé dans la pratique de la magie des ombres, Shieda Kayn combat pour accomplir sa véritable destinée : mener un jour l'Ordre de l'ombre vers une ère nouvelle où Ionia régnera en maître. Il manie Rhaast, une arme darkin douée de raison, sans jamais craindre la corruption de son corps et de son esprit. Il ne peut y avoir pour lui que deux fins possibles : soit Kayn pliera l'arme à sa volonté, soit la faux maléfique le consumera complètement, ouvrant la voie à la destruction de tout Runeterra.","tags":["Fighter","Assassin"],"info":{"attack":10,"defense":6,"magic":1,"difficulty":8},"partype":"Mana","passif":{"nom":"Faux des Darkin","description":"Kayn manie une arme antique et combat Rhaast, le Darkin qu'elle renferme, pour en prendre le contrôle. Soit le <font color='#fe5c50'>Darkin</font> triomphera, soit Kayn maîtrisera Rhaast et deviendra l'<font color='#8484fb'>Assassin de l'ombre</font>.<br><br><font color='#fe5c50'>Darkin :</font> soin équivalent à un pourcentage des dégâts de compétence infligés aux champions.<br><br><font color='#8484fb'>Assassin de l'ombre :</font> inflige des dégâts supplémentaires pendant les premières secondes d'un combat contre des champions ennemis."},"competences":[{"nom":"Moisson cruelle","description":"Kayn se rue vers l'avant puis frappe. La ruée et l'attaque infligent toutes deux des dégâts.","cd":"7/6.5/6/5.5/5","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Entaille sombre","description":"Kayn blesse et ralentit les cibles sur une ligne.","cd":"13/12/11/10/9","cout":"40/45/50/55/60","typeCout":" {{ abilityresourcename }}"},{"nom":"Passe-muraille","description":"Kayn peut traverser le terrain.","cd":"21/19/17/15/13","cout":"90","typeCout":" {{ abilityresourcename }}"},{"nom":"Intrusion obscure","description":"Kayn se cache dans le corps d'un ennemi, infligeant d'énormes dégâts quand il ressort.","cd":"120/100/80","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kennen","nom":"Kennen","titre":"Cœur de la tempête","blurb":"Vif comme l'éclair, Kennen est plus que le simple protecteur de l'équilibre ionien, c'est aussi le seul yordle membre du Kinkou. En dépit de son allure de boule de poils, il est prêt à affronter n'importe quelle menace dans un tourbillon de shurikens et d'enthousiasme. Aux côtés de son maître, Shen, Kennen patrouille dans le domaine des esprits, utilisant sa dévastatrice énergie électrique pour abattre ses ennemis.","tags":["Mage"],"info":{"attack":6,"defense":4,"magic":7,"difficulty":4},"partype":"Énergie","passif":{"nom":"Marque de tempête","description":"Kennen étourdit les ennemis qu'il touche 3 fois avec ses compétences."},"competences":[{"nom":"Shuriken foudroyant","description":"Kennen lance un shuriken rapide dans une direction, infligeant des dégâts et ajoutant une Marque de tempête à tout adversaire touché.","cd":"7/6.25/5.5/4.75/4","cout":"60/55/50/45/40","typeCout":" {{ abilityresourcename }}"},{"nom":"Surtension","description":"Kennen inflige, de façon passive, des dégâts supplémentaires et ajoute une Marque de tempête à sa cible toutes les quelques attaques. Il peut activer cette compétence pour infliger des dégâts et ajouter une autre Marque de tempête aux cibles déjà marquées.","cd":"13/11.25/9.5/7.75/6","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Rush foudroyant","description":"Kennen se transforme en boule d'électricité et peut traverser les unités et leur appliquer une Marque de tempête. En prenant cette forme, Kennen augmente sa vitesse de déplacement. En quittant cette forme, il augmente sa vitesse d'attaque.","cd":"10/9/8/7/6","cout":"80","typeCout":" {{ abilityresourcename }}"},{"nom":"Maelström","description":"Kennen invoque une tempête qui frappe les champions ennemis proches et leur inflige des dégâts magiques.","cd":"120","cout":"0","typeCout":"Pas de coût"}]},

{"id":"Khazix","nom":"Kha'Zix","titre":"Faucheur du Néant","blurb":"Le Néant grandit et le Néant s'adapte : parmi ses nombreuses engeances, nul n'incarne mieux cette vérité que Kha'Zix. Ce monstre est né pour survivre et pour tuer les plus forts. Quand il ne parvient pas à ses fins, il évolue et se crée de nouveaux moyens plus efficaces d'abattre sa proie. Alors que Kha'Zix n'était à l'origine qu'une créature sans cervelle, son intelligence s'est développée autant que sa forme physique. Aujourd'hui, chacune de ses traques est planifiée et profite même de la peur viscérale qu'il instille dans le cœur de ses victimes.","tags":["Assassin"],"info":{"attack":9,"defense":4,"magic":3,"difficulty":6},"partype":"Mana","passif":{"nom":"Menace invisible","description":"Les ennemis proches qui sont <font color='#FFF673'>isolés</font> sont marqués. Les compétences de Kha'Zix profitent d'interactions avec les cibles <font color='#FFF673'>isolées</font>.<br><br>Lorsque Kha'Zix n'est pas visible par l'équipe ennemie, il gagne Menace invisible, qui permet à sa prochaine attaque de base contre un champion ennemi d'infliger des dégâts magiques supplémentaires et de le ralentir pendant quelques secondes."},"competences":[{"nom":"Goût de la peur","description":"Kha'Zix inflige des dégâts physiques à sa cible. Les dégâts sont augmentés contre les cibles <font color='#FFF673'>isolées</font>. S'il choisit l'<font color='#00DD33'>évolution Griffes de faucheur</font>, Goût de la peur a un délai de récupération réduit s'il est utilisé contre une cible <font color='#FFF673'>isolée</font>. Kha'Zix augmente aussi la portée de ses attaques de base et de Goût de la peur.","cd":"4","cout":"20","typeCout":" {{ abilityresourcename }}"},{"nom":"Pique du Néant","description":"Kha'Zix projette des piques qui infligent des dégâts physiques aux ennemis touchés. Kha'Zix est soigné s'il se trouve dans le rayon de l'explosion. S'il choisit l'<font color='#00DD33'>évolution Batterie de piques</font>, 3 piques sont projetées dans une zone conique, les ennemis touchés sont ralentis et les champions ennemis touchés sont révélés pendant 2 sec. Les cibles <font color='#FFF673'>isolées</font> sont ralenties davantage.","cd":"9","cout":"55/60/65/70/75","typeCout":" {{ abilityresourcename }}"},{"nom":"Bond","description":"Kha'Zix bondit sur une zone, infligeant des dégâts physiques aux ennemis autour de son point de chute. S'il choisit l'<font color='#00DD33'>évolution Ailes</font>, la portée de Bond augmente de 200 et le délai de récupération est annulé quand il tue un champion ou réussit une assistance.","cd":"20/18/16/14/12","cout":"50","typeCout":" {{ abilityresourcename }}"},{"nom":"Assaut du Néant","description":"Chaque rang permet à Kha'Zix de faire évoluer l'une de ses compétences, ce qui lui confère un effet supplémentaire unique. Quand Assaut du Néant est activé, Kha'Zix devient <font color='#91d7ee'>invisible</font>, ce qui déclenche Menace invisible et augmente sa vitesse de déplacement. S'il choisit l'<font color='#00DD33'>évolution Occultation adaptative</font>, Assaut du Néant augmente la durée de son <font color='#91d7ee'>invisibilité</font> et peut être utilisé une fois de plus.","cd":"100/85/70","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kindred","nom":"Kindred","titre":"Chasseurs éternels","blurb":"Kindred représente les essences jumelles de la mort, distinctes mais indissociables. La flèche d'Agneau offre une fin rapide à ceux qui acceptent leur destin. Loup pourchasse ceux qui fuient leur dernier soupir et leur arrache brutalement la vie à coups de crocs. Bien que les interprétations de la nature de Kindred varient à travers tout Runeterra, chaque mortel doit choisir le vrai visage de sa mort.","tags":["Marksman"],"info":{"attack":8,"defense":2,"magic":2,"difficulty":4},"partype":"Mana","passif":{"nom":"Marque de Kindred","description":"Kindred peut marquer des cibles à chasser. Chaque chasse fructueuse renforce définitivement les compétences de base de Kindred. Toutes les 4 chasses menées à bien, la portée des attaques de base de Kindred augmente également."},"competences":[{"nom":"Danse des flèches","description":"Kindred fait une cabriole et tire sur un maximum de trois cibles proches.","cd":"9","cout":"35","typeCout":" {{ abilityresourcename }}"},{"nom":"Frénésie de Loup","description":"Loup enrage et attaque les ennemis proches de lui.  Agneau cumule passivement des effets en se déplaçant et en attaquant. Au maximum d'effets cumulés, la prochaine attaque d'Agneau lui rend des PV.","cd":"18/17/16/15/14","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Terreur mortelle","description":"Agneau effectue un tir précis, ralentissant la cible. Si Agneau attaque la cible deux fois de plus, sa troisième attaque envoie Loup sur la cible pour lui infliger d'énormes dégâts.","cd":"14/12.5/11/9.5/8","cout":"0","typeCout":" {{ abilityresourcename }}"},{"nom":"Repos d'Agneau","description":"Agneau offre à toutes les créatures vivantes dans une zone un refuge contre la mort. Jusqu'à la fin de l'effet, personne ne peut y mourir. Les unités sont ensuite soignées.","cd":"160/140/120","cout":"100","typeCout":" {{ abilityresourcename }}"}]},

{"id":"Kled","nom":"Kled","titre":"Cavalier colérique","blurb":"Guerrier aussi intrépide que grincheux, Kled est la plus pure incarnation de la fureur de Noxus. C'est un symbole que les soldats de l'empire adorent, dont les officiers se méfient et que la noblesse déteste. Beaucoup affirment que Kled a participé à toutes les campagnes des légions, qu'il a obtenu toutes les distinctions militaires et qu'il n'a jamais reculé devant un combat. Si la véracité des détails est souvent douteuse, une partie de sa légende reste indéniable : quand il charge sur le dos de Skaarl, sa monture un peu froussarde, Kled se bat pour protéger ce qui lui appartient... et s'emparer de tout le reste !","tags":["Fighter"],"info":{"attack":8,"defense":2,"magic":2,"difficulty":7},"partype":"Courage","passif":{"nom":"Skaarl, le Lézard froussard","description":"Kled chevauche sa fidèle monture, Skaarl, qui subit les dégâts à sa place. Quand les PV de Skaarl tombent à zéro, Kled est désarçonné.<br><br>Sans monture, les compétences de Kled changent et il inflige moins de dégâts aux champions. Kled peut restaurer le courage de Skaarl en combattant des ennemis. Quand le courage atteint son maximum, Kled se remet en selle avec une partie des PV de Skaarl."},"competences":[{"nom":"Piège à ours en laisse","description":"Kled lance un piège à ours qui inflige des dégâts et s'accroche à un champion ennemi. Si la cible reste accrochée pendant un court instant, elle subit des dégâts physiques supplémentaires et est tirée vers Kled.<br><br>Si Kled est désarçonné, la compétence devient Pistolet de poche, un tir à distance qui projette Kled en arrière et restaure du courage.","cd":"11/10/9/8/7","cout":"0","typeCout":"Pas de coût"},{"nom":"Penchant pour la violence","description":"Kled augmente grandement sa vitesse d'attaque le temps de quatre attaques. La quatrième attaque inflige plus de dégâts.","cd":"13/12/11/10/9","cout":"0","typeCout":"Pas de coût"},{"nom":"Joute","description":"Kled fonce dans une direction, infligeant des dégâts physiques et bénéficiant d'un bref bonus en vitesse de déplacement. Kled peut réactiver cette compétence pour foncer en sens inverse à travers sa cible initiale, infligeant les mêmes dégâts.","cd":"13/12/11/10/9","cout":"0","typeCout":"Pas de coût"},{"nom":"Chaaaaaaaargez !!!","description":"Kled et Skaarl chargent vers la zone ciblée en s'entourant d'un bouclier et en laissant derrière eux une traînée qui augmente la vitesse des alliés. Skaarl fonce sur le premier champion ennemi qu'il rencontre.","cd":"140/125/110","cout":"0","typeCout":"Pas de coût"}]},

{"id":"KogMaw","nom":"Kog'Maw","titre":"Gueule des abysses","blurb":"Émanant d'une brèche ouverte vers le Néant, c'est dans les ruines hantées d'Icathia que Kog'Maw, la putride créature à la gueule béante, et son insatiable curiosité firent leur apparition. Cette étrange bête du Néant doit mâchouiller tout ce qui se trouve à portée pour en comprendre la nature. Bien qu'il ne soit pas fondamentalement mauvais, Kog'Maw est dangereux par sa candeur, d'autant qu'elle précède généralement une frénésie insatiable, mue par sa curiosité sans fond.","tags":["Marksman","Mage"],"info":{"attack":8,"defense":2,"magic":5,"difficulty":6},"partype":"Mana","passif":{"nom":"Surprise d'Icathia","description":"4 sec après sa mort, Kog'Maw explose, infligeant des dégâts bruts aux ennemis proches."},"competences":[{"nom":"Bave caustique","description":"Kog'Maw lance un projectile corrosif qui inflige des dégâts magiques et ronge l'armure et la résistance magique de la cible pendant un court instant. Kog'Maw gagne aussi de la vitesse d'attaque.","cd":"7","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Barrage bio-arcanique","description":"Kog'Maw dispose d'une portée d'attaque augmentée et ses attaques infligent des dégâts magiques %i:OnHit% <OnHit>à l'impact</OnHit> équivalents à un pourcentage des PV max de la cible.","cd":"17","cout":"40","typeCout":" {{ abilityresourcename }}"},{"nom":"Limon du Néant","description":"Kog'Maw projette un limon particulier qui blesse tous les ennemis touchés. Le limon laisse derrière lui une traînée qui ralentit les ennemis le traversant.","cd":"12","cout":"40/55/70/85/100","typeCout":" {{ abilityresourcename }}"},{"nom":"Artillerie vivante","description":"Kog'Maw tire un projectile d'artillerie à longue portée, infligeant des dégâts magiques (grandement augmentés contre les ennemis à qui il reste peu de PV) et révélant les cibles non-camouflées. Utiliser plusieurs fois Artillerie vivante en peu de temps augmente progressivement le coût en mana des tirs supplémentaires.","cd":"2/1.5/1","cout":"40","typeCout":" {{ abilityresourcename }}"}]},
